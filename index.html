    // ===== SCREEN: YOUR INCOME =====
    function IncomeScreen({ state, dispatch, onNext }) {
      const [incomeMode, setIncomeMode] = useState('monthly');
      const monthly = state.user.monthlyGross;
      const [annualInput, setAnnualInput] = useState(monthly * 12);
      const annual = incomeMode === 'annual' ? annualInput : monthly * 12;
      const age = getAge(state.user.dob);
      const tables = getTaxTables(state.user.taxYear);
      const tax = calcBracketTax(annual, tables.brackets);
      const rebate = getRebate(age, tables.rebates);
      const estimated = Math.max(0, tax - rebate);
      const marginal = getMarginalRate(annual, tables.brackets);
      const threshold = getThreshold(age, tables.thresholds);
      const isProvisional = annual > threshold;

      const handleIncomeChange = (v) => {
        if (incomeMode === 'annual') {
          setAnnualInput(v);
          dispatch({ type:'SET_USER', payload:{ monthlyGross: Math.round(v / 12) } });
        } else {
          setAnnualInput(v * 12);
          dispatch({ type:'SET_USER', payload:{ monthlyGross: v } });
        }
      };

      return (
        <div className="screen">
          <StepProgress current={2} total={6} />
          <div className="ob-header">
            <div className="ob-step">Step 2 of 6</div>
            <h2>How much do you earn?</h2>
            <p className="subtitle">Your gross income before tax. Don't worry if it varies — use your average. You can change this anytime.</p>
          </div>
          <div className="toggle-row" style={{marginBottom:16}}>
            <button type="button" className={`toggle-btn ${incomeMode==='monthly'?'on':''}`} onClick={()=>setIncomeMode('monthly')}>Monthly</button>
            <button type="button" className={`toggle-btn ${incomeMode==='annual'?'on':''}`} onClick={()=>setIncomeMode('annual')}>Annual</button>
          </div>
          <RandInput label={incomeMode === 'monthly' ? "Monthly gross income" : "Annual gross income"} value={incomeMode === 'monthly' ? monthly : annual} onChange={handleIncomeChange} placeholder={incomeMode === 'monthly' ? "e.g. 30000" : "e.g. 360000"} />
          {monthly > 0 && (
            <div className="live-calc">
              <div className="live-row"><span>Annual income</span><span className="val">{fR(annual)}</span></div>
              <div className="live-row accent"><span>Your tax bracket</span><span className="val">{fPct(marginal)} marginal rate</span></div>
              <div className="live-row"><span>Estimated tax (before deductions)</span><span className="val">{fR(estimated)}/year</span></div>
              <div className="live-row"><span>Per month</span><span className="val">{fR(estimated / 12)}</span></div>
              {isProvisional && <div style={{textAlign:'center', marginTop:'8px'}}><span className="prov-badge">You're a provisional taxpayer</span></div>}
            </div>
          )}
          <button className="btn btn-primary mt24" disabled={monthly <= 0} style={{opacity: monthly > 0 ? 1 : 0.5}} onClick={onNext}>
            Next — let's reduce that tax
          </button>
        </div>
      );
    }

    // ===== DEDUCTION SUB-COMPONENTS =====
    function HomeOfficeStep({ data, onChange }) {
      const [mode, setMode] = useState('slider');
      const up = (f, v) => {
        const d = { ...data, [f]: v };
        if (mode === 'calculate' && (f === 'officeSqm' || f === 'totalSqm')) {
          if (d.totalSqm > 0) d.percentage = Math.min(50, Math.max(5, Math.round((d.officeSqm / d.totalSqm) * 100)));
        }
        onChange(d);
      };
      const pct = data.percentage / 100;
      const monthly = (data.monthlyRent + data.monthlyElectricity + data.monthlyInternet + (data.monthlyWater || 0) + (data.monthlySecurity || 0) + (data.monthlyHomeInsurance || 0)) * pct;
      return (
        <>
          <h3>Do you work from home?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="info-box">As a freelancer, you can deduct {data.percentage}% of your rent/bond interest, electricity, water, internet, security, and home insurance costs. SARS requires the space to be used <strong>regularly and exclusively</strong> for work. If the room doubles as a guest room or personal space, SARS can disallow the entire claim.</div>
              <label className="label mb8">What percentage of your home is your office?</label>
              <div className="toggle-row" style={{marginBottom:12}}>
                <button type="button" className={`toggle-btn ${mode==='slider'?'on':''}`} onClick={()=>setMode('slider')}>Set percentage</button>
                <button type="button" className={`toggle-btn ${mode==='calculate'?'on':''}`} onClick={()=>setMode('calculate')}>Help me calculate</button>
              </div>
              {mode === 'slider' ? (
                <PctSlider label="Office percentage" value={data.percentage} onChange={v => up('percentage', v)} min={5} max={80} />
              ) : (
                <>
                  <div className="field"><label className="label" htmlFor="f-total-sqm">Total home size (m&sup2;)</label><input id="f-total-sqm" type="number" className="input" value={data.totalSqm||''} onChange={e=>up('totalSqm',Number(e.target.value)||0)} placeholder="e.g. 80" inputMode="numeric" /></div>
                  <div className="field"><label className="label" htmlFor="f-office-sqm">Office size (m&sup2;)</label><input id="f-office-sqm" type="number" className="input" value={data.officeSqm||''} onChange={e=>up('officeSqm',Number(e.target.value)||0)} placeholder="e.g. 10" inputMode="numeric" /></div>
                  {data.totalSqm > 0 && data.officeSqm > 0 && <div className="info-box">Your office is {Math.round((data.officeSqm/data.totalSqm)*100)}% of your home</div>}
                </>
              )}
              {data.percentage > 40 && data.percentage <= 50 && (
                <div className="warn-box"><strong>Heads up:</strong> A home office percentage above 40% may attract SARS scrutiny during an audit. Make sure your office space genuinely represents this proportion of your home and is used <strong>exclusively</strong> for work.</div>
              )}
              {data.percentage > 50 && (
                <div className="danger-box"><strong>High percentage warning:</strong> A {data.percentage}% home office claim is very unusual and will likely be scrutinised by SARS. Ensure you can prove this space is used <strong>regularly and exclusively</strong> for work with measurements, photos, and floor plans. Consult a tax practitioner.</div>
              )}
              <div className="danger-box" style={{marginBottom:12}}><strong>Important for homeowners:</strong> If you own your home and claim a home office deduction, the business portion of your property may <strong>not qualify</strong> for the primary residence Capital Gains Tax (CGT) exclusion when you sell. This could cost you significantly on sale. Discuss this trade-off with your tax practitioner before claiming.</div>
              <RandInput label="Monthly rent OR bond interest (interest only, not full bond repayment)" value={data.monthlyRent} onChange={v=>up('monthlyRent',v)} note="If you have a bond, only enter the interest portion. Your bank statement shows this separately. Entering the full bond repayment will overstate your deduction." />
              <RandInput label="Monthly electricity" value={data.monthlyElectricity} onChange={v=>up('monthlyElectricity',v)} />
              <RandInput label="Monthly water & municipal rates" value={data.monthlyWater || 0} onChange={v=>up('monthlyWater',v)} />
              <RandInput label="Monthly internet" value={data.monthlyInternet} onChange={v=>up('monthlyInternet',v)} />
              <RandInput label="Monthly security (alarm, armed response)" value={data.monthlySecurity || 0} onChange={v=>up('monthlySecurity',v)} />
              <RandInput label="Monthly home insurance" value={data.monthlyHomeInsurance || 0} onChange={v=>up('monthlyHomeInsurance',v)} />
              <DeductionResult amount={monthly * 12} />
            </>
          )}
        </>
      );
    }

    function TravelStep({ data, onChange }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      const pct = data.workPercentage / 100;
      let annual = 0;
      if (data.method === 'deemed' && data.vehicleValue > 0 && data.businessKm > 0) {
        const tier = getSarsDeemedCostPerKm(data.vehicleValue);
        const totalKm = data.annualKm || data.businessKm;
        const costPerKm = (tier.fixedCost / Math.max(totalKm, 1)) + tier.fuelCost / 100 + tier.maintenance / 100;
        annual = Math.round(costPerKm * data.businessKm);
      } else {
        annual = ((data.monthlyFuel + data.monthlyInsurance) * pct * 12) + (data.recentRepairs * pct);
        if (data.vehicleDepreciation > 0) annual += Math.round(data.vehicleDepreciation * pct);
      }
      return (
        <>
          <h3>Do you use your car for work?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="info-box">You can deduct the work portion of your vehicle costs — fuel, insurance, maintenance, repairs, and depreciation. But you <strong>must keep a logbook</strong>. SARS requires you to record every business trip: date, destination, km driven, and purpose.</div>
              <label className="label mb8">Do you keep a logbook?</label>
              <div className="toggle-row">
                <button type="button" className={`toggle-btn ${data.hasLogbook===true?'on':''}`} onClick={()=>up('hasLogbook',true)}>Yes</button>
                <button type="button" className={`toggle-btn ${data.hasLogbook===false?'on':''}`} onClick={()=>up('hasLogbook',false)}>Not yet</button>
              </div>
              {data.hasLogbook === false && <div className="danger-box"><strong>Warning:</strong> Without a logbook, SARS can disallow your <strong>entire</strong> vehicle deduction. Start recording trips immediately — even a simple spreadsheet works. Record: date, where you went, km driven, and business purpose.</div>}

              <label className="label mb8" style={{marginTop:16}}>Which deduction method do you prefer?</label>
              <div className="toggle-row">
                <button type="button" className={`toggle-btn ${data.method==='actual'?'on':''}`} onClick={()=>up('method','actual')}>Actual costs</button>
                <button type="button" className={`toggle-btn ${data.method==='deemed'?'on':''}`} onClick={()=>up('method','deemed')}>SARS deemed cost</button>
              </div>
              <div className="info-box">{data.method === 'actual' ? 'Track your actual costs (fuel, insurance, repairs, depreciation) and multiply by your work-use percentage.' : 'SARS provides fixed cost tables based on your vehicle\'s value and business km driven. No need to track individual expenses.'}</div>

              {data.method === 'deemed' ? (
                <>
                  <RandInput label="Vehicle value (purchase price or current market value)" value={data.vehicleValue} onChange={v=>up('vehicleValue',v)} />
                  <div className="field">
                    <label className="label" htmlFor="f-annual-km">Total km driven this year (estimate)</label>
                    <input id="f-annual-km" type="number" className="input" value={data.annualKm||''} onChange={e=>up('annualKm',Number(e.target.value)||0)} placeholder="e.g. 20000" inputMode="numeric" />
                  </div>
                  <div className="field">
                    <label className="label" htmlFor="f-business-km">Business km driven this year</label>
                    <input id="f-business-km" type="number" className="input" value={data.businessKm||''} onChange={e=>up('businessKm',Number(e.target.value)||0)} placeholder="e.g. 8000" inputMode="numeric" />
                  </div>
                </>
              ) : (
                <>
                  <PctSlider label="Work-use percentage of driving" value={data.workPercentage} onChange={v=>up('workPercentage',v)} min={10} max={90} />
                  <RandInput label="Monthly fuel cost" value={data.monthlyFuel} onChange={v=>up('monthlyFuel',v)} />
                  <RandInput label="Monthly vehicle insurance" value={data.monthlyInsurance} onChange={v=>up('monthlyInsurance',v)} />
                  <RandInput label="Repairs and services this year" value={data.recentRepairs} onChange={v=>up('recentRepairs',v)} />
                  <RandInput label="Vehicle depreciation / wear & tear (annual)" value={data.vehicleDepreciation || 0} onChange={v=>up('vehicleDepreciation',v)} note="Vehicle depreciation is typically calculated at 20% of purchase price per year over 5 years. E.g. R200,000 vehicle = R40,000/year depreciation." />
                </>
              )}

              <label className="label mb8" style={{marginTop:16}}>Odometer readings (helps verify your km claims)</label>
              <div style={{display:'flex',gap:8}}>
                <div className="field" style={{flex:1}}>
                  <label className="label" htmlFor="f-odo-start">Start of year (1 March)</label>
                  <input id="f-odo-start" type="number" className="input" value={data.odometerStart||''} onChange={e=>up('odometerStart',Number(e.target.value)||0)} placeholder="e.g. 45000" inputMode="numeric" />
                </div>
                <div className="field" style={{flex:1}}>
                  <label className="label" htmlFor="f-odo-end">Current / end of year</label>
                  <input id="f-odo-end" type="number" className="input" value={data.odometerEnd||''} onChange={e=>up('odometerEnd',Number(e.target.value)||0)} placeholder="e.g. 65000" inputMode="numeric" />
                </div>
              </div>
              {data.odometerStart > 0 && data.odometerEnd > data.odometerStart && (
                <div className="info-box">Total km: {(data.odometerEnd - data.odometerStart).toLocaleString()} km. {data.method === 'actual' ? `Work portion (${data.workPercentage}%): ${Math.round((data.odometerEnd - data.odometerStart) * pct).toLocaleString()} km` : ''}</div>
              )}

              <div className="warn-box" style={{marginTop:12}}>
                <strong>Important:</strong> Driving from home to a regular office is NOT deductible — that's commuting. Only driving to client sites, meetings, and suppliers counts. Traffic fines and penalties are <strong>never</strong> deductible.
              </div>

              <div className="info-box" style={{marginTop:12}}>
                <strong>Travel allowance / reimbursement:</strong> If a client pays you a travel allowance or reimburses your km, that amount is taxable income and must be included in your gross income. You can then still claim your actual costs or deemed cost as a deduction. If fully reimbursed at a flat rate (e.g. R4.76/km for 2025/26), the reimbursement is added to income but the deduction offsets most of it.
              </div>
              <DeductionResult amount={annual} />
            </>
          )}
        </>
      );
    }

    function PhoneStep({ data, onChange }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      const annual = data.monthlyBill * (data.workPercentage / 100) * 12;
      return (
        <>
          <h3>Do you use your phone for work?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <PctSlider label="Work-use percentage" value={data.workPercentage} onChange={v=>up('workPercentage',v)} min={10} max={90} />
              <RandInput label="Monthly phone bill" value={data.monthlyBill} onChange={v=>up('monthlyBill',v)} note="Enter your total phone/internet bill. If you already included internet in your home office costs, only enter the phone portion here to avoid double-counting." />
              <DeductionResult amount={annual} />
            </>
          )}
        </>
      );
    }

    function EquipmentStep({ data, onChange }) {
      const addItem = () => onChange({ ...data, items: [...data.items, { description: '', amount: 0, assetType: 'Computer / Laptop', datePurchased: '' }] });
      const updateItem = (i, f, v) => { const items = [...data.items]; items[i] = { ...items[i], [f]: v }; onChange({ ...data, items }); };
      const removeItem = (i) => onChange({ ...data, items: data.items.filter((_, idx) => idx !== i) });
      const total = data.items.reduce((s, it) => {
        if (it.amount < 7000) return s + it.amount;
        const years = getDepreciationYears(it.assetType || 'Other equipment');
        return s + Math.round(it.amount / years);
      }, 0);
      return (
        <>
          <h3>Did you buy any equipment or software for work this year?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="info-box">Under <strong>Section 11(e)</strong> of the Income Tax Act, work assets are deductible via wear &amp; tear allowances (SARS Interpretation Note 47). Items under R7,000 can be claimed in full. Items over R7,000 are depreciated: computers 3yr, cameras 4yr, vehicles 5yr, tools 5yr, furniture 6yr.</div>
              {data.items.map((it, i) => {
                const years = getDepreciationYears(it.assetType || 'Other equipment');
                return (
                  <div key={i} className="card" style={{padding:'12px'}}>
                    <div className="field"><label className="label" htmlFor={`f-asset-desc-${i}`}>Description</label><input id={`f-asset-desc-${i}`} className="input" value={it.description} onChange={e=>updateItem(i,'description',e.target.value)} placeholder="e.g. MacBook Pro, Standing desk" /></div>
                    <div className="field">
                      <label className="label" htmlFor={`f-asset-type-${i}`}>Asset type (determines depreciation period)</label>
                      <select id={`f-asset-type-${i}`} className="input" value={it.assetType || 'Other equipment'} onChange={e=>updateItem(i,'assetType',e.target.value)}>
                        {ASSET_TYPES.map(a => <option key={a.type} value={a.type}>{a.type} ({a.years} year write-off)</option>)}
                      </select>
                    </div>
                    <RandInput label="Amount (including VAT)" value={it.amount} onChange={v=>updateItem(i,'amount',v)} />
                    {it.amount >= 7000 && <div className="small" style={{color:'var(--warning)'}}>Over R7,000 — depreciated at {fR(Math.round(it.amount/years))}/year for {years} years</div>}
                    {it.amount > 0 && it.amount < 7000 && <div className="small" style={{color:'var(--success)'}}>Under R7,000 — claimed in full this year</div>}
                    <button type="button" className="btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>removeItem(i)}>Remove</button>
                  </div>
                );
              })}
              <button type="button" className="btn btn-secondary btn-sm mt12" onClick={addItem}>+ Add item</button>
              <div className="info-box mt12">Keep your invoices for 5 years! SARS requires proof of all asset purchases.</div>
              <DeductionResult amount={total} label="Annual deduction (including depreciation)" />
            </>
          )}
        </>
      );
    }

    function ProfFeesStep({ data, onChange }) {
      const isChecked = (cat) => data.items.some(i => i.category === cat);
      const toggle = (cat) => {
        if (isChecked(cat)) onChange({ ...data, items: data.items.filter(i => i.category !== cat) });
        else onChange({ ...data, items: [...data.items, { category: cat, amount: 0, frequency: 'monthly' }] });
      };
      const updateItem = (cat, f, v) => onChange({ ...data, items: data.items.map(i => i.category === cat ? { ...i, [f]: v } : i) });
      const total = data.items.reduce((s, i) => s + (i.frequency === 'monthly' ? i.amount * 12 : i.amount), 0);
      return (
        <>
          <h3>Do you pay for any of these professional services?</h3>
          <div className="check-list">
            {PROF_FEE_OPTIONS.map(cat => (
              <div key={cat}>
                <div className={`check-item ${isChecked(cat)?'checked':''}`} role="checkbox" aria-checked={isChecked(cat)} tabIndex={0} onClick={()=>toggle(cat)} onKeyDown={e => { if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle(cat);} }}>
                  <div className="check-box" aria-hidden="true">{isChecked(cat) && '\u2713'}</div>
                  <span className="check-label">{cat}</span>
                </div>
                {isChecked(cat) && (
                  <div style={{paddingLeft:32, paddingTop:8, paddingBottom:8}}>
                    <RandInput label="Amount" value={data.items.find(i=>i.category===cat)?.amount} onChange={v=>updateItem(cat,'amount',v)} />
                    <div className="freq-toggle">
                      <button type="button" className={`freq-btn ${data.items.find(i=>i.category===cat)?.frequency==='monthly'?'on':''}`} onClick={()=>updateItem(cat,'frequency','monthly')}>Monthly</button>
                      <button type="button" className={`freq-btn ${data.items.find(i=>i.category===cat)?.frequency==='annual'?'on':''}`} onClick={()=>updateItem(cat,'frequency','annual')}>Annual</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
          {data.items.length > 0 && <div style={{marginTop:8}}><span className="label">Enabled: </span>{!data.enabled && <span className="small">(select at least one above to enable)</span>}</div>}
          <DeductionResult amount={total} />
        </>
      );
    }

    function MarketingStep({ data, onChange }) {
      const isChecked = (cat) => data.items.some(i => i.category === cat);
      const toggle = (cat) => {
        if (isChecked(cat)) onChange({ ...data, items: data.items.filter(i => i.category !== cat) });
        else onChange({ ...data, items: [...data.items, { category: cat, amount: 0, frequency: 'monthly' }] });
      };
      const updateItem = (cat, f, v) => onChange({ ...data, items: data.items.map(i => i.category === cat ? { ...i, [f]: v } : i) });
      const total = data.items.reduce((s, i) => s + (i.frequency === 'monthly' ? i.amount * 12 : i.amount), 0);
      return (
        <>
          <h3>Do you spend money on marketing or growing your business?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="check-list">
                {MARKETING_OPTIONS.map(cat => (
                  <div key={cat}>
                    <div className={`check-item ${isChecked(cat)?'checked':''}`} onClick={()=>toggle(cat)}>
                      <div className="check-box">{isChecked(cat) && '\u2713'}</div>
                      <span className="check-label">{cat}</span>
                    </div>
                    {isChecked(cat) && (
                      <div style={{paddingLeft:32, paddingTop:8, paddingBottom:8}}>
                        <RandInput label="Amount" value={data.items.find(i=>i.category===cat)?.amount} onChange={v=>updateItem(cat,'amount',v)} />
                        <div className="freq-toggle">
                          <button type="button" className={`freq-btn ${data.items.find(i=>i.category===cat)?.frequency==='monthly'?'on':''}`} onClick={()=>updateItem(cat,'frequency','monthly')}>Monthly</button>
                          <button type="button" className={`freq-btn ${data.items.find(i=>i.category===cat)?.frequency==='annual'?'on':''}`} onClick={()=>updateItem(cat,'frequency','annual')}>Annual</button>
                          <button type="button" className={`freq-btn ${data.items.find(i=>i.category===cat)?.frequency==='once'?'on':''}`} onClick={()=>updateItem(cat,'frequency','once')}>Once-off</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <div className="info-box">Client entertainment: keep records of who you met, where, and why. Courses: must be related to your current work.</div>
              <DeductionResult amount={total} />
            </>
          )}
        </>
      );
    }

    function RetirementStep({ data, onChange, state }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      const annual = data.monthlyRA * 12;
      const gross = state.user.monthlyGross * 12;
      const cap = Math.min(gross * 0.275, 350000);
      const deductible = Math.min(annual, cap);
      const tables = getTaxTables(state.user.taxYear);
      const marginal = getMarginalRate(gross, tables.brackets);
      return (
        <>
          <h3>Do you contribute to a Retirement Annuity (RA)?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled ? (
            <>
              <RandInput label="Monthly RA contribution" value={data.monthlyRA} onChange={v=>up('monthlyRA',v)} />
              {annual > 0 && (
                <div className="info-box">
                  You can deduct up to 27.5% of your income (max R350,000/year). Your current contribution of {fR(annual)}/year is {annual <= cap ? 'within' : 'exceeding'} this limit.
                  {annual > cap && <><br/><strong>Only {fR(cap)} is deductible.</strong></>}
                </div>
              )}
              <DeductionResult amount={deductible} />
            </>
          ) : data.enabled === false ? (
            <div className="info-box">
              <strong>Tip:</strong> An RA is one of the best tax deductions available. Every R1,000 you contribute saves you {fR(marginal * 1000)} in tax. Worth considering!
            </div>
          ) : null}
          <div className="info-box" style={{marginTop:16,background:'rgba(16,185,129,.05)',borderColor:'var(--success)'}}>
            <strong>Also consider: Tax-Free Savings Account (TFSA)</strong><br/>
            You can invest up to R36,000/year (R500,000 lifetime) in a TFSA. All growth, dividends, and interest earned are completely tax-free. This is separate from your RA and doesn't affect your RA deduction. Most banks and investment platforms offer TFSAs.
          </div>
        </>
      );
    }

    function MedicalStep({ data, onChange, state }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      const tables = getTaxTables(state ? state.user.taxYear : '2025/26');
      const cappedDeps = Math.min(10, Math.max(0, data.dependents || 0));
      const credits = calcMedicalCredits(cappedDeps, tables.medCredits);
      return (
        <>
          <h3>Do you have medical aid?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="field">
                <label className="label" htmlFor="f-med-dependents">How many dependents on your plan?</label>
                <input id="f-med-dependents" type="number" className="input" value={data.dependents || 0} onChange={e=>up('dependents', Math.min(10, Math.max(0, Number(e.target.value)||0)))} min="0" max="10" inputMode="numeric" />
                <div className="small mt12">This is in addition to you (the main member)</div>
                {data.dependents > 10 && <div className="warning-box" style={{marginTop:8}}>Maximum 10 dependents allowed. Please check your entry.</div>}
              </div>
              <div className="success-box">
                <div className="lbl">Your annual medical tax credits</div>
                <div className="amount">{fR(credits)}/year ({fR(credits/12)}/month)</div>
              </div>
              <label className="label mb8">Additional out-of-pocket medical expenses?</label>
              <YesNo value={data.hasOOP} onChange={v=>up('hasOOP',v)} />
              {data.hasOOP && <div className="info-box">Track these in your expenses throughout the year. Amounts exceeding 7.5% of your taxable income may qualify for additional credits.</div>}
            </>
          )}
        </>
      );
    }

    function DonationsStep({ data, onChange }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      return (
        <>
          <h3>Do you donate to registered charities (PBOs)?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="info-box">Donations to SARS-registered Public Benefit Organisations (with Section 18A certificates) are deductible up to 10% of your taxable income.</div>
              <RandInput label="Estimated annual donations" value={data.annualAmount} onChange={v=>up('annualAmount',v)} />
              {data.annualAmount > 0 && <DeductionResult amount={data.annualAmount} label="Donation deduction (subject to 10% cap)" />}
            </>
          )}
        </>
      );
    }

    function BadDebtsStep({ data, onChange }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      return (
        <>
          <h3>Do you have any bad debts? (Unpaid invoices)</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="info-box">Under Section 11(i), if you've invoiced a client and they haven't paid despite your reasonable efforts to collect, you can claim this as a deduction. The debt must be genuinely irrecoverable — keep proof of your collection attempts (emails, letters, legal notices).</div>
              <RandInput label="Total bad debts written off this year" value={data.annualAmount} onChange={v=>up('annualAmount',v)} />
              <div className="warn-box">SARS may query bad debt claims. Keep copies of: the original invoice, payment reminders sent, proof of collection attempts, and your decision to write off the debt.</div>
              {data.annualAmount > 0 && <DeductionResult amount={data.annualAmount} label="Bad debts deduction" />}
            </>
          )}
        </>
      );
    }

    function BusinessLoanInterestStep({ data, onChange }) {
      const up = (f, v) => onChange({ ...data, [f]: v });
      return (
        <>
          <h3>Do you pay interest on any business loans?</h3>
          <YesNo value={data.enabled} onChange={v => onChange({ ...data, enabled: v })} />
          {data.enabled && (
            <>
              <div className="info-box">Interest paid on money borrowed for business purposes is deductible under Section 24J. This includes business overdrafts, equipment finance, and business credit cards — but only the interest portion, not the capital repayment.</div>
              <RandInput label="Annual interest paid on business loans" value={data.annualAmount} onChange={v=>up('annualAmount',v)} />
              <div className="warn-box">Only interest on loans used for business purposes qualifies. A personal home loan or car loan for personal use does not count, even if you're self-employed.</div>
              {data.annualAmount > 0 && <DeductionResult amount={data.annualAmount} label="Business loan interest deduction" />}
            </>
          )}
        </>
      );
    }

    // ===== SCREEN: GUIDED DEDUCTIONS =====
    const DEDUCTION_STEPS = [
      { key: 'homeOffice', Component: HomeOfficeStep, title: 'Home Office' },
      { key: 'travel', Component: TravelStep, title: 'Vehicle & Travel' },
      { key: 'phone', Component: PhoneStep, title: 'Phone & Internet' },
      { key: 'equipment', Component: EquipmentStep, title: 'Equipment & Software' },
      { key: 'professionalFees', Component: ProfFeesStep, title: 'Professional Fees' },
      { key: 'marketing', Component: MarketingStep, title: 'Marketing & Business' },
      { key: 'retirement', Component: RetirementStep, title: 'Retirement Annuity & Savings' },
      { key: 'medical', Component: MedicalStep, title: 'Medical' },
      { key: 'donations', Component: DonationsStep, title: 'Donations' },
      { key: 'badDebts', Component: BadDebtsStep, title: 'Bad Debts' },
      { key: 'businessLoanInterest', Component: BusinessLoanInterestStep, title: 'Business Loan Interest' },
    ];

    function DeductionsSummaryScreen({ state, dispatch, navigate }) {
      const t = calcFullTax(state);
      const tp = state.taxProfile;
      const [editStep, setEditStep] = useState(null);

      if (editStep !== null) {
        // Inline single-category edit mode
        const stepInfo = DEDUCTION_STEPS[editStep];
        const Comp = stepInfo.Component;
        return (
          <div className="screen">
            <div className="flex-between mb24">
              <h2>{stepInfo.title}</h2>
              <BackButton onClick={() => setEditStep(null)} />
            </div>
            <Comp data={tp[stepInfo.key]} onChange={payload => dispatch({ type: 'SET_TP_CAT', cat: stepInfo.key, payload })} state={state} />
            <button className="btn btn-primary mt24" onClick={() => setEditStep(null)}>Done</button>
          </div>
        );
      }

      const summaryItems = DEDUCTION_STEPS.map((s, i) => {
        const data = tp[s.key];
        const isEnabled = data && data.enabled;
        const annualVal = t.breakdown[s.key] || 0;
        let detail = '';
        if (s.key === 'homeOffice' && isEnabled) detail = `${data.percentage}% of home costs`;
        else if (s.key === 'travel' && isEnabled) detail = `${data.workPercentage}% work use · ${data.method === 'deemed' ? 'Deemed cost' : 'Actual cost'}`;
        else if (s.key === 'phone' && isEnabled) detail = `${data.workPercentage}% of ${fR(data.monthlyBill)}/mo`;
        else if (s.key === 'retirement' && isEnabled) detail = `${fR(data.monthlyRA)}/month`;
        else if (s.key === 'medical' && isEnabled) detail = `${data.dependents || 0} dependant${data.dependents !== 1 ? 's' : ''}`;
        else if (s.key === 'donations' && isEnabled) detail = `${fR(data.annualAmount)}/year`;
        else if (s.key === 'equipment' && isEnabled) detail = `${(data.items || []).length} item${(data.items || []).length !== 1 ? 's' : ''}`;
        else if (s.key === 'professionalFees' && isEnabled) detail = `${(data.items || []).length} item${(data.items || []).length !== 1 ? 's' : ''}`;
        else if (s.key === 'marketing' && isEnabled) detail = `${(data.items || []).length} item${(data.items || []).length !== 1 ? 's' : ''}`;
        else if (s.key === 'badDebts' && isEnabled) detail = `${fR(data.annualAmount)}/year`;
        else if (s.key === 'businessLoanInterest' && isEnabled) detail = `${fR(data.annualAmount)}/year`;
        return { ...s, index: i, isEnabled, annualVal, detail };
      });

      const enabledCount = summaryItems.filter(s => s.isEnabled).length;

      return (
        <div className="screen">
          <div className="flex-between mb24">
            <h2>Your Deductions</h2>
            <BackButton onClick={() => navigate('settings')} label="Back to settings" />
          </div>
          <div className="success-box" style={{marginBottom:16}}>
            <div style={{fontSize:'.8125rem',color:'var(--text2)'}}>Total annual deductions</div>
            <div style={{fontSize:'1.375rem',fontWeight:700,color:'var(--success)'}}>{fR(t.deductionsTotal)}</div>
            <div className="small">{enabledCount} of {DEDUCTION_STEPS.length} categories active · Saving ~{fR(t.savings)}/year</div>
          </div>

          {summaryItems.map(item => (
            <div key={item.key} onClick={() => setEditStep(item.index)} style={{
              display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',
              borderBottom:'1px solid var(--border)',cursor:'pointer',gap:12
            }}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:'.9375rem'}}>{item.title}</div>
                {item.isEnabled ? (
                  <div className="small" style={{color:'var(--success)'}}>{item.detail}</div>
                ) : (
                  <div className="small">Not set up</div>
                )}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                {item.isEnabled ? (
                  <span style={{fontWeight:600,color:'var(--success)'}}>{fR(item.annualVal)}</span>
                ) : (
                  <span style={{color:'var(--text3)',fontSize:'.8125rem'}}>—</span>
                )}
              </div>
              <span style={{color:'var(--text3)',fontSize:'.875rem'}}>›</span>
            </div>
          ))}

          <button className="btn btn-secondary mt24" onClick={() => navigate('edit-deductions-full')}>
            <Icon name="refresh" size={16} style={{marginRight:4}} /> Full Walkthrough (all categories)
          </button>
        </div>
      );
    }

    function DeductionsScreen({ state, dispatch, onNext }) {
      const [step, setStep] = useState(0);
      const current = DEDUCTION_STEPS[step];
      const Comp = current.Component;

      const handleChange = (payload) => {
        // Auto-enable for checklist-style components
        const updated = { ...payload };
        if (current.key === 'professionalFees' || current.key === 'marketing') {
          updated.enabled = updated.items && updated.items.length > 0;
        }
        dispatch({ type: 'SET_TP_CAT', cat: current.key, payload: updated });
      };

      return (
        <div className="screen">
          <StepProgress current={3} total={6} />
          <div className="ob-header">
            <div className="ob-step">Step 3 of 6 — Deductions</div>
            <h2>{current.title}</h2>
            <div className="small">Category {step + 1} of {DEDUCTION_STEPS.length}</div>
          </div>
          <div className="step-dots">
            {DEDUCTION_STEPS.map((_, i) => (
              <div key={i} className={`step-dot ${i === step ? 'active' : i < step ? 'done' : ''}`} />
            ))}
          </div>
          <Comp data={state.taxProfile[current.key]} onChange={handleChange} state={state} />
          {step === DEDUCTION_STEPS.length - 1 && (
            <div className="info-box" style={{marginTop:20,background:'rgba(16,185,129,.05)',borderColor:'var(--success)'}}>
              <strong>Section 11(a) — General deduction:</strong> Any expense incurred "in the production of income" and not of a capital nature is deductible. If you have business expenses not covered above (e.g. co-working space, business travel accommodation, courier fees), log them as expenses — they're likely deductible. When in doubt, keep the receipt and ask your tax practitioner.
            </div>
          )}
          <div className="btn-row mt24">

    // ===== SCREEN: BUDGET VIEW (Enhanced) =====
    function BudgetViewScreen({ state, dispatch, navigate }) {
      const t = calcFullTax(state);
      const monthlyRA = state.taxProfile.retirement.enabled ? state.taxProfile.retirement.monthlyRA : 0;
      const available = state.user.monthlyGross - (t.netTax / 12) - monthlyRA;
      const cats = state.budget.categories || {};
      const budgetTotal = Object.values(cats).reduce((s, v) => s + (Number(v) || 0), 0);
      const now = new Date();
      const taxYear = state.user.taxYear || '2025/26';
      const [expandedCat, setExpandedCat] = useState(null);

      // Helper to get expenses for a given month
      const getMonthExpenses = (monthDate) => (state.expenses || []).filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === monthDate.getMonth() && d.getFullYear() === monthDate.getFullYear() && isInTaxYear(e.date, taxYear);
      });

      const monthExpenses = getMonthExpenses(now);
      const monthSpent = monthExpenses.reduce((s, e) => s + e.amount, 0);

      // Last month expenses for comparison
      const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const lastMonthExpenses = getMonthExpenses(lastMonth);

      // Days remaining in month
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const daysRemaining = daysInMonth - now.getDate();
      const daysPassed = now.getDate();

      // Budget category matcher: maps a budget category name to expense categories
      function matchExpenses(budgetItem, expenses) {
        const budgetLower = budgetItem.split(' (')[0].toLowerCase();
        return expenses.filter(e => {
          const catLower = e.category.split(' (')[0].toLowerCase();
          return budgetLower.includes(catLower) || catLower.includes(budgetLower);
        });
      }

      if (budgetTotal === 0) {
        return (
          <div className="screen" style={{textAlign:'center',paddingTop:60}}>
            <div style={{marginBottom:16}}><Icon name="money" size={40} style={{color:'var(--coral)',marginBottom:16}} /></div>
            <h2>No budget set up yet</h2>
            <p className="subtitle mt12">Create a budget to track your monthly spending against your available income.</p>
            <button className="btn btn-primary mt24" onClick={() => navigate('budget-setup')}>Set Up Budget</button>
            <button className="btn btn-ghost mt12" onClick={() => navigate('expenses')}>View Expenses Instead</button>
          </div>
        );
      }

      return (
        <div className="screen">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <BackButton onClick={() => navigate('dashboard')} />
            <h2 style={{flex:1}}>Budget</h2>
            <button className="btn btn-primary btn-sm" onClick={() => navigate('budget-setup')}>Edit</button>
          </div>

          {/* Summary card with days remaining */}
          <div className="dash-card">
            <div className="flex-between mb8">
              <div>
                <div className="small">This month</div>
                <div style={{fontSize:'1.5rem',fontWeight:700}}>{fR(monthSpent)} <span style={{fontSize:'.875rem',fontWeight:400,color:'var(--text2)'}}>of {fR(budgetTotal)}</span></div>
              </div>
              <div style={{textAlign:'right'}}>
                <span className={`tag ${monthSpent/budgetTotal < 0.75 ? 'tag-green' : monthSpent/budgetTotal < 0.9 ? 'tag-amber' : 'tag-red'}`}>
                  {budgetTotal > 0 ? Math.round((monthSpent/budgetTotal)*100) : 0}%
                </span>
              </div>
            </div>
            <div className="budget-bar">
              <div className={`budget-fill ${monthSpent/budgetTotal < 0.75 ? 'green' : monthSpent/budgetTotal < 0.9 ? 'amber' : 'red'}`} style={{width:`${Math.min(100,(monthSpent/budgetTotal)*100)}%`}} />
            </div>
            <div className="flex-between mt12">
              <span className="small">{fR(Math.max(0, budgetTotal - monthSpent))} remaining</span>
              <span className="small">{daysRemaining} day{daysRemaining !== 1 ? 's' : ''} left in {now.toLocaleDateString('en-ZA', {month:'long'})}</span>
            </div>
            {daysRemaining > 0 && budgetTotal > monthSpent && (
              <div className="small" style={{color:'var(--primary)',marginTop:4}}>~{fR(Math.round((budgetTotal - monthSpent) / daysRemaining))}/day safe to spend</div>
            )}
          </div>

          {/* Available income context */}
          <div className="card" style={{padding:'10px 16px'}}>
            <div className="flex-between">
              <span className="small">Available after tax & RA</span>
              <span style={{fontWeight:600,fontSize:'.875rem',color:'var(--primary)'}}>{fR(available)}/month</span>
            </div>
            {budgetTotal < available && (
              <div className="small" style={{color:'var(--text3)',marginTop:4}}>{fR(available - budgetTotal)} unallocated</div>
            )}
          </div>

          {/* Category breakdown with drill-down */}
          {BUDGET_CATS.map(group => {
            const groupItems = group.items.filter(item => (cats[item] || 0) > 0);
            if (groupItems.length === 0) return null;
            return (
              <div key={group.group} style={{marginBottom:16}}>
                <h3 style={{fontSize:'.8125rem',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.03em',marginBottom:8,marginTop:16}}>{group.group}</h3>
                {groupItems.map(item => {
                  const budgeted = cats[item] || 0;
                  const itemExpenses = matchExpenses(item, monthExpenses);
                  const spent = itemExpenses.reduce((s, e) => s + e.amount, 0);
                  const pct = budgeted > 0 ? Math.min(100, Math.round((spent / budgeted) * 100)) : 0;
                  const isExpanded = expandedCat === item;

                  // Last month comparison
                  const lastMonthItemExpenses = matchExpenses(item, lastMonthExpenses);
                  const lastMonthSpent = lastMonthItemExpenses.reduce((s, e) => s + e.amount, 0);
                  const diff = spent - lastMonthSpent;

                  return (
                    <div key={item}>
                      <div className="card" style={{padding:'12px 16px',cursor:'pointer',borderColor:isExpanded?'var(--primary)':'var(--border)'}} onClick={() => setExpandedCat(isExpanded ? null : item)}>
                        <div className="flex-between">
                          <span style={{fontSize:'.875rem',fontWeight:500}}>{item.split(' (')[0]}</span>
                          <div style={{textAlign:'right'}}>
                            <span className="small">{fR(spent)} / {fR(budgeted)}</span>
                            {pct > 90 && <span style={{color:'var(--danger)',fontSize:'.75rem',marginLeft:4}}>!</span>}
                          </div>
                        </div>
                        <div className="budget-bar" style={{marginTop:6}}>
                          <div className={`budget-fill ${pct < 75 ? 'green' : pct < 90 ? 'amber' : 'red'}`} style={{width:`${pct}%`}} />
                        </div>
                        {/* Month-over-month trend */}
                        {lastMonthSpent > 0 && (
                          <div className="small" style={{marginTop:4,color:diff > 0 ? 'var(--danger-text)' : diff < 0 ? 'var(--success-text)' : 'var(--text3)'}}>
                            {diff > 0 ? '↑' : diff < 0 ? '↓' : '→'} {diff === 0 ? 'Same' : `${fR(Math.abs(diff))} ${diff > 0 ? 'more' : 'less'}`} than last month
                          </div>
                        )}
                      </div>

                      {/* Drill-down: individual expenses in this category */}
                      {isExpanded && (
                        <div style={{marginLeft:12,marginBottom:8,borderLeft:'2px solid var(--primary)',paddingLeft:12}}>
                          {itemExpenses.length > 0 ? itemExpenses.sort((a,b) => new Date(b.date) - new Date(a.date)).map(e => (
                            <div key={e.id} className="flex-between" style={{padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:'.875rem'}}>
                              <div>
                                <div style={{fontWeight:500}}>{e.description || e.category.split(' (')[0]}</div>
                                <div className="small">{new Date(e.date).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})}</div>
                              </div>
                              <span style={{fontWeight:600}}>{fR(e.amount)}</span>
                            </div>
                          )) : (
                            <div className="small" style={{padding:'8px 0',color:'var(--text3)'}}>No expenses this month</div>
                          )}
                          <div className="small" style={{padding:'6px 0',color:'var(--primary)'}}>
                            {fR(Math.max(0, budgeted - spent))} remaining in budget
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}

          {/* Over-budget categories alert */}
          {(() => {
            const overBudget = Object.entries(cats).filter(([item, budgeted]) => {
              if (budgeted <= 0) return false;
              const spent = matchExpenses(item, monthExpenses).reduce((s, e) => s + e.amount, 0);
              return spent > budgeted;
            });
            if (overBudget.length > 0) return (
              <div className="warn-box mt12">
                <strong>Over budget:</strong> {overBudget.map(([item]) => item.split(' (')[0]).join(', ')}. Consider adjusting your spending or updating your budget.
              </div>
            );
            return null;
          })()}

          <button className="btn btn-secondary mt12" onClick={() => navigate('expenses')}>View All Expenses</button>
        </div>
      );
    }

    // ===== SCREEN: DASHBOARD =====
    function DashboardScreen({ state, dispatch, navigate }) {
      const t = calcFullTax(state);
      const monthlyRA = state.taxProfile.retirement.enabled ? state.taxProfile.retirement.monthlyRA : 0;
      const available = state.user.monthlyGross - (t.netTax / 12) - monthlyRA;
      const budgetTotal = Object.values(state.budget.categories || {}).reduce((s, v) => s + (Number(v) || 0), 0);
      const hasBudget = budgetTotal > 0;
      const [guideDismissed, setGuideDismissed] = useState(() => !!localStorage.getItem('tt_guide_dismissed'));

      // Current month expenses (filtered to tax year)
      const now = new Date();
      const taxYear = state.user.taxYear || '2025/26';
      const monthExpenses = (state.expenses || []).filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear() && isInTaxYear(e.date, taxYear);
      });
      const monthSpent = monthExpenses.reduce((s, e) => s + e.amount, 0);

      // ===== SMART NUDGES ENGINE =====
      const nudges = [];
      const allExpenses = state.expenses || [];
      const goals = state.backpocket || [];

      // 1. No expenses in 7+ days
      if (allExpenses.length > 0) {
        const lastExpDate = new Date(Math.max(...allExpenses.map(e => new Date(e.date).getTime())));
        const daysSince = Math.floor((now - lastExpDate) / (24 * 60 * 60 * 1000));
        if (daysSince >= 7) nudges.push({ icon: 'pencil', text: `Haven't logged anything in ${daysSince} days. Even small expenses add up.`, priority: 3 });
      }

      // 2. Tax year ending < 60 days
      const yearEnd = new Date(taxYear === '2024/25' ? '2025-02-28' : '2026-02-28');
      const daysToEnd = Math.floor((yearEnd - now) / (24 * 60 * 60 * 1000));
      if (daysToEnd > 0 && daysToEnd <= 60) nudges.push({ icon: 'calendar', text: `The ${taxYear} tax year ends ${yearEnd.toLocaleDateString('en-ZA',{day:'numeric',month:'long'})}. Check your records are complete.`, priority: 5 });

      // 3. Filing season approaching (July)
      if (now.getMonth() >= 5 && now.getMonth() <= 7) nudges.push({ icon: 'clipboard', text: 'Filing season opens July. Your year-end report will be ready.', priority: 2 });

      // 4. RA contribution room
      if (state.taxProfile.retirement.enabled) {
        const raAnnual = state.taxProfile.retirement.monthlyRA * 12;
        const raCap = Math.min(t.gross * 0.275, 350000);
        const raRoom = raCap - raAnnual;
        if (raRoom > 1000) nudges.push({ icon: 'bank', text: `You've contributed ${fR(raAnnual)} to RA. Room for ${fR(raRoom)} more this year (saves ~${fR(Math.round(raRoom * t.marginal))} in tax).`, priority: 2 });
      }

      // 5. IRP6 due < 30 days
      const tables = getTaxTables(taxYear);
      const threshold = getThreshold(getAge(state.user.dob), tables.thresholds);
      if (t.gross > threshold) {
        getProvTaxDates(taxYear).filter(p => !p.optional).forEach(p => {
          const dueDate = new Date(p.date);
          const daysUntil = Math.floor((dueDate - now) / (24 * 60 * 60 * 1000));
          const isPaid = !!(state.provTaxPaid || {})[p.period];
          if (!isPaid && daysUntil > 0 && daysUntil <= 30) nudges.push({ icon: 'warning', text: `Provisional tax (${p.period}) due ${p.label}. Estimated payment: ${fR(Math.round(t.netTax / 2))}.`, priority: 6 });
          if (!isPaid && daysUntil < 0) nudges.push({ icon: 'alert', text: `${p.period} was due ${p.label} and is OVERDUE. Pay via SARS eFiling to avoid penalties.`, priority: 7 });
        });
      }

      // 6. Over budget category
      if (hasBudget) {
        const cats = state.budget.categories || {};
        Object.entries(cats).forEach(([item, budgeted]) => {
          if (budgeted <= 0) return;
          const budgetLower = item.split(' (')[0].toLowerCase();
          const spent = monthExpenses.filter(e => { const cl = e.category.split(' (')[0].toLowerCase(); return budgetLower.includes(cl) || cl.includes(budgetLower); }).reduce((s, e) => s + e.amount, 0);
          if (spent > budgeted) nudges.push({ icon: 'wallet', text: `You're over budget on ${item.split(' (')[0]} by ${fR(spent - budgeted)} this month.`, priority: 4 });
        });
      }

      // 7. Under budget + Backpocket
      if (hasBudget && goals.length > 0) {
        const cats = state.budget.categories || {};
        Object.entries(cats).forEach(([item, budgeted]) => {
          if (budgeted <= 0) return;
          const budgetLower = item.split(' (')[0].toLowerCase();
          const spent = monthExpenses.filter(e => { const cl = e.category.split(' (')[0].toLowerCase(); return budgetLower.includes(cl) || cl.includes(budgetLower); }).reduce((s, e) => s + e.amount, 0);
          const diff = budgeted - spent;
          if (diff > 100 && spent < budgeted * 0.5) nudges.push({ icon: 'target', text: `${fR(diff)} under budget on ${item.split(' (')[0]} — put it toward ${goals[0].name}?`, priority: 1, action: 'backpocket' });
        });
      }

      // 8. Home office claimed, no expenses
      if (state.taxProfile.homeOffice.enabled && t.breakdown.homeOffice > 0) {
        const hasHomeExpenses = allExpenses.some(e => isInTaxYear(e.date, taxYear) && e.category.includes('Home office'));
        if (!hasHomeExpenses) nudges.push({ icon: 'home', text: 'You claimed home office but haven\'t logged any home office expenses yet.', priority: 3 });
      }

      // 9. Backup reminder nudge
      const lastExport = state.meta && state.meta.lastExport ? new Date(state.meta.lastExport) : null;
      const daysSinceExport = lastExport ? Math.round((Date.now() - lastExport.getTime()) / 86400000) : Infinity;
      if (daysSinceExport > 30 && allExpenses.length >= 20) {

    // ===== BATCH 5: RECEIPT SCANNER COMPONENT =====
    function ReceiptScanner({ onResult, state, dispatch }) {
      const [status, setStatus] = useState('idle'); // idle, loading, scanning, done, error
      const [progress, setProgress] = useState(0);
      const [imageData, setImageData] = useState(null);
      const [result, setResult] = useState(null);
      const [editAmount, setEditAmount] = useState('');
      const [editDate, setEditDate] = useState('');
      const [editVendor, setEditVendor] = useState('');
      const fileRef = useRef(null);
      const cameraRef = useRef(null);

      const handleCapture = async (file) => {
        if (!file) return;
        setStatus('loading');
        setProgress(0);
        try {
          // Compress image
          const compressed = await compressImage(file);
          setImageData(compressed);
          setStatus('scanning');

          // Load Tesseract on-demand
          await loadTesseract();
          setProgress(10);

          // Run OCR
          const worker = await Tesseract.createWorker('eng', 1, {
            logger: (m) => { if (m.status === 'recognizing text') setProgress(10 + Math.round(m.progress * 85)); }
          });
          const { data: { text } } = await worker.recognize(compressed);
          await worker.terminate();
          setProgress(100);

          // Parse the receipt text
          const parsed = parseReceiptText(text);
          setResult(parsed);
          setEditAmount(parsed.amount ? String(parsed.amount) : '');
          setEditDate(parsed.date || new Date().toISOString().slice(0, 10));
          setEditVendor(parsed.vendor || '');
          setStatus('done');
        } catch (err) {
          console.error('OCR error:', err);
          setStatus('error');
        }
      };

      const handleConfirm = () => {
        // Save receipt as a document
        if (imageData) {
          dispatch({ type: 'ADD_DOCUMENT', payload: {
            type: 'receipt', description: editVendor || 'Scanned receipt',
            date: editDate || new Date().toISOString().slice(0, 10),
            taxYear: state.user.taxYear || '2025/26',
            linkedExpenseId: null, fileType: 'image/jpeg',
            fileName: 'receipt_ocr_' + Date.now() + '.jpg',
            fileData: imageData,
            fileSize: new Blob([imageData]).size,
            created: new Date().toISOString()
          }});
        }
        onResult({
          amount: Number(editAmount) || 0,
          date: editDate,
          description: editVendor,
          ocrUsed: true,
          ocrConfidence: result ? result.confidence : 0,
          hasReceipt: true
        });
      };

      const handleReset = () => {
        setStatus('idle'); setProgress(0); setImageData(null); setResult(null);
      };

      if (status === 'idle') {
        return (
          <div style={{marginBottom:16}}>
            <input type="file" ref={fileRef} accept="image/*" style={{display:'none'}} onChange={e => handleCapture(e.target.files[0])} />
            <input type="file" ref={cameraRef} accept="image/*" capture="environment" style={{display:'none'}} onChange={e => handleCapture(e.target.files[0])} />
            <div style={{display:'flex',gap:8}}>
              {isMobile() && (
                <button className="btn btn-secondary" onClick={() => cameraRef.current.click()} style={{flex:1,fontSize:'.875rem'}}>
                  <Icon name="camera" size={16} /> Scan Receipt
                </button>
              )}
              <button className="btn btn-secondary" onClick={() => fileRef.current.click()} style={{flex:1,fontSize:'.875rem'}}>
                {isMobile() ? <><Icon name="upload" size={16} /> Upload</> : <><Icon name="camera" size={16} /> Scan Receipt</>}
              </button>
            </div>
          </div>
        );
      }

      if (status === 'loading' || status === 'scanning') {
        return (
          <div className="card" style={{marginBottom:16,padding:16,textAlign:'center'}}>
            {imageData && (
              <img src={imageData} alt="Receipt" style={{maxHeight:120,borderRadius:8,marginBottom:8,opacity:0.7}} />
            )}
            <div style={{fontWeight:600,marginBottom:8}}>
              {status === 'loading' ? <><Icon name="download" size={16} /> Loading OCR engine...</> : <><Icon name="search" size={16} /> Reading receipt...</>}
            </div>
            <div style={{background:'var(--bg2)',borderRadius:6,height:8,overflow:'hidden',marginBottom:4}}>
              <div style={{width:progress+'%',height:'100%',background:'var(--primary)',borderRadius:6,transition:'width .3s'}} />
            </div>
            <div className="small" style={{color:'var(--text3)'}}>{progress}%</div>
          </div>
        );
      }

      if (status === 'error') {
        return (
          <div className="card" style={{marginBottom:16,padding:16}}>
            <div style={{color:'var(--danger-text)',fontWeight:600,marginBottom:8}}><Icon name="warning" size={16} style={{marginRight:4}} /> Couldn't read receipt</div>
            <div className="small" style={{marginBottom:12}}>OCR failed. You can still enter the details manually below.</div>
            <button className="btn btn-secondary btn-sm" onClick={handleReset}>Try Again</button>
          </div>
        );
      }

      // status === 'done'
      return (
        <div className="card" style={{marginBottom:16,padding:16,border:'2px solid var(--primary)'}}>
          <div style={{fontWeight:600,marginBottom:12,color:'var(--primary)'}}><Icon name="camera" size={16} style={{marginRight:4}} /> We found:</div>
          {imageData && (
            <img src={imageData} alt="Receipt" style={{maxHeight:80,borderRadius:6,marginBottom:8,display:'block'}} />
          )}
          <div className="field" style={{marginBottom:8}}>
            <label className="label" style={{fontSize:'.75rem'}}>Amount</label>
            <div className="currency-wrap">
              <span className="prefix">R</span>
              <input type="number" className="input" value={editAmount} onChange={e => setEditAmount(e.target.value)} inputMode="decimal" />
            </div>
          </div>
          <div className="field" style={{marginBottom:8}}>
            <label className="label" style={{fontSize:'.75rem'}}>Date</label>
            <input type="date" className="input" value={editDate} onChange={e => setEditDate(e.target.value)} />
          </div>
          <div className="field" style={{marginBottom:12}}>
            <label className="label" style={{fontSize:'.75rem'}}>Store</label>
            <input className="input" value={editVendor} onChange={e => setEditVendor(e.target.value)} placeholder="Store name" />
          </div>
          {result && result.confidence && (
            <div className="small" style={{color:'var(--text3)',marginBottom:8}}>
              Confidence: {Math.round(result.confidence * 100)}%
            </div>
          )}
          <div style={{display:'flex',gap:8}}>
            <button className="btn" style={{flex:1,background:'var(--primary)',color:'#fff',fontSize:'.875rem'}} onClick={handleConfirm}>✓ Looks right</button>
            <button className="btn btn-secondary" style={{flex:1,fontSize:'.875rem'}} onClick={handleReset}>Try again</button>
          </div>
        </div>
      );
    }

    function LogExpenseScreen({ state, dispatch, navigate }) {
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [amount, setAmount] = useState('');
      const [description, setDescription] = useState('');
      const [category, setCategory] = useState('');
      const [hasReceipt, setHasReceipt] = useState(false);
      const [clientName, setClientName] = useState('');
      const [businessPurpose, setBusinessPurpose] = useState('');
      const [smartResponse, setSmartResponse] = useState(null);
      const [saved, setSaved] = useState(false);
      const [ocrUsed, setOcrUsed] = useState(false);
      const [ocrConfidence, setOcrConfidence] = useState(null);

      const handleOcrResult = (result) => {
        if (result.amount) setAmount(String(result.amount));
        if (result.date) setDate(result.date);
        if (result.description) {
          setDescription(result.description);
          const detected = detectCategory(result.description);
          if (detected) setCategory(detected);
        }
        if (result.hasReceipt) setHasReceipt(true);
        if (result.ocrUsed) setOcrUsed(true);
        if (result.ocrConfidence) setOcrConfidence(result.ocrConfidence);
      };

      useEffect(() => {
        if (description.length >= 3 && !category) {
          const detected = detectCategory(description);
          if (detected) setCategory(detected);
        }
      }, [description]);

      const isWork = isWorkCategory(category);
      const canSave = Number(amount) > 0 && category;

      const handleSave = () => {
        const expense = { date, amount: Number(amount), description: description || category.split(' (')[0], category, isWork, hasReceipt, clientName: clientName || '', businessPurpose: businessPurpose || '', ocrUsed, ocrConfidence };
        const responses = getSmartResponse(expense, state);
        dispatch({ type: 'ADD_EXPENSE', payload: expense });
        setSmartResponse(responses);
        setSaved(true);
      };

      const handleAnother = () => {
        setAmount(''); setDescription(''); setCategory(''); setHasReceipt(false);
        setClientName(''); setBusinessPurpose('');
        setSmartResponse(null); setSaved(false);
      };

      if (saved && smartResponse) {
        return (
          <div className="screen">
            <h2 style={{textAlign:'center',marginBottom:24}}>Expense Logged</h2>

              <div key={i} className={`smart-response ${msg.type}`}>

              </div>

              <button className="btn btn-primary" onClick={handleAnother}>Log Another</button>
              <button className="btn btn-secondary" onClick={() => navigate('dashboard')}>Done</button>
            </div>
          </div>
        );
      }

      return (
        <div className="screen">
          <TaxYearSelector state={state} dispatch={dispatch} variant="dark" />
          <div className="flex-between mb24">
            <h2>Log Expense</h2>
            <CloseButton onClick={() => navigate('dashboard')} />
          </div>

            <label className="label" htmlFor="f-add-amount">Amount</label>

              <span className="prefix">R</span>

            <label className="label" htmlFor="f-add-desc">Description</label>

            {description.length >= 3 && detectCategory(description) && !category && (
              <div className="small mt12" style={{color:'var(--primary)'}}>Suggested: {detectCategory(description).split(' (')[0]}</div>
            )}
          </div>
          <div className="field">
            <label className="label" htmlFor="f-add-category">Category</label>
            <select id="f-add-category" className="input" value={category} onChange={e => setCategory(e.target.value)}>

              <optgroup label="Personal Expenses">
                {PERSONAL_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </optgroup>
            </select>
            {category && (
              <div className="small mt12">
                {isWork ? <span style={{color:'var(--success)'}}>Deductible work expense</span> : <span style={{color:'var(--text3)'}}>Personal (tracked for budget)</span>}
              </div>

                <label className="label" htmlFor="f-client-name">Who did you meet? (SARS requires this)</label>
