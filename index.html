<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0C" />
  <meta name="description" content="Know your money. Sort your tax. All in one place. Built for South African individuals, freelancers and small businesses." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tax Tjommie" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <title>Tax Tjommie — Know your money. Sort your tax.</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    /* ============================================================
       TAX TJOMMIE v4 — DESIGN SYSTEM TOKENS (dark mode, teal accent)
       Source of truth: DESIGN_SYSTEM.md + 01-review-screen mockup
       ============================================================ */
    :root {
      /* Backgrounds */
      --bg-app:           #0A0A0C;
      --bg-surface:       #14161A;
      --bg-surface-hover: #1A1D22;
      --bg-input:         #14161A;
      --bg-pill:          rgba(20,184,166,0.12);

      /* Borders */
      --border-faint:  rgba(255,255,255,0.06);
      --border-medium: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.14);
      --border-teal:   rgba(20,184,166,0.30);

      /* Teal (the only accent) */
      --teal:        #14B8A6;
      --teal-hover:  #0D9488;
      --teal-dim:    rgba(20,184,166,0.12);
      --teal-glow:   rgba(20,184,166,0.20);

      /* Semantic */
      --amber:     #F59E0B;
      --amber-dim: rgba(245,158,11,0.12);
      --red:       #EF4444;
      --red-dim:   rgba(239,68,68,0.12);
      --green:     #22C55E;
      --green-dim: rgba(34,197,94,0.12);

      /* Text */
      --text-primary:   #F5F5F7;
      --text-secondary: rgba(245,245,247,0.60);
      --text-muted:     rgba(245,245,247,0.35);
      --text-disabled:  rgba(245,245,247,0.20);
      --text-on-teal:   #0A0A0C;

      /* Type scale */
      --text-hero:    3rem;
      --text-display: 2rem;
      --text-h1:      1.5rem;
      --text-h2:      1.125rem;
      --text-body:    0.9375rem;
      --text-small:   0.8125rem;
      --text-micro:   0.75rem;

      /* Radii */
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;

      /* Spacing (4px grid) */
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;

      /* Shadows (minimal on dark) */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.30);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.40);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.50);

      /* Motion */
      --motion-fast:   150ms;
      --motion-medium: 240ms;
      --motion-slow:   400ms;
      --motion-hero:   800ms;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'General Sans', 'Satoshi', 'Inter Display', -apple-system, sans-serif;
      font-feature-settings: 'tnum' on, 'ss01' on;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      background: var(--bg-app);
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; background: none; border: none; padding: 0; }
    a { color: inherit; text-decoration: none; }
    input, textarea { outline: none; }

    /* ============================================================
       LAYOUT — mobile-first phone frame
       ============================================================ */
    #root { min-height: 100vh; min-height: 100dvh; }

    .phone {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg-app);
    }

    .screen {
      flex: 1;
      padding: 16px 16px 24px;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      animation: screenFade var(--motion-medium) ease-out;
    }
    .screen.has-nav { padding-bottom: 95px; }
    @keyframes screenFade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       TYPOGRAPHY
       ============================================================ */
    .t-hero {
      font-size: var(--text-hero);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--teal);
      font-variant-numeric: tabular-nums;
    }
    .t-display { font-size: var(--text-display); font-weight: 600; letter-spacing: -0.01em; line-height: 1.15; }
    .t-h1      { font-size: var(--text-h1); font-weight: 600; letter-spacing: -0.01em; line-height: 1.25; }
    .t-h2      { font-size: var(--text-h2); font-weight: 600; line-height: 1.35; }
    .t-body    { font-size: var(--text-body); line-height: 1.55; }
    .t-small   { font-size: var(--text-small); line-height: 1.5; color: var(--text-secondary); }
    .t-micro   { font-size: var(--text-micro); line-height: 1.4; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .t-muted   { color: var(--text-muted); }
    .t-secondary { color: var(--text-secondary); }
    .t-teal    { color: var(--teal); }
    .t-amber   { color: var(--amber); }
    .t-red     { color: var(--red); }
    .t-green   { color: var(--green); }
    .t-tabular { font-variant-numeric: tabular-nums; }
    .t-right   { text-align: right; }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px 16px;
      min-height: 44px;
    }
    .header-title {
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--text-primary);
    }
    .header-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-full);
      color: var(--text-primary);
      transition: background var(--motion-fast) ease-out;
    }
    .header-btn:active { background: var(--bg-surface-hover); }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      height: 56px;
      padding: 0 24px;
      border-radius: var(--radius-lg);
      font-size: var(--text-body);
      font-weight: 600;
      transition: background var(--motion-fast) ease-out, transform var(--motion-fast);
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--teal);
      color: var(--text-on-teal);
    }
    .btn-primary:active { background: var(--teal-hover); }
    .btn-primary:disabled {
      background: rgba(20,184,166,0.30);
      color: rgba(10,10,12,0.6);
      cursor: not-allowed;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      height: 48px;
    }
    .btn-ghost:active { background: var(--bg-surface-hover); }
    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.30);
      height: 48px;
    }
    .btn-link {
      background: transparent;
      color: var(--teal);
      font-weight: 500;
      font-size: var(--text-body);
      padding: 12px 16px;
      width: auto;
      height: auto;
    }
    .btn-text {
      background: transparent;
      color: var(--text-secondary);
      font-size: var(--text-small);
      padding: 8px 12px;
      width: auto;
      height: auto;
    }

    /* ============================================================
       PILLS + CHIPS
       ============================================================ */
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--bg-pill);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: var(--radius-full);
      font-size: var(--text-small);
      font-weight: 500;
    }
    .pill-check {
      width: 16px; height: 16px;
      border-radius: var(--radius-full);
      background: var(--teal);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-on-teal);
      flex-shrink: 0;
    }
    .pill-amber {
      background: var(--amber-dim);
      color: var(--amber);
    }
    .pill-red {
      background: var(--red-dim);
      color: var(--red);
    }

    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      background: var(--bg-surface);
      border: 1px solid var(--border-faint);
      font-size: var(--text-small);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--motion-fast);
    }
    .chip-active {
      background: var(--teal-dim);
      border-color: var(--border-teal);
      color: var(--teal);
    }

    /* ============================================================
       CARDS
       ============================================================ */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-6);
    }
    .card-hero {
      background: var(--bg-surface);
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
    }
    .card-pad-sm { padding: 16px; }

    /* ============================================================
       INPUTS
       ============================================================ */
    .input-label {
      display: block;
      font-size: var(--text-small);
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .input {
      width: 100%;
      height: 56px;
      background: var(--bg-input);
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-md);
      padding: 0 16px;
      font-size: var(--text-body);
      color: var(--text-primary);
      transition: border-color var(--motion-fast), box-shadow var(--motion-fast);
    }
    .input:focus {
      border-color: var(--border-teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }
    .input::placeholder { color: var(--text-muted); }
    textarea.input { height: auto; min-height: 96px; padding: 14px 16px; resize: vertical; line-height: 1.5; }

    .input-group {
      position: relative;
    }
    .input-prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: var(--text-body);
      pointer-events: none;
      z-index: 1;
    }
    .input-group .input {
      padding-left: 32px;
    }

    .checkbox {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color var(--motion-fast);
    }
    .checkbox:hover { border-color: var(--border-medium); }
    .checkbox-box {
      width: 22px; height: 22px; flex-shrink: 0;
      border-radius: 6px;
      border: 1.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      transition: all var(--motion-fast);
    }
    .checkbox.checked .checkbox-box {
      background: var(--teal);
      border-color: var(--teal);
    }
    .checkbox.checked .checkbox-box svg { color: var(--text-on-teal); }

    /* ============================================================
       TRANSACTION ROW
       ============================================================ */
    .txn-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background var(--motion-fast);
      border-radius: var(--radius-md);
    }
    .txn-row:active { background: var(--bg-surface-hover); }
    .txn-date {
      grid-column: 1 / -1;
      font-size: var(--text-micro);
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .txn-merchant {
      font-size: var(--text-body);
      color: var(--text-primary);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .txn-amount {
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .txn-cat {
      display: flex; align-items: center; gap: 8px;
      font-size: var(--text-small);
      color: var(--text-secondary);
    }
    .cat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-secondary);
    }
    .cat-dot-teal { background: var(--teal); }
    .cat-dot-amber { background: var(--amber); }
    .txn-review {
      display: flex; align-items: center; gap: 6px;
      font-size: var(--text-small);
      color: var(--amber);
      font-weight: 500;
    }

    /* ============================================================
       BOTTOM NAV
       ============================================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-faint);
      padding: 10px 12px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      z-index: 50;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 4px;
      color: var(--text-muted);
      transition: color var(--motion-fast);
      font-size: 10px;
      font-weight: 500;
      border-radius: var(--radius-md);
    }
    .nav-btn.active {
      color: var(--teal);
    }
    .nav-btn-center {
      transform: translateY(-14px);
    }
    .nav-btn-center .nav-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--text-on-teal);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(20,184,166,0.35);
    }

    /* ============================================================
       BOTTOM SHEET
       ============================================================ */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      animation: fadeIn var(--motion-medium) ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg-surface);
      border-radius: 20px 20px 0 0;
      padding: 12px 16px 32px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
      box-shadow: var(--shadow-lg);
      z-index: 101;
      animation: slideUp var(--motion-slow) cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85vh;
      overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border-medium);
      border-radius: var(--radius-full);
      margin: 0 auto 20px;
    }

    /* ============================================================
       PROGRESS BAR + RING
       ============================================================ */
    .progress-bar {
      height: 6px;
      background: var(--border-faint);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--teal);
      border-radius: var(--radius-full);
      transition: width var(--motion-hero) ease-out;
    }
    .progress-bar-fill.amber { background: var(--amber); }
    .progress-bar-fill.red { background: var(--red); }
    .progress-bar-fill.green { background: var(--green); }

    /* ============================================================
       UPLOAD ZONE
       ============================================================ */
    .upload-zone {
      border: 2px dashed var(--border-medium);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      transition: all var(--motion-medium);
      background: var(--bg-surface);
      cursor: pointer;
      text-align: center;
    }
    .upload-zone.drag-over {
      border-color: var(--teal);
      background: var(--teal-dim);
    }
    .upload-icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--teal-dim);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal);
      margin-bottom: 4px;
    }

    /* ============================================================
       TJOMMIE AVATAR (monogram — small, restrained)
       ============================================================ */
    .tjommie {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-hover) 100%);
      color: var(--text-on-teal);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .tjommie-lg {
      width: 96px; height: 96px;
      font-size: 32px;
    }
    .tjommie-pulse {
      animation: tjommiePulse 2.4s ease-in-out infinite;
    }
    @keyframes tjommiePulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--teal-glow); transform: scale(1); }
      50%      { box-shadow: 0 0 0 12px rgba(20,184,166,0); transform: scale(1.03); }
    }

    /* ============================================================
       HELPERS
       ============================================================ */
    .flex       { display: flex; }
    .flex-col   { display: flex; flex-direction: column; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .gap-5 { gap: 20px; }
    .gap-6 { gap: 24px; }
    .flex-1 { flex: 1; }
    .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; } .mt-6 { margin-top: 24px; }
    .mt-8 { margin-top: 32px; } .mt-10 { margin-top: 40px; } .mt-12 { margin-top: 48px; }
    .mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; } .mb-5 { margin-bottom: 20px; } .mb-6 { margin-bottom: 24px; }
    .mb-8 { margin-bottom: 32px; }
    .w-full { width: 100%; }
    .text-center { text-align: center; }
    .divider { height: 1px; background: var(--border-faint); margin: 16px 0; }
    .grid { display: grid; }
    .grid-2 { grid-template-columns: 1fr 1fr; gap: 12px; }
    .relative { position: relative; }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast-container {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top, 0px));
      left: 50%; transform: translateX(-50%);
      z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
      max-width: 400px;
      width: calc(100% - 32px);
    }
    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-md);
      background: var(--bg-surface-hover);
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      font-size: var(--text-small);
      box-shadow: var(--shadow-lg);
      animation: toastIn var(--motion-medium) ease-out;
      pointer-events: auto;
      text-align: center;
    }
    .toast.success { border-color: var(--teal); }
    .toast.error { border-color: var(--red); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    /* Hide file input */
    input[type="file"].sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); border: 0;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Processing ticker */
    .ticker {
      overflow: hidden;
      mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
      height: 120px;
    }
    .ticker-inner {
      animation: tickerScroll 10s linear infinite;
    }
    @keyframes tickerScroll {
      from { transform: translateY(0); }
      to { transform: translateY(-50%); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    /* ================================================================

    /* ===== TAX TABLES (preserve v3 exactly — see PRESERVATION_LIST §1.1) ===== */
    const TAX_TABLES = {
      '2025/26': {
        brackets: [
          { upTo: 237100,  rate: 0.18, base: 0,      above: 0 },
          { upTo: 370500,  rate: 0.26, base: 42678,  above: 237100 },
          { upTo: 512800,  rate: 0.31, base: 77362,  above: 370500 },
          { upTo: 673000,  rate: 0.36, base: 121475, above: 512800 },

        rebates: { primary: 17235, secondary: 9444, tertiary: 3145 },

        brackets: [
          { upTo: 237100,  rate: 0.18, base: 0,      above: 0 },
          { upTo: 370500,  rate: 0.26, base: 42678,  above: 237100 },

          { upTo: 673000,  rate: 0.36, base: 121475, above: 512800 },

          { upTo: 1817000, rate: 0.41, base: 251258, above: 857900 },
          { upTo: Infinity,rate: 0.45, base: 644489, above: 1817000 },
        ],
        rebates: { primary: 17235, secondary: 9444, tertiary: 3145 },
        thresholds: { under65: 95750, age65to74: 148217, age75plus: 165689 },
        medCredits: { main: 364, first: 364, additional: 246 },
        interestExemption: 23800,
        raDeductionCap: 350000,
        raPercentCap: 0.275,

    };

    const Tax = {
      tables: (year) => TAX_TABLES[year] || TAX_TABLES['2025/26'],
      calc(taxableIncome, year = '2025/26') {
        if (taxableIncome <= 0) return 0;
        const b = Tax.tables(year).brackets;
        for (const t of b) {
          if (taxableIncome <= t.upTo) return t.base + (taxableIncome - t.above) * t.rate;
        }
        const last = b[b.length - 1];
        return last.base + (taxableIncome - last.above) * last.rate;
      },
      rate(taxableIncome, year = '2025/26') {
        if (taxableIncome <= 0) return 0.18;
        const b = Tax.tables(year).brackets;
        for (const t of b) { if (taxableIncome <= t.upTo) return t.rate; }
        return b[b.length - 1].rate;
      },
      raDeduction(monthlyRA, annualIncome, year = '2025/26') {
        const t = Tax.tables(year);
        const annualRA = (monthlyRA || 0) * 12;
        return Math.min(annualRA, (annualIncome || 0) * t.raPercentCap, t.raDeductionCap);
      },
      medCredit(members = 1, dependents = 0, year = '2025/26') {
        const t = Tax.tables(year).medCredits;
        if (members < 1) return 0;
        const main = t.main;
        const first = members >= 2 || dependents >= 1 ? t.first : 0;
        const remaining = Math.max(0, members - 2) + Math.max(0, dependents - (members >= 2 ? 0 : 1));
        return (main + first + remaining * t.additional) * 12;
      },
      medOOP(oopAmount, taxableIncome) {
        return Math.max(0, (oopAmount || 0) - (taxableIncome || 0) * 0.075) * 0.25;
      },
      primaryRebate(year = '2025/26', age = 35) {
        const r = Tax.tables(year).rebates;
        let total = r.primary;
        if (age >= 65) total += r.secondary;
        if (age >= 75) total += r.tertiary;
        return total;
      },
      estimate(userData) {
        const year = userData.user?.taxYear || '2025/26';
        const annualIncome = (userData.user?.monthlyGross || 0) * 12;
        const tp = userData.taxProfile || {};
        // v5: retired users get secondary/tertiary rebates automatically if age not set
        // (spec §6.5: "Secondary rebate and tertiary rebate (age 65+, 75+) applied automatically")
        const effectiveAge = userData.user?.age ||
          (userData.user?.userType === 'retired' ? 67 : 35);

        // Home Office
        const ho = tp.homeOffice || {};
        const homeOfficeAnnual = ho.enabled
          ? ((ho.monthlyRent || 0) + (ho.monthlyElectricity || 0) + (ho.monthlyInternet || 0) +
             (ho.monthlyWater || 0) + (ho.monthlySecurity || 0) + (ho.monthlyHomeInsurance || 0))
             * 12 * ((ho.percentage || 0) / 100)
          : 0;

        // Vehicle
        const tr = tp.travel || {};
        const travelAnnual = tr.enabled
          ? ((tr.monthlyFuel || 0) + (tr.monthlyInsurance || 0)) * 12 * ((tr.workPercentage || 0) / 100)
            + (tr.recentRepairs || 0) * ((tr.workPercentage || 0) / 100)
          : 0;

        // Phone
        const ph = tp.phone || {};
        const phoneAnnual = ph.enabled ? (ph.monthlyBill || 0) * 12 * ((ph.workPercentage || 0) / 100) : 0;

        // Equipment — straight-line depreciation
        const eq = tp.equipment || { items: [] };
        const equipAnnual = eq.enabled
          ? (eq.items || []).reduce((sum, i) => sum + ((i.cost || 0) / (i.years || 3)) * ((i.workPct || 100)/100), 0)
          : 0;

        // Professional fees
        const pf = tp.professionalFees || { items: [] };
        const profAnnual = pf.enabled
          ? (pf.items || []).reduce((sum, i) => sum + (i.annualAmount || 0), 0)
          : 0;

        // Marketing
        const mk = tp.marketing || { items: [] };
        const mkAnnual = mk.enabled
          ? (mk.items || []).reduce((sum, i) => sum + (i.annualAmount || 0), 0)
          : 0;

        // Retirement
        const ra = tp.retirement || {};
        const raAnnual = ra.enabled ? Tax.raDeduction(ra.monthlyRA, annualIncome, year) : 0;

        // Medical
        const med = tp.medical || {};
        const medCreditAnnual = med.enabled ? Tax.medCredit(med.members, med.dependents, year) : 0;

        // Donations (capped 10% of taxable income)
        const don = tp.donations || {};
        const preDonationTaxable = Math.max(0, annualIncome - (homeOfficeAnnual + travelAnnual + phoneAnnual + equipAnnual + profAnnual + mkAnnual + raAnnual));
        const donationAnnual = don.enabled ? Math.min(don.annualAmount || 0, preDonationTaxable * 0.10) : 0;

        // Bad debts, loan interest
        const bd = tp.badDebts || {};
        const bdAnnual = bd.enabled ? (bd.annualAmount || 0) : 0;
        const bl = tp.businessLoanInterest || {};
        const blAnnual = bl.enabled ? (bl.annualAmount || 0) : 0;

        // Additional from logged expenses this year
        const txns = (userData.transactions || []).filter(t => t.taxYear === year && t.isDeductible);
        const txnDeductible = txns.reduce((sum, t) => sum + Math.abs(t.amount || 0), 0);

        const totalDeductions = homeOfficeAnnual + travelAnnual + phoneAnnual + equipAnnual + profAnnual + mkAnnual + raAnnual + donationAnnual + bdAnnual + blAnnual + txnDeductible;
        const taxableIncome = Math.max(0, annualIncome - totalDeductions);
        const taxBeforeRebate = Tax.calc(taxableIncome, year);
        const rebate = Tax.primaryRebate(year, effectiveAge);
        const taxAfterRebate = Math.max(0, taxBeforeRebate - rebate);
        const netTax = Math.max(0, taxAfterRebate - medCreditAnnual - Tax.medOOP(tp.medical?.oopAmount, taxableIncome));

        const taxWithoutDeductions = Math.max(0, Tax.calc(annualIncome, year) - rebate - medCreditAnnual);
        const savings = Math.max(0, taxWithoutDeductions - netTax);

        return {
          annualIncome,
          totalDeductions,
          taxableIncome,
          breakdown: {
            homeOffice: homeOfficeAnnual,
            travel: travelAnnual,
            phone: phoneAnnual,
            equipment: equipAnnual,
            professional: profAnnual,
            marketing: mkAnnual,
            retirement: raAnnual,
            donations: donationAnnual,
            badDebts: bdAnnual,
            loanInterest: blAnnual,
            expenses: txnDeductible,
          },
          taxBeforeRebate,
          rebate,
          medCreditAnnual,
          total: netTax,
          monthly: netTax / 12,
          rate: Tax.rate(taxableIncome, year),
          effectiveRate: annualIncome > 0 ? netTax / annualIncome : 0,
          taxWithoutDeductions,
          savings,
        };
      },
    };

    /* ===== SA CATEGORY SYSTEM (per REBUILD_SPEC §4.5) ===== */

    /* ===== PROV TAX DATES ===== */
    function getProvTaxDates(taxYear) {
      const startYear = parseInt(taxYear.split('/')[0], 10);
      const endYear = startYear + 1;
      const isLeap = (endYear % 4 === 0 && endYear % 100 !== 0) || (endYear % 400 === 0);

    /* ===== UTILITIES ===== */
    const fmtZAR = (n, opts = {}) => {
      const value = Number(n) || 0;
      const abs = Math.abs(value);
      if (opts.compact && abs >= 1000) {
        if (abs >= 1e6) return `R ${(value/1e6).toFixed(1)}M`;
        return `R ${Math.round(value/1000)}k`;
      }
      const showCents = opts.forceCents || abs < 100;
      // Spec/mockup mandate comma thousand-separator, dot decimal — use en-US then prefix "R ".
      return 'R ' + value.toLocaleString('en-US', {
        minimumFractionDigits: showCents ? 2 : 0,
        maximumFractionDigits: showCents ? 2 : 0,
      });
    };

    const fmtDate = (isoOrDate) => {
      if (!isoOrDate) return '';
      const d = typeof isoOrDate === 'string' ? new Date(isoOrDate) : isoOrDate;
      if (isNaN(d.getTime())) return '';
      const today = new Date();
      const same = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      const yest = new Date(today); yest.setDate(today.getDate() - 1);
      if (same(d, today)) return 'Today';
      if (same(d, yest)) return 'Yesterday';
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dayStr = `${d.getDate()} ${months[d.getMonth()]}`;
      return d.getFullYear() === today.getFullYear() ? dayStr : `${dayStr} ${d.getFullYear()}`;
    };

    const fmtDateUpper = (iso) => {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      return `${d.getDate()} ${months[d.getMonth()]}`;
    };

    const taxYearForDate = (iso) => {
      // SA tax year: 1 Mar → 28/29 Feb. If month >= 3 → year starts that year.
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '2025/26';
      const y = d.getFullYear();
      const m = d.getMonth(); // 0-indexed
      const start = m >= 2 ? y : y - 1;
      const end = (start + 1) % 100;
      return `${start}/${String(end).padStart(2,'0')}`;
    };

    const uid = (prefix = 'id') => `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2, 7)}`;

    /** Shorten a filename to ≤14 chars for the Review screen tab labels. */
    function shortenFileName(name) {
      if (!name) return 'Unknown';
      const base = name.replace(/\.(csv|pdf|png|jpe?g|webp|heic)$/i, '');
      // Extract a meaningful label — e.g. "FNB Cheque March 2026.pdf" → "Cheque"
      if (/cheque|current/i.test(base)) return 'Cheque';
      if (/credit|cc\b/i.test(base))    return 'Credit';
      if (/savings/i.test(base))        return 'Savings';
      if (/receipt|slip/i.test(base))   return 'Receipt';
      return base.slice(0, 14);
    }

    /** Singular/plural helper — fixes "1 expenses logged" → "1 expense logged" */
    function plural(n, singular, p) {
      return `${n} ${n === 1 ? singular : (p || singular + 's')}`;

    /* ===== STORAGE + MIGRATION ===== */

      budget: {

        month: new Date().toISOString().slice(0,7),
      },

        cloudBackupProvider: null,    // NEW v5: 'google_drive' | 'icloud' | null
        cloudBackupEnabled: false,
        lastBackup: null,
        lastExport: null,
        lastImport: null,
      },
    });

    function loadState() {
      try {
        // Already on v5?
        const rawV5 = localStorage.getItem(STORAGE_KEY);
        if (rawV5) {
          const parsed = JSON.parse(rawV5);
          // Defensive merge with default shape so new v5 fields fill in on partial state.
          return deepMerge(emptyState(), parsed);
        }
        // Migrate from v4 → v5 if present
        const rawV4 = localStorage.getItem(LEGACY_KEY_V4);
        if (rawV4) {
          const v4 = JSON.parse(rawV4);
          const migrated = migrateFromV4(v4);
          return { ...migrated, _migrated: true, _migratedFrom: 'v4' };
        }
        // Or v3 → v5 via v4 shape
        const rawV3 = localStorage.getItem(LEGACY_KEY_V3);
        if (rawV3) {
          const v3 = JSON.parse(rawV3);
          const asV4 = migrateFromV3(v3);
          const asV5 = migrateFromV4(asV4);
          return { ...asV5, _migrated: true, _migratedFrom: 'v3' };
        }
      } catch (e) {
        console.warn('loadState failed', e);
      }
      return emptyState();
    }

    function deepMerge(target, source) {
      const out = { ...target };
      for (const key of Object.keys(source || {})) {
        const tv = target[key];
        const sv = source[key];
        if (sv && typeof sv === 'object' && !Array.isArray(sv) && tv && typeof tv === 'object' && !Array.isArray(tv)) {
          out[key] = deepMerge(tv, sv);
        } else {
          out[key] = sv;
        }
      }
      return out;
    }

    /* v4 → v5 migration (AI_AND_PRIVACY.md §4 + spec §10) */
    function migrateFromV4(v4) {
      const base = emptyState();
      const next = deepMerge(base, v4 || {});
      // User: map old userType → v5 5-type set, add occupation default
      const prevUserType = v4?.user?.userType;
      const mapType = {
        individual: 'salaried',          // v4 individuals were mostly salaried
        sole_prop:  'freelancer',
        sme:        'small_business',
      };
      next.user = {
        ...base.user,
        ...(v4?.user || {}),
        userType:   mapType[prevUserType] || prevUserType || 'freelancer',
        occupation: v4?.user?.occupation || '',
        version:    APP_VERSION,
      };
      // Transactions: add v5 fields with safe defaults
      next.transactions = (v4?.transactions || []).map(t => ({
        sourceFile: null,
        receiptId: null,
        subcategoryBreakdown: null,
        ...t,
      }));
      // Budget: ensure subcategorySpend exists
      next.budget = {
        ...base.budget,
        ...(v4?.budget || {}),
        subcategorySpend: v4?.budget?.subcategorySpend || {},
      };
      // Settings: fold in new privacy/backup defaults
      next.settings = {
        ...base.settings,
        ...(v4?.settings || {}),
      };
      return next;
    }

    function migrateFromV3(v3) {
      const s = emptyState();
      // User
      if (v3.user) {
        s.user.name = v3.user.name || '';
        s.user.monthlyGross = v3.user.monthlyGross || 0;
        s.user.taxYear = v3.user.taxYear || '2025/26';
        s.user.userType = v3.user.occupation ? 'sole_prop' : 'individual';
        s.user.onboardingComplete = !!v3.user.setupComplete;
      }
      // TaxProfile — same keys, fine to spread
      if (v3.taxProfile) {
        s.taxProfile = { ...s.taxProfile };
        Object.keys(v3.taxProfile).forEach(k => {
          if (s.taxProfile[k]) s.taxProfile[k] = { ...s.taxProfile[k], ...v3.taxProfile[k] };
        });
      }
      // Expenses → Transactions
      if (Array.isArray(v3.expenses)) {
        s.transactions = v3.expenses.map(e => ({
          id: e.id || uid('txn'),
          accountId: 'acc_main',
          date: e.date || new Date().toISOString().slice(0,10),
          description: e.description || e.note || 'Expense',
          amount: -(Math.abs(e.amount || 0)),
          category: mapV3Category(e.category),
          source: 'manual',
          confidence: 1,
          needsReview: false,
          userConfirmed: true,
          isDeductible: /work|business|office|vehicle|phone|equipment|software|professional|marketing|entertainment|training|subcontract|bank|stationery/i.test(e.category || ''),
          complianceNote: e.complianceNote || null,
          taxYear: e.taxYear || taxYearForDate(e.date || new Date().toISOString().slice(0,10)),
          receiptAttached: !!e.hasReceipt,
          createdAt: e.createdAt || new Date().toISOString(),
        }));
      }
      if (Array.isArray(v3.backpocket)) s.backpocket = v3.backpocket;
      if (v3.provTaxPaid) s.provTaxPaid = { ...s.provTaxPaid, ...v3.provTaxPaid };
      if (v3.settings) s.settings = { ...s.settings, ...v3.settings };
      s._migrated = true;
      return s;
    }

    function mapV3Category(v3cat) {
      if (!v3cat) return 'uncategorised';
      const c = v3cat.toLowerCase();
      if (c.includes('home office')) return 'home_office';
      if (c.includes('vehicle') || c.includes('travel')) return 'vehicle_travel';
      if (c.includes('phone')) return 'phone_internet';
      if (c.includes('equipment')) return 'equipment';
      if (c.includes('software')) return 'software';
      if (c.includes('professional')) return 'professional_services';
      if (c.includes('marketing')) return 'marketing';
      if (c.includes('stationery') || c.includes('office supplies')) return 'office_supplies';
      if (c.includes('entertainment') && c.includes('client')) return 'client_entertainment';
      if (c.includes('training')) return 'training';
      if (c.includes('subcontract')) return 'subcontractors';
      if (c.includes('bank')) return 'bank_charges';
      if (c.includes('grocer')) return 'groceries';
      if (c.includes('eating out') || c.includes('dining') || c.includes('restaurant')) return 'eating_out';
      if (c.includes('medical')) return 'medical';
      if (c.includes('insurance')) return 'insurance_personal';
      if (c.includes('cloth')) return 'clothing';
      if (c.includes('subscription')) return 'subscriptions_personal';
      if (c.includes('housing') || c.includes('rent')) return 'housing';
      return 'other_personal';
    }

    // Batched write
    let saveTimer = null;
    function queueSave(state) {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        catch (e) { console.warn('save failed', e); }
      }, 300);
    }

    /* ===== AI PIPELINE — client-side sanitisation (AI_AND_PRIVACY.md §2.2) ===== */
    /** Strip PII from a transaction description. Server re-applies this; belt and braces. */
    function sanitiseDescription(description) {
      return String(description || '')
        .replace(/\b\d{10,}\b/g, '[REF]')                          // account numbers ≥10 digits
        .replace(/\b\d{4}[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b/g, '[CARD]')  // 16-digit card
        .replace(/\b[A-Z0-9]{12,}\b/gi, '[REF]')                   // long alphanumeric refs
        .replace(/\b\d{13}\b/g, '[ID]')                            // SA ID number
        .replace(/\b0\d{9}\b/g, '[PHONE]')                         // SA phone
        .slice(0, 200);
    }

    function sanitiseRow(row) {
      return {
        date: row.date ? String(row.date).slice(0, 10) : '',
        description: sanitiseDescription(row.description),
        amount: typeof row.amount === 'number' ? row.amount : parseFloat(row.amount) || 0,
      };
    }

    /** Build the context payload sent with every AI request (userType + occupation). */
    function aiContextFrom(state) {
      return {
        userType: state?.user?.userType || null,
        occupation: state?.user?.occupation || null,
      };
    }

    /**
     * Categorise sanitised transaction rows via /api/categorise.
     * `options`: { context, skipAi } — when skipAi is true, we run the local fallback only.
     */
    async function categoriseBatch(rows, options = {}) {
      const sanitised = rows.map(sanitiseRow);
      const { context = null, skipAi = false } = options;

      if (skipAi) {
        return sanitised.map(r => ({
          ...r,
          category: localKeywordFallback(r.description, r.amount),
          confidence: 0.4,
          needsReview: true,
        }));
      }

      try {
        const res = await fetch('/api/categorise', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transactions: sanitised, context }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `API ${res.status}`);
        }
        const data = await res.json();
        return data.results || [];
      } catch (err) {
        console.warn('AI categorise failed, using fallback:', err);
        return sanitised.map(r => ({
          ...r,
          category: localKeywordFallback(r.description, r.amount),
          confidence: 0.3,
          needsReview: true,
        }));
      }
    }

    /** Send a base64'd PDF or image to /api/categorise-file. Returns array of categorised rows. */
    async function categoriseFile(file, options = {}) {
      const { context = null } = options;
      const base64 = await fileToBase64(file);
      const fileType = /\.pdf$/i.test(file.name) ? 'pdf' : 'image';
      const res = await fetch('/api/categorise-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileType, base64, filename: file.name, context }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || err.error || `API ${res.status}`);
      }
      const data = await res.json();
      return data.results || [];
    }

    /** Send a base64'd receipt image to /api/extract-receipt. Returns full receipt object. */
    async function extractReceipt(file, options = {}) {
      const { context = null } = options;
      const base64 = await fileToBase64(file);
      const res = await fetch('/api/extract-receipt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ base64, context }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || err.error || `API ${res.status}`);
      }
      return await res.json();
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          // Strip the `data:<mime>;base64,` prefix — server expects raw b64
          const raw = String(reader.result || '').split(',').pop() || '';
          resolve(raw);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* ===== IndexedDB for receipt images (AI_AND_PRIVACY.md §4.2) =====
       localStorage would blow past its ~5MB quota after a handful of receipts.
       IndexedDB scales into hundreds of MB and gives us per-transaction addressable
       storage without loading everything into memory. */
    const RECEIPT_DB  = 'tax_tjommie_media';
    const RECEIPT_STORE = 'receipts';

    function openReceiptDB() {
      return new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) { reject(new Error('no_indexeddb')); return; }
        const req = indexedDB.open(RECEIPT_DB, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(RECEIPT_STORE)) {
            db.createObjectStore(RECEIPT_STORE, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
      });
    }

    async function saveReceiptImage(id, base64, mimeType = 'image/jpeg') {
      try {
        const db = await openReceiptDB();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(RECEIPT_STORE, 'readwrite');
          tx.objectStore(RECEIPT_STORE).put({
            id, base64, mimeType,
            uploadedAt: new Date().toISOString(),
            fileSize: Math.round(base64.length * 0.75),
          });
          tx.oncomplete = () => resolve(id);
          tx.onerror    = () => reject(tx.error);
        });
      } catch (e) {
        console.warn('receipt save failed', e);
        return null;
      }
    }

    async function loadReceiptImage(id) {
      try {
        const db = await openReceiptDB();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(RECEIPT_STORE, 'readonly');
          const req = tx.objectStore(RECEIPT_STORE).get(id);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror   = () => reject(req.error);
        });
      } catch { return null; }
    }

    async function deleteReceiptImage(id) {
      try {
        const db = await openReceiptDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(RECEIPT_STORE, 'readwrite');
          tx.objectStore(RECEIPT_STORE).delete(id);
          tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
        });
      } catch {}
    }

    async function estimateStorageUsed() {
      if (!navigator.storage?.estimate) return null;
      try {
        const e = await navigator.storage.estimate();
        return { used: e.usage || 0, quota: e.quota || 0 };
      } catch { return null; }
    }

    /* ===== Encrypted backup (AI_AND_PRIVACY.md §5.4) =====
       AES-GCM, key derived from a user passphrase via PBKDF2.
       Backup JSON → encrypted blob → downloaded or (future) synced to Drive. */
    const BACKUP_SALT = new Uint8Array([84, 97, 120, 84, 74, 77, 66, 65, 67, 75, 85, 80]); // "TaxTJMBACKUP"
    const BACKUP_ITERATIONS = 210000;

    async function deriveBackupKey(passphrase) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: BACKUP_SALT, iterations: BACKUP_ITERATIONS, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptBackup(data, passphrase) {
      const key = await deriveBackupKey(passphrase);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const enc = new TextEncoder();
      const plaintext = enc.encode(JSON.stringify(data));
      const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
      return {
        format: 'tt-backup-v1',
        version: APP_VERSION,
        createdAt: new Date().toISOString(),
        iv: Array.from(iv),
        ciphertext: bufferToBase64(ciphertext),
      };
    }

    async function decryptBackup(envelope, passphrase) {
      if (envelope?.format !== 'tt-backup-v1') throw new Error('unknown_format');
      const key = await deriveBackupKey(passphrase);
      const iv = new Uint8Array(envelope.iv);
      const ciphertext = base64ToBuffer(envelope.ciphertext);
      const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      const dec = new TextDecoder();
      return JSON.parse(dec.decode(plaintext));
    }

    function bufferToBase64(buf) {
      const bytes = new Uint8Array(buf);
      let s = '';
      for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
      return btoa(s);
    }
    function base64ToBuffer(b64) {
      const s = atob(b64);
      const bytes = new Uint8Array(s.length);
      for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
      return bytes.buffer;
    }

    function localKeywordFallback(desc, amount) {
      const d = (desc || '').toLowerCase();
      if (/fuel|petrol|diesel|engen|sasol|caltex|shell|bp\b/.test(d)) return 'vehicle_travel';
      if (/uber|bolt|taxi|e-?toll|parking|sanral/.test(d)) return 'vehicle_travel';
      if (/adobe|github|figma|canva|notion|slack|zoom|dropbox|hosting|office 365|microsoft 365/.test(d)) return 'software';
      if (/woolworths|pick n pay|checkers|spar|shoprite|food lover/.test(d)) return 'groceries';
      if (/netflix|spotify|dstv|showmax|apple music|disney\+/.test(d)) return 'subscriptions_personal';
      if (/vodacom|mtn|cell c|telkom|rain|afrihost/.test(d)) return 'phone_internet';
      if (/eskom|electricity|municipal/.test(d)) return 'home_office';
      if (/takealot/.test(d)) return amount < -2000 ? 'equipment' : 'other_personal';
      if (/clicks|dis-chem|pharmacy/.test(d)) return 'medical';
      if (/atm|cash withdrawal|transfer|debit order|bank charge/.test(d)) return amount < -100 && /bank charge/.test(d) ? 'bank_charges' : 'ignore';
      return amount > 0 ? 'ignore' : 'other_personal';
    }

    /* ===== FILE PARSING ===== */
    async function parseCSV(file) {
      return new Promise((resolve, reject) => {
        Papa.parse(file, {
          header: true,
          dynamicTyping: true,
          skipEmptyLines: true,
          complete: (res) => {
            const rows = res.data || [];
            const mapped = rows.map(r => mapCSVRow(r)).filter(r => r.description && !isNaN(r.amount));
            resolve(mapped);
          },
          error: reject,
        });
      });
    }

    function mapCSVRow(row) {
      // Find date / description / amount columns regardless of header naming
      const keys = Object.keys(row);
      const lower = keys.reduce((acc, k) => { acc[k.toLowerCase().trim()] = k; return acc; }, {});
      const pick = (candidates) => {
        for (const c of candidates) {
          const key = Object.keys(lower).find(k => k === c || k.includes(c));
          if (key) return row[lower[key]];
        }
        return null;
      };
      const rawDate = pick(['date', 'transaction date', 'posting date', 'posted']);
      const desc = pick(['description', 'narration', 'details', 'merchant', 'reference']);
      const amt = pick(['amount', 'debit', 'credit', 'value', 'transaction amount']);

      let date = '';
      if (rawDate) {
        const d = new Date(rawDate);
        if (!isNaN(d.getTime())) date = d.toISOString().slice(0, 10);
      }
      const amount = typeof amt === 'number' ? amt : parseFloat(String(amt || '').replace(/[, ]/g, '')) || 0;
      return { date, description: String(desc || '').trim(), amount };
    }

    function CurrencyInput({ value, onChange, placeholder = '0', autoFocus }) {
      const [focused, setFocused] = useState(false);
      const [local, setLocal] = useState(value ? String(value) : '');
      useEffect(() => { if (!focused) setLocal(value ? value.toLocaleString('en-ZA') : ''); }, [value, focused]);
      return (
        <div className="input-group">
          <span className="input-prefix">R</span>
          <input
            className="input"
            inputMode="decimal"
            autoFocus={autoFocus}
            placeholder={placeholder}
            value={local}
            onFocus={() => { setFocused(true); setLocal(value ? String(value) : ''); }}
            onBlur={() => { setFocused(false); }}
            onChange={e => {
              const clean = e.target.value.replace(/[^\d.]/g, '');
              setLocal(clean);
              onChange(clean === '' ? 0 : parseFloat(clean) || 0);
            }}
          />
        </div>
      );
    }

    function ProgressRing({ value, size = 64, stroke = 6 }) {
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const offset = c - Math.min(value, 1) * c;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border-faint)" strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--teal)" strokeWidth={stroke}
                  strokeDasharray={c} strokeDashoffset={offset}
                  strokeLinecap="round"
                  transform={`rotate(-90 ${size/2} ${size/2})`}
                  style={{ transition: 'stroke-dashoffset 800ms ease-out' }} />
        </svg>
      );
    }

    function Sheet({ open, onClose, children, title }) {
      useEffect(() => {
        if (!open) return;
        const onKey = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [open, onClose]);
      if (!open) return null;
      return (
        <>
          <div className="sheet-overlay" onClick={onClose} />
          <div className="sheet" role="dialog" aria-modal="true">
            <div className="sheet-handle" />
            {title && (
              <div className="flex items-center justify-between mb-4">
                <h3 className="t-h2">{title}</h3>
                <button className="header-btn" onClick={onClose} aria-label="Close"><Icon name="close" size={20} /></button>
              </div>
            )}
            {children}
          </div>
        </>
      );
    }

    function Toast({ toasts }) {
      return (
        <div className="toast-container">
          {toasts.map(t => <div key={t.id} className={`toast ${t.type || ''}`}>{t.message}</div>)}
        </div>
      );
    }

    function CountUp({ target, duration = 800, format = fmtZAR, className }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        let raf; const start = performance.now();
        const step = (t) => {
          const p = Math.min(1, (t - start) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(target * eased);
          if (p < 1) raf = requestAnimationFrame(step);
          else setVal(target);
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, [target, duration]);
      return <span className={className}>{format(val)}</span>;
    }

    function CatDot({ category }) {
      const meta = CATEGORIES[category] || CATEGORIES.uncategorised;
      const cls = meta.dot === 'teal' ? 'cat-dot cat-dot-teal' : 'cat-dot';
      return <span className={cls}></span>;
    }

    function TransactionRow({ txn, onClick }) {
      const meta = CATEGORIES[txn.category] || CATEGORIES.uncategorised;
      return (
        <div className="txn-row card" onClick={onClick}>
          <div className="txn-date">{fmtDateUpper(txn.date)}</div>
          <div className="txn-merchant">{txn.description}</div>
          <div className="txn-amount t-right">{fmtZAR(Math.abs(txn.amount))}</div>
          {txn.needsReview ? (
            <div className="txn-review" style={{gridColumn: '1 / -1'}}>
              <Icon name="warning" size={14} /> Needs review
            </div>
          ) : (
            <div className="txn-cat" style={{gridColumn: '1 / -1'}}>
              <CatDot category={txn.category} />
              {meta.label}
            </div>
          )}
        </div>
      );
    }

    /* ===========================================================
       ROOT APP + STATE
       =========================================================== */
    const DataContext = React.createContext(null);
    const ToastContext = React.createContext(null);

    function reducer(state, action) {
      switch (action.type) {
        case 'SET': return { ...state, ...action.payload };
        case 'PATCH_USER': return { ...state, user: { ...state.user, ...action.payload } };
        case 'PATCH_PROFILE': {
          const next = { ...state.taxProfile };
          Object.keys(action.payload || {}).forEach(k => {
            next[k] = { ...(state.taxProfile[k] || {}), ...action.payload[k] };
          });
          return { ...state, taxProfile: next };
        }
        case 'PATCH_SETTINGS': return { ...state, settings: { ...state.settings, ...action.payload } };
        case 'ADD_TXNS': return { ...state, transactions: [...(action.payload || []), ...state.transactions] };
        case 'UPDATE_TXN': {
          const list = state.transactions.map(t => t.id === action.payload.id ? { ...t, ...action.payload } : t);
          return { ...state, transactions: list };
        }
        case 'DELETE_TXN': return { ...state, transactions: state.transactions.filter(t => t.id !== action.payload) };
        case 'CONFIRM_ALL': return {
          ...state,
          transactions: state.transactions.map(t => ({ ...t, userConfirmed: true, needsReview: false })),
        };
        case 'SET_BUDGET': return { ...state, budget: { ...state.budget, ...action.payload } };
        case 'ADD_GOAL': return { ...state, backpocket: [...state.backpocket, action.payload] };
        case 'UPDATE_GOAL': {
          return { ...state, backpocket: state.backpocket.map(g => g.id === action.payload.id ? { ...g, ...action.payload } : g) };
        }
        case 'DELETE_GOAL': return { ...state, backpocket: state.backpocket.filter(g => g.id !== action.payload) };
        case 'ADD_DEPOSIT': {
          const { goalId, deposit } = action.payload;
          return {
            ...state,
            backpocket: state.backpocket.map(g => g.id === goalId
              ? { ...g, currentAmount: (g.currentAmount || 0) + (deposit.amount || 0), deposits: [...(g.deposits || []), deposit] }
              : g),
          };
        }
        case 'SET_PROV_PAID': {
          const { year, key, value } = action.payload;
          return {
            ...state,
            provTaxPaid: { ...state.provTaxPaid, [year]: { ...(state.provTaxPaid[year] || {}), [key]: value } },
          };
        }
        case 'RESET': return emptyState();
        default: return state;
      }
    }

    function App() {
      const [state, dispatch] = useReducer(reducer, null, () => loadState());
      const [toasts, setToasts] = useState([]);
      const [screen, setScreen] = useState(() => state.user?.onboardingComplete ? 'home' : 'splash');
      const [sheet, setSheet] = useState(null);

      // Persist
      useEffect(() => { queueSave(state); }, [state]);

      // Welcome back toast after migration
      useEffect(() => {
        if (state._migrated && !state.settings.hasSeenOnboarding) {
          showToast('Welcome back. We kept everything from your last setup.', 'success');
        }
      }, []);

      const showToast = useCallback((message, type = '') => {
        const id = uid('toast');
        setToasts(t => [...t, { id, message, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
      }, []);

      const api = useMemo(() => ({
        state, dispatch,
        showToast,
        sheet, setSheet,
        screen, setScreen,
      }), [state, sheet, screen, showToast]);

      return (
        <DataContext.Provider value={api}>
          <ToastContext.Provider value={showToast}>
            <div className="phone">
              <Router />
              {sheet && <Sheet open={!!sheet} onClose={() => setSheet(null)} title={sheet.title}>{sheet.content}</Sheet>}
              <Toast toasts={toasts} />
            </div>
          </ToastContext.Provider>
        </DataContext.Provider>
      );
    }

    function useData() { return React.useContext(DataContext); }

    function Router() {
      const { state, screen } = useData();
      if (!state.user.onboardingComplete) {
        return <OnboardingFlow />;
      }
      return <MainApp />;
    }

    /* ===========================================================
       ONBOARDING FLOW
       =========================================================== */
    function OnboardingFlow() {
      const [step, setStep] = useState('splash');
      const [uploadedTxns, setUploadedTxns] = useState([]);
      const [uploadMeta, setUploadMeta] = useState(null);

      const props = { step, setStep, uploadedTxns, setUploadedTxns, uploadMeta, setUploadMeta };

      return (
        <>
          {step === 'splash'            && <ScreenSplash {...props} />}
          {step === 'userType'          && <ScreenUserType {...props} />}
          {step === 'welcome'           && <ScreenWelcome {...props} />}
          {step === 'occupationPreview' && <ScreenOccupationPreview {...props} />}
          {step === 'upload'            && <ScreenUploadHero {...props} />}
          {step === 'processing'        && <ScreenProcessing {...props} />}
          {step === 'review'            && <ScreenReview {...props} />}
          {step === 'deductions'        && <ScreenDeductionPrompts {...props} />}
          {step === 'budget'            && <ScreenBudgetConfirm {...props} />}
          {step === 'backpocket'        && <ScreenBackpocketSuggest {...props} />}
        </>
      );
    }

            <h1 className="t-display mb-3">Tax Tjommie</h1>

            <div />

    /* ===== Screen 3 — Basic details (modified — income removed, occupation added) ===== */
    function ScreenWelcome({ setStep }) {
      const { state, dispatch } = useData();
      const [name, setName] = useState(state.user.name || '');
      const [occupation, setOccupation] = useState(state.user.occupation || '');

      // Occupation suggestions by user type — nudge users toward our known profiles
      const suggestions = useMemo(() => {

          salaried:       ['Accountant', 'Teacher', 'Nurse', 'Software developer', 'Sales rep'],
          salaried_side:  ['Designer', 'Photographer', 'Consultant', 'Writer'],

          small_business: ['Restaurant owner', 'Plumber', 'Electrician', 'Retail owner', 'Agency director'],

            <div />

    /* ===== Screen 5 — Upload hero (multi-file in v5 — spec §4 Screen 5) ===== */
    function ScreenUploadHero({ setStep, setUploadedTxns, setUploadMeta }) {
      const { state, dispatch, showToast, setSheet } = useData();
      const [dragOver, setDragOver] = useState(false);
      const [busy, setBusy] = useState(false);
      /** Selected files before processing — each entry: { file, id, status } */
      const [pending, setPending] = useState([]);
      const inputRef = useRef(null);

      const fileType = (name) => {
        if (/\.csv$/i.test(name)) return 'csv';
        if (/\.pdf$/i.test(name)) return 'pdf';
        if (/\.(png|jpg|jpeg|heic|webp)$/i.test(name)) return 'image';
        return null;
      };

      const addFiles = (files) => {
        const list = Array.from(files || []);
        if (!list.length) return;
        const accepted = [];
        for (const f of list) {
          if (!fileType(f.name)) {
            showToast(`${f.name}: unsupported format`, 'error');
            continue;
          }
          if (f.size > 10 * 1024 * 1024) {
            showToast(`${f.name}: over 10MB limit`, 'error');
            continue;
          }
          accepted.push({ id: uid('file'), file: f, status: 'pending' });
        }
        setPending(prev => [...prev, ...accepted]);
      };

      const removeFile = (id) => setPending(prev => prev.filter(f => f.id !== id));

      const showPrivacyModal = () => setSheet({
        title: 'Your data stays on your device',
        content: <PrivacyModalBody onAccept={() => setSheet(null)} />,
      });

      const processAll = async () => {
        if (!pending.length) return;
        setBusy(true);

        // Show privacy modal on first-ever upload (AI_AND_PRIVACY.md §7.3)
        if (!state.settings.hasSeenPrivacyModal) {
          await new Promise(resolve => {
            setSheet({
              title: 'Your data stays on your device',
              content: <PrivacyModalBody onAccept={() => { setSheet(null); dispatch({ type: 'PATCH_SETTINGS', payload: { hasSeenPrivacyModal: true }}); resolve(); }} />,
            });
          });
        }

        // Parse each file client-side where possible; PDFs/images flow via /api/categorise-file
        const allRows = [];
        const fileMetas = [];
        for (const entry of pending) {
          const t = fileType(entry.file.name);
          try {
            let rows = [];
            if (t === 'csv') {
              rows = await parseCSV(entry.file);
              rows = rows.map(r => ({ ...r, _sourceFile: entry.file.name }));
            } else {
              // PDF / image: hand off to ScreenProcessing which calls /api/categorise-file
              rows = [{ _deferred: true, _file: entry.file, _sourceFile: entry.file.name, _fileType: t }];
            }
            allRows.push(...rows);
            fileMetas.push({ name: entry.file.name, type: t, size: entry.file.size });
          } catch (err) {
            console.error('File parse failed:', entry.file.name, err);
            showToast(`Couldn't read ${entry.file.name}`, 'error');
          }
        }

        setUploadedTxns(allRows);
        setUploadMeta({ files: fileMetas });
        setStep('processing');
      };

      return (
        <div className="screen">
          <div className="header">
            <button className="header-btn" onClick={() => setStep('welcome')} aria-label="Back"><Icon name="back" /></button>
            <div />
            <div />
          </div>

          <h1 className="t-display mb-3">Let's get you sorted.</h1>
          <p className="t-body t-secondary mb-6" style={{lineHeight: 1.55}}>
            Drop in everything you've got: the last 2–3 months of bank statements, credit card statements, even receipt photos. The more I see, the better I understand your money.
          </p>

          <div
            className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); }}
            onClick={() => inputRef.current?.click()}
            role="button"
            tabIndex={0}
          >
            <div className="upload-icon-wrap"><Icon name="upload" size={28} /></div>
            <div className="t-body" style={{fontWeight: 600}}>Drop statements here</div>
            <div className="t-small t-muted">or tap to choose files</div>
            <div className="t-micro mt-2">CSV · PDF · IMAGE · MULTIPLE FILES OK</div>
            {/* MULTI-FILE input — the v5 non-negotiable fix */}
            <input
              ref={inputRef}
              type="file"
              multiple
              className="sr-only"
              accept=".csv,.pdf,.png,.jpg,.jpeg,.webp,.heic"
              onChange={e => addFiles(e.target.files)}
            />
          </div>

          {pending.length > 0 && (
            <div className="card mt-4" style={{padding: 12}}>
              {pending.map(entry => (
                <div key={entry.id} className="flex items-center gap-3" style={{padding: '10px 4px'}}>
                  <Icon name="check" size={14} />
                  <div style={{flex: 1, minWidth: 0}}>
                    <div className="t-body" style={{overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500}}>{entry.file.name}</div>
                    <div className="t-small t-muted">{Math.round(entry.file.size / 1024)} KB · {fileType(entry.file.name)?.toUpperCase()}</div>
                  </div>
                  <button onClick={() => removeFile(entry.id)} className="header-btn" aria-label="Remove" style={{width: 32, height: 32}}>
                    <Icon name="close" size={16} />
                  </button>
                </div>
              ))}
              <button className="btn-link" onClick={() => inputRef.current?.click()} style={{padding: '8px 4px'}}>+ Add more files</button>
            </div>
          )}

          <p className="t-small t-muted mt-5 flex items-center justify-center gap-2" style={{lineHeight: 1.5, flexWrap: 'wrap'}}>
            <Icon name="lock" size={14} />
            <span>Your account numbers never leave your device. We sanitise every file before AI reads it.</span>
            <button onClick={showPrivacyModal} style={{color: 'var(--teal)', textDecoration: 'underline', background: 'none', fontSize: 'inherit', padding: 0}}>Learn more</button>
          </p>

          <div className="text-center mt-4">
