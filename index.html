    // ===== APP ROOT =====
    function App() {
      const [state, dispatch] = useReducer(reducer, INITIAL_STATE, loadState);
      const toast = useToast();

      const onboardingScreens = ['welcome','quick-setup','details','income','deductions','tax-reveal','bridge','budget-setup'];
      const postScreens = ['dashboard','budget','log-expense','expenses','tax-summary','tax-calculator','provisional-tax','backpocket','settings','edit-details','edit-deductions','edit-deductions-full','budget-view','budget-setup','documents','import-data'];

      const getInitialScreen = () => {
        const hash = window.location.hash.slice(1);
        if (state.user.setupComplete) return (postScreens.includes(hash) || hash.startsWith('edit-expense/')) ? hash : 'dashboard';
        return onboardingScreens.includes(hash) ? hash : 'welcome';
      };

      const [screen, setScreen] = useState(getInitialScreen);

      useEffect(() => { saveState(state); }, [state]);

      useEffect(() => {
        const onHash = () => {
          const h = window.location.hash.slice(1);
          if (h) setScreen(h);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const nav = useCallback((s) => {
        window.location.hash = s;
        setScreen(s);
        window.scrollTo(0, 0);
      }, []);

      const finishSetup = useCallback(() => {
        dispatch({ type: 'SET_USER', payload: { setupComplete: true } });
        nav('dashboard');
      }, [nav]);

      const showNav = state.user.setupComplete && !onboardingScreens.includes(screen);

      const renderScreen = () => {
        switch (screen) {
          case 'welcome': return <WelcomeScreen onGuided={() => nav('details')} onQuickStart={() => nav('quick-setup')} />;
          case 'quick-setup': return <QuickSetupScreen state={state} dispatch={dispatch} onComplete={() => { dispatch({ type: 'SET_USER', payload: { quickStart: true, setupComplete: true } }); nav('dashboard'); }} />;
          case 'details': return <DetailsScreen state={state} dispatch={dispatch} onNext={() => nav('income')} />;
          case 'income': return <IncomeScreen state={state} dispatch={dispatch} onNext={() => nav('deductions')} />;
          case 'deductions': return <DeductionsScreen state={state} dispatch={dispatch} onNext={() => nav('tax-reveal')} />;
          case 'tax-reveal': return <TaxRevealScreen state={state} onNext={() => nav('bridge')} />;
          case 'bridge': return <BridgeScreen state={state} onBudget={() => nav('budget-setup')} onSkip={finishSetup} />;
          case 'budget-setup': return <BudgetSetupScreen state={state} dispatch={dispatch} onComplete={state.user.setupComplete ? () => nav('budget') : finishSetup} />;
          case 'dashboard': return <DashboardScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'budget': return <BudgetViewScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'budget-view': return <BudgetViewScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'log-expense': return <LogExpenseScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'expenses': return <ExpenseListScreen state={state} dispatch={dispatch} navigate={nav} toast={toast} />;
          case 'tax-summary': return <TaxHubScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'tax-calculator': return <TaxHubScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'provisional-tax': return <TaxHubScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'backpocket': return <BackpocketScreen state={state} dispatch={dispatch} navigate={nav} toast={toast} />;
          case 'settings': return <SettingsScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'edit-details': return <EditDetailsScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'edit-deductions': return <DeductionsSummaryScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'edit-deductions-full': return <DeductionsScreen state={state} dispatch={dispatch} onNext={() => nav('settings')} />;
          case 'documents': return <DocumentsScreen state={state} dispatch={dispatch} navigate={nav} />;
          case 'import-data': return <ImportDataScreen state={state} dispatch={dispatch} navigate={nav} />;
          default:
            if (screen.startsWith('edit-expense/')) return <EditExpenseScreen state={state} dispatch={dispatch} navigate={nav} toast={toast} />;
            return <WelcomeScreen onGuided={() => nav('details')} onQuickStart={() => nav('quick-setup')} />;
        }
      };

      return (
        <div className="app">
          {renderScreen()}
          {showNav && <BottomNav activeTab={screen} onNavigate={nav} showMoreBadge={!localStorage.getItem('tt_backpocket_seen') && (state.backpocket || []).length === 0} />}
        </div>
      );
    }

    // ===== RENDER =====
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ToastProvider><App /></ToastProvider>);
  </script>
  <script>
    // Register service worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
