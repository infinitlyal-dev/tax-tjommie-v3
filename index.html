          <div className="field">
            <label className="label" htmlFor="f-add-date">Date</label>
            <input id="f-add-date" type="date" className="input" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          <div className="receipt-toggle">
            <input type="checkbox" id="receipt-check" checked={hasReceipt} onChange={e => setHasReceipt(e.target.checked)} />
            <label htmlFor="receipt-check" style={{fontSize:'.9375rem'}}>I have a receipt</label>
          </div>
          {!hasReceipt && isWork && <div className="small" style={{color:'var(--danger-text)',marginBottom:12}}><strong>No receipt — SARS can disallow this deduction entirely.</strong> Keep all receipts for at least 5 years.</div>}
          <button className="btn btn-primary mt24" disabled={!canSave} style={{opacity: canSave ? 1 : 0.5}} onClick={handleSave}>Save Expense</button>
        </div>
      );
    }

    // ===== SCREEN: EXPENSE LIST =====
    // Helper to get the deductible amount for an expense considering apportionment
    function getDeductibleAmount(expense, state) {
      if (!isWorkCategory(expense.category)) return 0;
      let amount = expense.amount;
      if ((expense.category.includes('Vehicle') || expense.category.includes('travel')) && state.taxProfile.travel.enabled) {
        amount = Math.round(expense.amount * state.taxProfile.travel.workPercentage / 100);
      } else if (expense.category.includes('Phone') && state.taxProfile.phone.enabled) {
        amount = Math.round(expense.amount * state.taxProfile.phone.workPercentage / 100);
      } else if (expense.category.includes('Home office') && state.taxProfile.homeOffice.enabled) {
        amount = Math.round(expense.amount * state.taxProfile.homeOffice.percentage / 100);
      }
      return amount;
    }

    // ===== SCREEN: EDIT EXPENSE =====
    function EditExpenseScreen({ state, dispatch, navigate, toast }) {
      const expenseId = Number(window.location.hash.split('edit-expense/')[1]);
      const expense = (state.expenses || []).find(e => e.id === expenseId);
      const [amount, setAmount] = useState(expense ? String(expense.amount) : '');
      const [description, setDescription] = useState(expense ? expense.description : '');
      const [category, setCategory] = useState(expense ? expense.category : '');
      const [date, setDate] = useState(expense ? expense.date : '');
      const [hasReceipt, setHasReceipt] = useState(expense ? expense.hasReceipt : false);

      if (!expense) return (
        <div className="screen" style={{textAlign:'center',paddingTop:60}}>
          <h2>Expense not found</h2>
          <button className="btn btn-primary mt24" onClick={() => navigate('expenses')}>Back to Expenses</button>
        </div>
      );

      const isWork = isWorkCategory(category);
      const handleSave = () => {
        dispatch({ type: 'UPDATE_EXPENSE', payload: { id: expenseId, changes: { amount: Number(amount), description: description || category.split(' (')[0], category, date, isWork, hasReceipt } } });
        toast('Expense updated');
        navigate('expenses');
      };

      return (
        <div className="screen">
          <div className="flex-between mb24">
            <h2>Edit Expense</h2>
            <CloseButton onClick={() => navigate('expenses')} />
          </div>
          <RandInput label="Amount" id="f-edit-amount" value={Number(amount)} onChange={v => setAmount(String(v))} />
          <div className="field">
            <label className="label" htmlFor="f-edit-desc">Description</label>
            <input id="f-edit-desc" className="input" value={description} onChange={e => setDescription(e.target.value)} />
          </div>
          <div className="field">
            <label className="label" htmlFor="f-edit-category">Category</label>
            <select id="f-edit-category" className="input" value={category} onChange={e => setCategory(e.target.value)}>
              <option value="">Select category...</option>
              <optgroup label="Work Expenses (deductible)">
                {WORK_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </optgroup>
              <optgroup label="Personal Expenses">
                {PERSONAL_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </optgroup>
            </select>
          </div>
          <div className="field">
            <label className="label" htmlFor="f-edit-date">Date</label>
            <input id="f-edit-date" type="date" className="input" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          <div className="receipt-toggle">
            <input type="checkbox" id="edit-receipt-check" checked={hasReceipt} onChange={e => setHasReceipt(e.target.checked)} />
            <label htmlFor="edit-receipt-check" style={{fontSize:'.9375rem'}}>I have a receipt</label>
          </div>
          <button className="btn btn-primary mt24" onClick={handleSave}>Save Changes</button>
        </div>
      );
    }

    function ExpenseListScreen({ state, dispatch, navigate, toast }) {
      const [filter, setFilter] = useState('all');
      const taxYear = state.user.taxYear || '2025/26';
      const expenses = (state.expenses || []).filter(e => isInTaxYear(e.date, taxYear)).sort((a, b) => new Date(b.date) - new Date(a.date));
      const filtered = expenses.filter(e => {
        if (filter === 'work' && !isWorkCategory(e.category)) return false;
        if (filter === 'personal' && isWorkCategory(e.category)) return false;
        return true;
      });
      const total = filtered.reduce((s, e) => s + e.amount, 0);
      const workDeductibleTotal = filtered.filter(e => isWorkCategory(e.category)).reduce((s, e) => s + getDeductibleAmount(e, state), 0);
      const t = calcFullTax(state);

      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const handleDelete = (id) => {
        if (deleteConfirm === id) {
          dispatch({ type: 'DELETE_EXPENSE', payload: id });
          toast('Expense deleted');
          setDeleteConfirm(null);
        } else {
          setDeleteConfirm(id);
          setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 5000);
        }
      };

      return (
        <div className="screen">
          <div className="flex-between mb16">
            <h2>Expenses</h2>
            <button className="btn btn-primary btn-sm" onClick={() => navigate('log-expense')}>+ Add</button>
          </div>
          <div className="filter-bar">
            <button className={`filter-chip ${filter==='all'?'on':''}`} onClick={() => setFilter('all')}>All ({expenses.length})</button>
            <button className={`filter-chip ${filter==='work'?'on':''}`} onClick={() => setFilter('work')}>Work</button>
            <button className={`filter-chip ${filter==='personal'?'on':''}`} onClick={() => setFilter('personal')}>Personal</button>
          </div>
          {filtered.length > 0 && (
            <div className="expense-total">
              <div>
                <div className="et-label">Total{filter !== 'all' ? ` (${filter})` : ''}</div>
                <div className="et-amount">{fR(total)}</div>
              </div>
              {workDeductibleTotal > 0 && filter !== 'personal' && (
                <div style={{textAlign:'right'}}>
                  <div className="et-label">Tax saving</div>
                  <div className="et-amount" style={{color:'var(--success)',fontSize:'1rem'}}>~{fR(Math.round(workDeductibleTotal * t.marginal))}</div>
                </div>
              )}
            </div>
          )}
          {filtered.length > 0 ? filtered.map(e => {
            const w = isWorkCategory(e.category);
            const isConfirming = deleteConfirm === e.id;
            return (
              <div key={e.id} className="expense-item" style={{position:'relative'}}>
                <div className={`expense-dot ${w ? 'work' : 'personal'}`} />
                <div className="expense-info">
                  <div className="expense-desc">{e.description || e.category.split(' (')[0]}</div>
                  <div className="expense-meta">
                    <span>{new Date(e.date).toLocaleDateString('en-ZA', {day:'numeric',month:'short'})}</span>
                    <span>{e.category.split(' (')[0]}</span>
                    {!e.hasReceipt && w && <span style={{color:'var(--warning)'}}>No receipt</span>}
                    {(e.documentIds && e.documentIds.length > 0) && <span style={{color:'var(--primary)'}}><Icon name="link" size={12} /> {e.documentIds.length}</span>}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{textAlign:'right'}}>
                    <div className="expense-amount">{fR(e.amount)}</div>
                    {w && <div className="expense-saving">-{fR(Math.round(getDeductibleAmount(e, state) * t.marginal))} tax</div>}
                  </div>
                  <button onClick={() => navigate('edit-expense/' + e.id)} style={{background:'none',color:'var(--primary)',border:'none',padding:'6px',fontSize:'.75rem',cursor:'pointer'}}>✎</button>
                  <button onClick={() => handleDelete(e.id)} style={{background:isConfirming?'var(--danger)':'none',color:isConfirming?'#fff':'var(--text3)',border:'none',borderRadius:'var(--rs)',padding:'6px 8px',fontSize:'.75rem',cursor:'pointer',minWidth:isConfirming?60:'auto',transition:'all .2s'}}>
                    {isConfirming ? 'Confirm?' : '✕'}
                  </button>
                </div>
              </div>
            );
          }) : (
            <div className="expense-empty">
              <div className="empty-icon"><Icon name="pencil" size={40} style={{color:'var(--text3)',marginBottom:12}} /></div>
              <p>No expenses yet</p>
              <p className="small mt12">Tap + to start tracking</p>
            </div>
          )}
        </div>
      );
    }

    // ===== TAX SUMMARY EXPORT =====
    function exportTaxSummary(state) {
      const t = calcFullTax(state);
      const tp = state.taxProfile;
      const tables = t.tables || getTaxTables(state.user.taxYear);
      const lines = [
        `TAX TJOMMIE — Tax Summary for ${state.user.name}`,
        `Tax Year: ${state.user.taxYear}`,
        `Generated: ${new Date().toLocaleDateString('en-ZA')}`,
        `Occupation: ${state.user.occupation}`,
        `─────────────────────────────────────`,
        `INCOME`,
        `  Annual gross income: ${fR(t.gross)}`,
        `  Monthly gross: ${fR(state.user.monthlyGross)}`,
        ``,
        `DEDUCTIONS`,
        ...(t.breakdown.homeOffice > 0 ? [`  Home office (${tp.homeOffice.percentage}%): ${fR(t.breakdown.homeOffice)}`] : []),
        ...(t.breakdown.travel > 0 ? [`  Vehicle & travel (${tp.travel.method === 'deemed' ? 'deemed cost' : tp.travel.workPercentage + '% work'}): ${fR(t.breakdown.travel)}`] : []),
        ...(t.breakdown.phone > 0 ? [`  Phone (${tp.phone.workPercentage}%): ${fR(t.breakdown.phone)}`] : []),
        ...(t.breakdown.equipment > 0 ? [`  Equipment (S11(e) depreciation): ${fR(t.breakdown.equipment)}`] : []),
        ...(t.breakdown.professionalFees > 0 ? [`  Professional fees: ${fR(t.breakdown.professionalFees)}`] : []),
        ...(t.breakdown.marketing > 0 ? [`  Marketing & business: ${fR(t.breakdown.marketing)}`] : []),
        ...(t.breakdown.retirement > 0 ? [`  Retirement annuity: ${fR(t.breakdown.retirement)}`] : []),
        ...(t.breakdown.donations > 0 ? [`  Donations (S18A): ${fR(t.breakdown.donations)}`] : []),
        ...(t.breakdown.badDebts > 0 ? [`  Bad debts (S11(i)): ${fR(t.breakdown.badDebts)}`] : []),
        ...(t.breakdown.businessLoanInterest > 0 ? [`  Business loan interest (S24J): ${fR(t.breakdown.businessLoanInterest)}`] : []),
        `  TOTAL DEDUCTIONS: ${fR(t.deductionsTotal)}`,
        ``,
        `TAX CALCULATION`,
        `  Taxable income: ${fR(t.taxable)}`,
        `  Tax on taxable income: ${fR(t.bracketTax)}`,
        `  Less primary rebate: -${fR(tables.rebates.primary)}`,
        ...(t.age >= 65 ? [`  Less secondary rebate: -${fR(tables.rebates.secondary)}`] : []),
        ...(t.age >= 75 ? [`  Less tertiary rebate: -${fR(tables.rebates.tertiary)}`] : []),
        ...(t.medCredits > 0 ? [`  Less medical credits: -${fR(t.medCredits)}`] : []),
        `  ESTIMATED TAX: ${fR(t.netTax)} (${fR(t.netTax/12)}/month)`,
        `  Effective rate: ${t.gross > 0 ? Math.round((t.netTax/t.gross)*100) : 0}%`,
        `  Marginal rate: ${Math.round(t.marginal*100)}%`,
        ``,
        `SAVINGS FROM DEDUCTIONS: ${fR(t.savings)}`,
        `─────────────────────────────────────`,
        `Note: This is an estimate only. Confirm with a registered tax practitioner before filing.`,
        `Generated by Tax Tjommie v3`,
      ];
      const text = lines.join('\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `TaxSummary_${state.user.taxYear.replace('/', '-')}_${state.user.name.replace(/\s/g, '_')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ===== BATCH 5: PDF REPORT GENERATION =====
    function generatePDFReport(state) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const t = calcFullTax(state);
      const tp = state.taxProfile;
      const tables = t.tables || getTaxTables(state.user.taxYear);
      const taxYear = state.user.taxYear || '2025/26';
      const { start, end } = getTaxYearBounds(taxYear);
      const yearExpenses = (state.expenses || []).filter(e => isInTaxYear(e.date, taxYear));
      const workExpenses = yearExpenses.filter(e => isWorkCategory(e.category)).sort((a, b) => new Date(a.date) - new Date(b.date));
      const documents = state.documents || [];
      const now = new Date();
      const isIncomplete = now < end;

      // Helpers
      const fmtR = (n) => 'R ' + Math.round(n || 0).toLocaleString('en-ZA');
      const fmtDate = (d) => new Date(d).toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
      const addHeader = (title, y) => {
        doc.setFontSize(14);
        doc.setFont(undefined, 'bold');
        doc.text(title, 20, y);
        doc.setDrawColor(16, 185, 129);
        doc.setLineWidth(0.5);
        doc.line(20, y + 2, 190, y + 2);
        doc.setFont(undefined, 'normal');
        doc.setFontSize(10);
        return y + 10;
      };
      const addFooter = (pageNum) => {
        doc.setFontSize(8);
        doc.setTextColor(150);
        doc.text('Tax Tjommie v3.0 — For informational purposes only', 20, 285);
        doc.text('Page ' + pageNum, 180, 285);
        doc.setTextColor(0);
      };

      let pageNum = 1;

      // ── PAGE 1: COVER ──
      doc.setFontSize(28);
      doc.setFont(undefined, 'bold');
      doc.setTextColor(16, 185, 129);
      doc.text('TAX TJOMMIE', 20, 50);
      doc.setTextColor(0);
      doc.setFontSize(16);
      doc.text('Year-End Tax Summary', 20, 62);
      doc.setDrawColor(16, 185, 129);
      doc.setLineWidth(1);
      doc.line(20, 68, 120, 68);

      doc.setFontSize(11);
      doc.setFont(undefined, 'normal');
      const startStr = start.toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
      const endStr = end.toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
      doc.text('Tax Year: ' + taxYear + ' (' + startStr + ' \u2013 ' + endStr + ')', 20, 82);
      doc.text('Prepared for: ' + (state.user.name || 'Not set'), 20, 90);
      doc.text('Occupation: ' + (state.user.occupation || 'Not set'), 20, 98);
      doc.text('Date generated: ' + fmtDate(now), 20, 106);

      if (isIncomplete) {
        doc.setFontSize(10);
        doc.setTextColor(200, 120, 0);
        doc.text('\u26a0\ufe0f This tax year is still in progress. Figures may change.', 20, 120);
        doc.setTextColor(0);
      }

      doc.setFontSize(9);
      doc.setTextColor(100);
      const disclaimer = 'DISCLAIMER: This report is generated by Tax Tjommie for informational purposes only. It is not a tax return and does not constitute tax advice. Please confirm all figures with a registered tax practitioner before filing with SARS.';
      const splitDisclaimer = doc.splitTextToSize(disclaimer, 170);
      doc.text(splitDisclaimer, 20, isIncomplete ? 135 : 125);
      doc.setTextColor(0);
      addFooter(pageNum);

      // ── PAGE 2: TAX POSITION SUMMARY ──
      doc.addPage();
      pageNum++;
      let y = addHeader('INCOME & TAX SUMMARY', 25);

      const summaryRows = [
        ['Gross annual income', fmtR(t.gross)],
        ['Total deductions', '-' + fmtR(t.deductionsTotal)],
        ['', ''],
        ['Taxable income', fmtR(t.taxable)],
        ['', ''],
        ['Tax on taxable income', fmtR(t.bracketTax)],
        ['Less: Primary rebate', '-' + fmtR(tables.rebates.primary)],
      ];
      if (t.age >= 65) summaryRows.push(['Less: Secondary rebate', '-' + fmtR(tables.rebates.secondary)]);
      if (t.age >= 75) summaryRows.push(['Less: Tertiary rebate', '-' + fmtR(tables.rebates.tertiary)]);
      if (t.medCredits > 0) summaryRows.push(['Less: Medical tax credits', '-' + fmtR(t.medCredits)]);
      summaryRows.push(['', '']);
      summaryRows.push(['Estimated tax liability', fmtR(t.netTax)]);
      summaryRows.push(['', '']);
      summaryRows.push(['Effective tax rate', (t.gross > 0 ? Math.round((t.netTax / t.gross) * 100) : 0) + '%']);
      summaryRows.push(['Marginal tax rate', Math.round(t.marginal * 100) + '%']);
      summaryRows.push(['', '']);
      summaryRows.push(['Tax WITHOUT deductions', fmtR(t.taxWithout)]);
      summaryRows.push(['DEDUCTIONS SAVED YOU', fmtR(t.savings)]);

      doc.autoTable({
        startY: y,
        head: [],
        body: summaryRows,
        theme: 'plain',
        styles: { fontSize: 10, cellPadding: 2 },
        columnStyles: {
          0: { cellWidth: 100, fontStyle: 'normal' },
          1: { cellWidth: 60, halign: 'right', fontStyle: 'bold' }
        },
        didParseCell: (data) => {
          if (data.row.index === summaryRows.length - 1 || data.row.index === summaryRows.length - 2) {
            data.cell.styles.fontStyle = 'bold';
            data.cell.styles.textColor = [16, 185, 129];
          }
          if (data.row.raw[0] === 'Estimated tax liability') {
            data.cell.styles.fontStyle = 'bold';
            data.cell.styles.fontSize = 12;
          }
        },
        margin: { left: 20, right: 20 }
      });

      addFooter(pageNum);

      // ── PAGE 3: DEDUCTIONS BREAKDOWN ──
      doc.addPage();
      pageNum++;
      y = addHeader('DEDUCTIONS BREAKDOWN', 25);

      const deductionRows = [];
      const bd = t.breakdown;
      const addDedRow = (label, val) => {
        if (val > 0) {
          const pct = t.deductionsTotal > 0 ? Math.round((val / t.deductionsTotal) * 100) : 0;
          deductionRows.push([label, fmtR(val), pct + '%']);
        }
      };
      addDedRow('Home office (' + (tp.homeOffice.percentage || 0) + '%)', bd.homeOffice);
      addDedRow('Vehicle & travel', bd.travel);
      addDedRow('Phone & communications', bd.phone);
      addDedRow('Equipment & tools', bd.equipment);
      addDedRow('Professional services', bd.professionalFees);
      addDedRow('Marketing & business', bd.marketing);
      addDedRow('Retirement annuity', bd.retirement);
      addDedRow('Donations (S18A)', bd.donations);
      addDedRow('Bad debts', bd.badDebts);
      addDedRow('Business loan interest', bd.businessLoanInterest);

      if (deductionRows.length === 0) {
        deductionRows.push(['No deductions claimed', fmtR(0), '0%']);
      }
      deductionRows.push([{ content: 'TOTAL', styles: { fontStyle: 'bold' } }, { content: fmtR(t.deductionsTotal), styles: { fontStyle: 'bold' } }, { content: '100%', styles: { fontStyle: 'bold' } }]);

      doc.autoTable({
        startY: y,
        head: [['Category', 'Annual Amount', '% of Total']],
        body: deductionRows,
        theme: 'striped',
        headStyles: { fillColor: [16, 185, 129], textColor: 255, fontStyle: 'bold' },
        styles: { fontSize: 9.5, cellPadding: 3 },
        columnStyles: {
          0: { cellWidth: 90 },
          1: { cellWidth: 45, halign: 'right' },
          2: { cellWidth: 30, halign: 'right' }
        },
        margin: { left: 20, right: 20 }
      });

      addFooter(pageNum);

      // ── PAGE 4+: EXPENSE DETAIL ──
      if (workExpenses.length > 0) {
        doc.addPage();
        pageNum++;
        y = addHeader('WORK EXPENSES — ' + taxYear, 25);

        const expenseRows = workExpenses.map(e => [
          new Date(e.date).toLocaleDateString('en-ZA'),
          e.description.length > 35 ? e.description.slice(0, 33) + '..' : e.description,
          e.category.split(' (')[0],
          fmtR(e.amount),
          e.hasReceipt ? '\u2713' : '\u2717'
        ]);

        doc.autoTable({
          startY: y,
          head: [['Date', 'Description', 'Category', 'Amount', 'Receipt']],
          body: expenseRows,
          theme: 'striped',
          headStyles: { fillColor: [16, 185, 129], textColor: 255, fontStyle: 'bold' },
          styles: { fontSize: 8.5, cellPadding: 2 },
          columnStyles: {
            0: { cellWidth: 25 },
            1: { cellWidth: 60 },
            2: { cellWidth: 45 },
            3: { cellWidth: 28, halign: 'right' },
            4: { cellWidth: 15, halign: 'center' }
          },
          margin: { left: 20, right: 20 },
          didDrawPage: () => {
            pageNum++;
            addFooter(pageNum - 1);
          }
        });

        // Summary line after table
        const finalY = doc.lastAutoTable.finalY + 8;
        doc.setFontSize(9);
        const totalWorkExp = workExpenses.reduce((s, e) => s + e.amount, 0);
        const receiptCount = workExpenses.filter(e => e.hasReceipt).length;
        doc.text(workExpenses.length + ' work expenses totalling ' + fmtR(totalWorkExp) + ' | ' + receiptCount + '/' + workExpenses.length + ' with receipts', 20, finalY);
      }

      // ── MEDICAL SUMMARY (conditional) ──
      if (tp.medical.enabled) {
        doc.addPage();
        pageNum++;
        y = addHeader('MEDICAL TAX CREDITS', 25);

        const mc = tables.medCredits;
        const cappedDeps = Math.min(10, Math.max(0, tp.medical.dependents || 0));
        let monthlyCredits = mc.main;
        if (cappedDeps >= 1) monthlyCredits += mc.first;
        if (cappedDeps > 1) monthlyCredits += (cappedDeps - 1) * mc.additional;
        const annualCredits = monthlyCredits * 12;

        const medRows = [
          ['Main member credit', fmtR(mc.main) + '/month'],
          ['Dependents (' + cappedDeps + ')', cappedDeps >= 1 ? fmtR(mc.first + Math.max(0, cappedDeps - 1) * mc.additional) + '/month' : 'R 0/month'],
          ['Annual credits', fmtR(annualCredits)],
        ];

        const medExpenses = yearExpenses.filter(e => e.category === 'Medical');
        const totalMedExp = medExpenses.reduce((s, e) => s + e.amount, 0);
        const excessInput = tp.medical.excessExpenses || 0;
        const totalOOP = totalMedExp + excessInput;

        if (totalOOP > 0) {
          const threshold = t.taxable * 0.075;
          const qualifying = Math.max(0, totalOOP - threshold);
          const additionalCredit = Math.round(qualifying * 0.25);
          medRows.push(['', '']);
          medRows.push(['Out-of-pocket medical expenses', fmtR(totalOOP)]);
          medRows.push(['7.5% of taxable income threshold', fmtR(threshold)]);
          medRows.push(['Additional qualifying amount (25%)', fmtR(additionalCredit)]);
        }

        doc.autoTable({
          startY: y,
          head: [],
          body: medRows,
          theme: 'plain',
          styles: { fontSize: 10, cellPadding: 3 },
          columnStyles: { 0: { cellWidth: 100 }, 1: { cellWidth: 60, halign: 'right' } },
          margin: { left: 20, right: 20 }
        });

        addFooter(pageNum);
      }

      // ── RA SUMMARY (conditional) ──
      if (tp.retirement.enabled) {
        doc.addPage();
        pageNum++;
        y = addHeader('RETIREMENT ANNUITY', 25);

        const raMonthly = tp.retirement.monthlyRA || 0;
        const raAnnual = raMonthly * 12;
        const cap275 = Math.round(t.gross * 0.275);
        const raDeductible = Math.min(raAnnual, cap275, 350000);

        const raRows = [
          ['Monthly contribution', fmtR(raMonthly)],
          ['Annual contribution', fmtR(raAnnual)],
          ['27.5% of income cap', fmtR(cap275)],

      // ── DOCUMENT INVENTORY (conditional) ──

        const totalWorkExps = workExpenses.length;

          if (key === 'receipt' && totalWorkExps > 0) {
            status = count + ' uploaded (' + receiptedCount + '/' + totalWorkExps + ' expenses receipted)';
          }
          if (key === 'logbook' && tp.travel.enabled && count === 0) {
            status = '\u26a0\ufe0f Claimed travel but no logbook';

          docRows.push([label, String(count), status]);

        doc.autoTable({
          startY: y,
          head: [['Document Type', 'Count', 'Status']],

          theme: 'striped',

      if (tp.homeOffice.enabled && t.breakdown.homeOffice > 0) {

      }
      if (tp.travel.enabled && t.breakdown.travel > 0) {
        notes.push('Vehicle: ' + (tp.travel.method === 'deemed' ? 'Deemed cost method' : tp.travel.workPercentage + '% work use (actual cost method)') + '.');

      notes.push('All amounts are estimates based on user-tracked data in Tax Tjommie.');
      const unreceiptedWork = workExpenses.filter(e => !e.hasReceipt);
      if (unreceiptedWork.length > 0) {
        notes.push(unreceiptedWork.length + ' work expense' + (unreceiptedWork.length > 1 ? 's' : '') + ' (' + fmtR(unreceiptedWork.reduce((s, e) => s + e.amount, 0)) + ') without receipts — flagged in detail.');

      notes.push('This report covers ' + startYearStr + ' to ' + endYearStr + '.');

      notes.forEach((note, i) => {
        const lines = doc.splitTextToSize('\u2022 ' + note, 165);
        doc.text(lines, 22, y + (i * 12));

      });

      const notesEndY = y + notes.length * 12 + 10;
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text('Generated by Tax Tjommie v3.0', 20, notesEndY);
      doc.text('www.taxtjommie.co.za', 20, notesEndY + 6);
      doc.setTextColor(0);

      addFooter(pageNum);

      // ── DOWNLOAD ──
      const filename = 'Tax_Tjommie_' + taxYear.replace('/', '-') + '_' + (state.user.name || 'User').replace(/\s+/g, '_') + '.pdf';
      doc.save(filename);
    }

    // ===== BATCH 5: EXPORT/IMPORT DATA =====
    function exportAppData(state, dispatch) {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const expenseCount = (data.expenses || []).length;
      const documentCount = (data.documents || []).length;
      const totalAmounts = (data.expenses || []).reduce((s, e) => s + (e.amount || 0), 0);
      const taxYears = [...new Set((data.expenses || []).map(e => {
        const d = new Date(e.date);
        const m = d.getMonth();
        const y = d.getFullYear();
        return m >= 2 ? y + '/' + (y + 1) : (y - 1) + '/' + y;
      }))].sort().reverse();

      const wrapper = {
        app: 'Tax Tjommie',
        version: '3.0',
        exportDate: new Date().toISOString(),
        exportDevice: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
        dataSize: formatBytes(getStorageSize()),
        taxYears,
        expenseCount,
        documentCount,
        checksum: expenseCount + documentCount + Math.round(totalAmounts),
        data
      };
      const json = JSON.stringify(wrapper, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'TaxTjommie_backup_' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
      dispatch({ type: 'SET_META', payload: { lastExport: new Date().toISOString() } });
    }

    // ===== TAX CONTENT: TAX CALCULATOR (Interactive What-If) =====
    function TaxCalculatorContent({ state }) {
      const tables = getTaxTables(state.user.taxYear);
      const realAge = getAge(state.user.dob);
      const realT = calcFullTax(state);

      // Editable inputs (pre-filled from profile)
      const [gross, setGross] = useState(state.user.monthlyGross * 12);
      const [age, setAge] = useState(realAge);
      const [deductions, setDeductions] = useState(Math.round(realT.deductionsTotal));
      const [medDeps, setMedDeps] = useState(state.taxProfile.medical.enabled ? state.taxProfile.medical.dependents : 0);
      const [hasMedical, setHasMedical] = useState(state.taxProfile.medical.enabled);
      const [raAnnual, setRaAnnual] = useState(state.taxProfile.retirement.enabled ? state.taxProfile.retirement.monthlyRA * 12 : 0);

      // Calculate (RA is already included in deductions from profile, so for custom calc we handle separately)
      const raCapped = Math.min(raAnnual, gross * 0.275, 350000);
      const totalDeductions = deductions; // User controls this directly
      const taxable = Math.max(0, gross - totalDeductions);
      const bracketTax = calcBracketTax(taxable, tables.brackets);
      const rebate = getRebate(age, tables.rebates);
      const medCredits = hasMedical ? calcMedicalCredits(medDeps, tables.medCredits) : 0;
      const netTax = Math.max(0, bracketTax - rebate - medCredits);
      const marginal = getMarginalRate(taxable, tables.brackets);
      const effective = gross > 0 ? (netTax / gross) : 0;

      // What-if: additional R1,000 deduction
      const extraDeductionSaving = Math.round(1000 * marginal);

      // Step-by-step bracket calculation
      const bracketSteps = [];
      let remaining = taxable;
      let prevUpper = 0;
      for (const b of tables.brackets) {
        if (remaining <= 0) break;
        const lower = prevUpper;
        const upper = Math.min(remaining + lower, b.upTo);
        const amount = upper - lower;
        const tax = Math.round(amount * b.rate);
        bracketSteps.push({ lower, upper, rate: b.rate, amount, tax });
        remaining -= amount;
        prevUpper = b.upTo;
        if (taxable <= b.upTo) break;
      }

      return (
        <>
          <h2 style={{marginBottom:8}}>Tax Calculator</h2>
          <div className="small mb24">Interactive — change values to see the impact</div>

          <RandInput label="Annual gross income" value={gross} onChange={setGross} />
          <div className="field">
            <label className="label" htmlFor="f-calc-age">Age (for rebates)</label>
            <input id="f-calc-age" type="number" className="input" value={age} onChange={e => setAge(Math.max(0, Number(e.target.value) || 0))} inputMode="numeric" />
          </div>
          <RandInput label="Total annual deductions" value={deductions} onChange={setDeductions} />
          <div className="receipt-toggle" style={{padding:'8px 0'}}>
            <input type="checkbox" id="f-has-medical" checked={hasMedical} onChange={e => setHasMedical(e.target.checked)} style={{width:20,height:20,accentColor:'var(--primary)'}} />
            <label htmlFor="f-has-medical" style={{fontSize:'.9375rem'}}>Medical aid member</label>
          </div>
          {hasMedical && (
            <div className="field">
              <label className="label" htmlFor="f-calc-med-deps">Dependents on medical aid</label>
              <input id="f-calc-med-deps" type="number" className="input" value={medDeps} onChange={e => setMedDeps(Math.max(0, Number(e.target.value) || 0))} min="0" inputMode="numeric" />
            </div>
          )}

          <h3 style={{marginTop:24,marginBottom:12}}>Step-by-Step Calculation</h3>
          <div className="tax-table">
            <div className="tax-row"><span>Gross income</span><span>{fR(gross)}</span></div>
            <div className="tax-row indent"><span>Less: Deductions</span><span>-{fR(deductions)}</span></div>
            <div className="tax-divider" />
            <div className="tax-row" style={{fontWeight:600}}><span>Taxable income</span><span>{fR(taxable)}</span></div>
            <div className="tax-divider" />
            <div style={{fontSize:'.75rem',color:'var(--text3)',padding:'8px 0 4px'}}>TAX BRACKET CALCULATION:</div>
            {bracketSteps.map((step, i) => (
              <div key={i} className="tax-row indent" style={{fontSize:'.8125rem'}}>
                <span>{fR(step.lower)}–{fR(step.upper)} @ {Math.round(step.rate*100)}%</span>
                <span>{fR(step.tax)}</span>
              </div>
            ))}
            <div className="tax-divider" />
            <div className="tax-row"><span>Tax before rebates</span><span>{fR(bracketTax)}</span></div>
            <div className="tax-row indent"><span>Less: Primary rebate</span><span>-{fR(tables.rebates.primary)}</span></div>
            {age >= 65 && <div className="tax-row indent"><span>Less: Secondary rebate (65+)</span><span>-{fR(tables.rebates.secondary)}</span></div>}
            {age >= 75 && <div className="tax-row indent"><span>Less: Tertiary rebate (75+)</span><span>-{fR(tables.rebates.tertiary)}</span></div>}
            {medCredits > 0 && <div className="tax-row indent"><span>Less: Medical credits</span><span>-{fR(medCredits)}</span></div>}
            <div className="tax-divider" />
            <div className="tax-row highlight"><span>NET TAX PAYABLE</span><span>{fR(netTax)}</span></div>
            <div className="tax-row"><span>Per month</span><span>{fR(netTax / 12)}</span></div>
          </div>

          {/* Key stats */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:16}}>
            <div className="card" style={{textAlign:'center',padding:'12px'}}>
              <div className="small">Effective Rate</div>
              <div style={{fontSize:'1.25rem',fontWeight:700,color:'var(--primary)'}}>{Math.round(effective * 100)}%</div>
            </div>
            <div className="card" style={{textAlign:'center',padding:'12px'}}>
              <div className="small">Marginal Rate</div>
              <div style={{fontSize:'1.25rem',fontWeight:700,color:'var(--primary)'}}>{fPct(marginal)}</div>
            </div>
          </div>

          {/* What-if nudge */}
          <div className="info-box" style={{marginTop:16}}>
            <strong><Icon name="lightbulb" size={14} style={{marginRight:2}} /> What-if:</strong> If you add R1,000 more in deductions, you'd save <strong style={{color:'var(--success)'}}>{fR(extraDeductionSaving)}</strong> in tax (at your {fPct(marginal)} marginal rate).
          </div>

          {/* Tax tables reference */}
          <h3 style={{marginTop:24,marginBottom:12}}>{state.user.taxYear} Tax Tables</h3>
          <div className="tax-table" style={{fontSize:'.8125rem'}}>
            {tables.brackets.map((b, i) => (
              <div key={i} className="tax-row" style={{fontSize:'.8125rem'}}>
                <span>{i === 0 ? 'R0' : fR(tables.brackets[i-1].upTo + 1)} – {b.upTo === Infinity ? '∞' : fR(b.upTo)}</span>
                <span>{Math.round(b.rate * 100)}%</span>
              </div>
            ))}
          </div>
        </>
      );
    }

            <div style={{flex:1}}><TaxYearSelector state={state} dispatch={dispatch} variant="dark" /></div>
          </div>
          <div style={{display:'flex',borderBottom:'2px solid var(--border)',margin:'0 -20px',padding:'0 20px 0',position:'sticky',top:0,background:'var(--bg)',zIndex:10,boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
            {[{key:'summary',label:'Summary'},{key:'calculator',label:'Calculator'},{key:'provisional',label:'Provisional'}].map(tab => (
              <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{
                flex:1,padding:'14px 8px',border:'none',background:'none',fontSize:'.875rem',fontWeight:activeTab===tab.key?700:500,
                color:activeTab===tab.key?'var(--primary)':'var(--text3)',cursor:'pointer',
                borderBottom:activeTab===tab.key?'2px solid var(--primary)':'2px solid transparent',marginBottom:'-2px',transition:'all .2s'
              }}>{tab.label}</button>
            ))}
          </div>
          <div style={{paddingTop:16}}>
            {activeTab === 'summary' && <TaxSummaryContent state={state} navigate={navigate} />}
            {activeTab === 'calculator' && <TaxCalculatorContent state={state} />}
            {activeTab === 'provisional' && <ProvisionalTaxContent state={state} dispatch={dispatch} />}
          </div>
        </div>
      );
    }

    // ===== TAX CONTENT: PROVISIONAL TAX =====
    function ProvisionalTaxContent({ state, dispatch }) {
      const t = calcFullTax(state);
      const age = getAge(state.user.dob);
      const tables = getTaxTables(state.user.taxYear);
      const threshold = getThreshold(age, tables.thresholds);
      const isProvisional = t.gross > threshold;
      const halfTax = Math.round(t.netTax / 2);
      const monthlySetAside = Math.round(t.netTax / 12);
      const provPaid = state.provTaxPaid || {};
      const provDates = getProvTaxDates(state.user.taxYear);

      return (
        <>
          <h2 style={{marginBottom:24}}>Provisional Tax</h2>
          {isProvisional ? (
            <>
              <div className="info-box">As a freelancer earning more than {fR(threshold)}/year, you are a provisional taxpayer. You must make two compulsory payments to SARS during the tax year.</div>
              <div className="prov-card" style={{marginTop:16}}>
                <div className="prov-title">Payment Schedule — {state.user.taxYear}</div>
                {provDates.map((p, i) => {
                  const dueDate = new Date(p.date);
                  const now = new Date();
                  const isOverdue = dueDate < now && !provPaid[p.period];
                  const isUpcoming = !isOverdue && !provPaid[p.period] && (dueDate - now) < 30 * 24 * 60 * 60 * 1000;
                  const isPaid = !!provPaid[p.period];
                  return (
                    <div key={i} className={`prov-date ${isPaid ? '' : isOverdue ? 'overdue' : isUpcoming ? 'upcoming' : ''}`}>
                      <div style={{flex:1}}>
                        <div className="pd-label">{p.period}{p.optional ? ' (optional)' : ''}</div>
                        <div className="pd-date">{p.label}{isPaid ? ' — PAID ✓' : isOverdue ? ' — OVERDUE' : isUpcoming ? ' — Due soon' : ''}</div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div className="pd-amount" style={isPaid ? {color:'var(--success)'} : {}}>{fR(p.optional ? Math.max(0, t.netTax - halfTax * 2) : halfTax)}</div>
                        <label style={{display:'flex',alignItems:'center',gap:4,fontSize:'.75rem',color:'var(--text2)',cursor:'pointer',whiteSpace:'nowrap'}}>
                          <input type="checkbox" checked={isPaid} onChange={e => dispatch({ type: 'SET_PROV_PAID', period: p.period, paid: e.target.checked })} style={{width:18,height:18,accentColor:'var(--success)'}} />
                          Paid
                        </label>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="card" style={{background:'var(--bg2)'}}>
                <div className="card-title">Monthly Set-Aside</div>
                <div className="card-value">{fR(monthlySetAside)}/month</div>
                <div className="small mt12">Put this aside every month so you're never caught short when payments are due.</div>
              </div>

              <div className="danger-box" style={{marginTop:16}}>
                <strong>Late payment penalty:</strong> Missing IRP6 deadlines results in a <strong>10% penalty</strong> on the unpaid tax, plus interest charged daily at the prescribed rate. SARS does not send reminders — it's your responsibility.
              </div>

              <div className="info-box" style={{marginTop:16}}>
                <strong>How to pay:</strong> Log in to SARS eFiling → Returns → Provisional Tax → IRP6. Enter your estimated taxable income and the system calculates the payment. Pay via EFT to the SARS bank account shown on the return.
              </div>

              <div className="warn-box" style={{marginTop:16}}>
                <strong>Under-estimation penalty:</strong> If your second provisional estimate is less than 90% of your actual taxable income (80% if earning over R1M), SARS may impose an additional penalty of up to <strong>20%</strong> of the shortfall. It's safer to slightly overestimate.
              </div>
            </>
          ) : (
            <div className="info-box">Based on your current income of {fR(t.gross)}/year, you are below the tax threshold of {fR(threshold)} and are not required to make provisional tax payments. If your income increases above this threshold, you'll need to register as a provisional taxpayer.</div>
          )}

          {/* Section 23(m) PSP Warning */}
          <div className="warn-box" style={{marginTop:24}}>
            <strong>Personal Service Provider check:</strong> If you work mainly for one client, operate like an employee (fixed hours, their office, their tools), and don't have other employees, SARS may classify you as a "Personal Service Provider" under Section 23(m). This significantly limits your allowable deductions. If this sounds like your situation, consult a tax practitioner.
          </div>

          {/* Export for practitioner */}
          <button className="btn btn-secondary mt24" onClick={() => exportTaxSummary(state)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <Icon name="download" size={16} style={{marginRight:4}} /> Download Tax Summary for Practitioner
          </button>
          <div className="small center mt12">Downloads a plain text file with your full tax breakdown that you can share with your accountant or tax practitioner.</div>
        </>
      );
    }

    // ===== SCREEN: BACKPOCKET (Savings Goals) =====
    function BackpocketScreen({ state, dispatch, navigate, toast }) {
      const goals = state.backpocket || [];
      const [showAdd, setShowAdd] = useState(false);
      const [newName, setNewName] = useState('');
      const [newTarget, setNewTarget] = useState('');
      const [newDate, setNewDate] = useState('');
      const [selectedGoal, setSelectedGoal] = useState(null);
      const [savingAmount, setSavingAmount] = useState('');
      const [savingNote, setSavingNote] = useState('');
      const [deleteConfirm, setDeleteConfirm] = useState(null);

      const handleDeleteGoal = (id) => {
        if (deleteConfirm === id) {
          dispatch({ type: 'DELETE_GOAL', payload: id });
          toast('Goal deleted');
          setDeleteConfirm(null);
        } else {
          setDeleteConfirm(id);
          setTimeout(() => setDeleteConfirm(prev => prev === id ? null : prev), 5000);
        }
      };

      // Budget under-spend opportunities
      const now = new Date();
      const cats = state.budget.categories || {};
      const monthExpenses = (state.expenses || []).filter(e => {
        const d = new Date(e.date);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });

      const underBudgetCats = Object.entries(cats).filter(([item, budgeted]) => {
        if (budgeted <= 0) return false;
        const budgetLower = item.split(' (')[0].toLowerCase();
        const spent = monthExpenses.filter(e => {
          const catLower = e.category.split(' (')[0].toLowerCase();
          return budgetLower.includes(catLower) || catLower.includes(budgetLower);
        }).reduce((s, e) => s + e.amount, 0);
        return spent < budgeted * 0.5; // Under 50% = good opportunity
      }).map(([item, budgeted]) => {
        const budgetLower = item.split(' (')[0].toLowerCase();
        const spent = monthExpenses.filter(e => {
          const catLower = e.category.split(' (')[0].toLowerCase();
          return budgetLower.includes(catLower) || catLower.includes(budgetLower);
        }).reduce((s, e) => s + e.amount, 0);
        return { name: item.split(' (')[0], saved: budgeted - spent };
      });

      const handleAddGoal = () => {
        if (!newName.trim() || !newTarget) return;
        dispatch({ type: 'ADD_GOAL', payload: { name: newName.trim(), target: Number(newTarget), deadline: newDate || null } });
        toast(`Goal "${newName.trim()}" created`);
        setNewName(''); setNewTarget(''); setNewDate(''); setShowAdd(false);
      };

      const handleLogSaving = (goalId) => {
        const amt = Number(savingAmount);
        if (!amt || amt <= 0) return;
        dispatch({ type: 'LOG_SAVING', goalId, amount: amt, note: savingNote.trim() });
        toast(`${fR(amt)} saved!`);
        setSavingAmount(''); setSavingNote(''); setSelectedGoal(null);
      };

      if (goals.length === 0 && !showAdd) {
        return (
          <div className="screen" style={{textAlign:'center',paddingTop:60}}>
            <div style={{marginBottom:16}}><Icon name="target" size={40} style={{color:'var(--coral)',marginBottom:16}} /></div>
            <h2>Backpocket Goals</h2>
            <p className="subtitle mt12">Save toward things that matter. Set a goal, log savings each month, and watch your progress grow.</p>
            <button className="btn btn-primary mt24" onClick={() => setShowAdd(true)}>Create Your First Goal</button>
          </div>
        );
      }

      return (
        <div className="screen">
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <BackButton onClick={() => navigate('dashboard')} />
            <h2 style={{flex:1}}>Backpocket</h2>
            <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(!showAdd)}>{showAdd ? 'Cancel' : '+ New Goal'}</button>
          </div>

          {/* Create Goal Form */}
          {showAdd && (
            <div className="card" style={{background:'var(--bg2)',marginBottom:16}}>
              <div style={{fontWeight:600,marginBottom:12}}>New Savings Goal</div>
              <div className="field">
                <label className="label" htmlFor="f-goal-name">What are you saving for?</label>
                <input id="f-goal-name" className="input" placeholder="e.g. Emergency fund, New laptop, Holiday" value={newName} onChange={e => setNewName(e.target.value)} />
              </div>
              <RandInput label="Target amount" value={newTarget ? Number(newTarget) : 0} onChange={v => setNewTarget(String(v))} />
              <div className="field">
                <label className="label" htmlFor="f-goal-date">Target date (optional)</label>
                <input id="f-goal-date" type="date" className="input" value={newDate} onChange={e => setNewDate(e.target.value)} />
              </div>
              {newTarget > 0 && newDate && (
                <div className="info-box">
                  {(() => {
                    const months = Math.max(1, Math.ceil((new Date(newDate) - now) / (30.44 * 24 * 60 * 60 * 1000)));
                    return `You'll need to save ~${fR(Math.ceil(Number(newTarget) / months))}/month to reach this goal.`;
                  })()}
                </div>
              )}
              <button className="btn btn-primary mt12" onClick={handleAddGoal} disabled={!newName.trim() || !newTarget}>Create Goal</button>
            </div>
          )}

          {/* Goals List */}
          {goals.map(goal => {
            const goalSavings = goal.savings || [];
            const saved = goalSavings.reduce((s, sv) => s + sv.amount, 0);
            const pct = goal.target > 0 ? Math.min(100, Math.round((saved / goal.target) * 100)) : 0;
            const remaining = Math.max(0, goal.target - saved);
            const isSelected = selectedGoal === goal.id;

            // Behind/ahead calculation
            let paceStatus = null;
            if (goal.deadline) {
              const totalMonths = Math.max(1, Math.ceil((new Date(goal.deadline) - new Date(goalSavings[0]?.date || now)) / (30.44 * 24 * 60 * 60 * 1000)));
              const monthsElapsed = Math.max(1, Math.ceil((now - new Date(goalSavings[0]?.date || now)) / (30.44 * 24 * 60 * 60 * 1000)));
              const expectedPct = Math.min(100, Math.round((monthsElapsed / totalMonths) * 100));
              if (pct >= expectedPct + 5) paceStatus = { text: 'Ahead of schedule', color: 'var(--success)' };
              else if (pct >= expectedPct - 5) paceStatus = { text: 'On track', color: 'var(--primary)' };
              else paceStatus = { text: 'Behind schedule', color: 'var(--danger-text)' };
            }

            return (
              <div key={goal.id} className="card" style={{marginBottom:12,borderColor:isSelected?'var(--primary)':'var(--border)'}}>
                <div className="flex-between mb8">
                  <div style={{fontWeight:600,fontSize:'1.0625rem'}}>{goal.name}</div>
                  <span className={`tag ${pct >= 100 ? 'tag-green' : pct >= 50 ? 'tag-amber' : ''}`}>{pct}%</span>
                </div>
                <div style={{fontSize:'.9375rem',fontWeight:500,color:'var(--primary)'}}>{fR(saved)} <span style={{color:'var(--text3)',fontWeight:400}}>of {fR(goal.target)}</span></div>
                <div className="budget-bar" style={{marginTop:8}}>
                  <div className={`budget-fill ${pct >= 100 ? 'green' : pct >= 50 ? 'amber' : ''}`} style={{width:`${pct}%`,background:pct<50?'var(--primary)':undefined}} />
                </div>
                <div className="flex-between mt8">
                  <span className="small">{fR(remaining)} to go</span>
                  {goal.deadline && <span className="small">{new Date(goal.deadline).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'})}</span>}
                </div>
                {paceStatus && <div className="small" style={{color:paceStatus.color,marginTop:4}}>{paceStatus.text}</div>}

                {/* Action buttons */}
                <div className="btn-row mt12">
                  <button className="btn btn-primary btn-sm" onClick={() => setSelectedGoal(isSelected ? null : goal.id)}>
                    {isSelected ? 'Cancel' : <><Icon name="wallet" size={16} style={{marginRight:4}} /> Log Saving</>}
                  </button>
                  <button className="btn btn-ghost btn-sm" style={{color:deleteConfirm===goal.id?'#fff':'var(--danger)',background:deleteConfirm===goal.id?'var(--danger)':'none',fontSize:'.8125rem',transition:'all .2s'}} onClick={() => handleDeleteGoal(goal.id)}>{deleteConfirm===goal.id ? 'Confirm Delete?' : 'Delete'}</button>
                </div>

                {/* Log Saving Form (inline) */}
                {isSelected && (
                  <div style={{marginTop:12,padding:'12px',background:'var(--bg2)',borderRadius:'var(--r)'}}>
                    <RandInput label="Amount saved" value={savingAmount ? Number(savingAmount) : 0} onChange={v => setSavingAmount(String(v))} />
                    <div className="field">
                      <label className="label" htmlFor="f-saving-note">Note (optional)</label>
                      <input id="f-saving-note" className="input" placeholder="e.g. Freelance bonus, budget surplus" value={savingNote} onChange={e => setSavingNote(e.target.value)} />
                    </div>
                    <button className="btn btn-primary btn-sm mt8" onClick={() => handleLogSaving(goal.id)} disabled={!savingAmount || Number(savingAmount) <= 0}>Save</button>
                  </div>
                )}

                {/* Recent savings log */}
                {goalSavings.length > 0 && !isSelected && (
                  <div style={{marginTop:8,borderTop:'1px solid var(--border)',paddingTop:8}}>
                    <div className="small" style={{fontWeight:600,marginBottom:4}}>Recent savings</div>
                    {goalSavings.slice(-3).reverse().map((sv, i) => (
                      <div key={i} className="flex-between" style={{fontSize:'.8125rem',padding:'3px 0'}}>
                        <span>{new Date(sv.date).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})} {sv.note && `— ${sv.note}`}</span>
                        <span style={{fontWeight:600,color:'var(--success)'}}>{fR(sv.amount)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          {/* Budget under-spend opportunities */}
          {underBudgetCats.length > 0 && goals.length > 0 && (
            <div className="info-box" style={{marginTop:12}}>
              <strong><Icon name="lightbulb" size={14} style={{marginRight:2}} /> Savings opportunity:</strong> You're under budget on {underBudgetCats.slice(0, 2).map(c => `${c.name} (${fR(c.saved)} left)`).join(' and ')}. Consider putting the surplus toward {goals[0].name}!
            </div>
          )}

        </div>
      );
    }

    // ===== BOTTOM NAVIGATION =====
    function BottomNav({ activeTab, onNavigate, showMoreBadge }) {
      return (
        <nav className="bottom-nav">
          <button className={`nav-btn ${activeTab==='dashboard'?'active':''}`} onClick={()=>onNavigate('dashboard')}>
            <span className="nav-icon"><Icon name="home" size={22} /></span>Home
          </button>
          <button className={`nav-btn ${activeTab==='budget'||activeTab==='budget-view'||activeTab==='expenses'?'active':''}`} onClick={()=>onNavigate('budget')}>
            <span className="nav-icon"><Icon name="chart" size={22} /></span>Budget
          </button>
          <button className="nav-btn nav-btn--log" onClick={()=>onNavigate('log-expense')} aria-label="Log new expense">
            <Icon name="plus" size={24} />
          </button>
          <button className={`nav-btn ${activeTab==='tax-summary'||activeTab==='tax-calculator'||activeTab==='provisional-tax'?'active':''}`} onClick={()=>onNavigate('tax-summary')}>
            <span className="nav-icon"><Icon name="file" size={22} /></span>Tax
          </button>
          <button className={`nav-btn ${activeTab==='settings'||activeTab==='backpocket'?'active':''}`} onClick={()=>{ localStorage.setItem('tt_backpocket_seen','1'); onNavigate('settings'); }} style={{position:'relative'}}>
            <span className="nav-icon"><Icon name="gear" size={22} /></span>More
            {showMoreBadge && <span style={{position:'absolute',top:6,right:'calc(50% - 18px)',width:8,height:8,borderRadius:'50%',background:'var(--coral)',border:'2px solid #0A1018'}} />}
          </button>
        </nav>
      );
    }

    // ===== BATCH 5: STORAGE GAUGE =====
    function StorageGauge({ compact }) {
      const bytes = getStorageSize();
      const maxBytes = 5 * 1024 * 1024;
      const pct = Math.min(100, Math.round((bytes / maxBytes) * 100));
      const color = bytes > 4.5 * 1048576 ? 'var(--danger)' : bytes > 4 * 1048576 ? '#e67e22' : bytes > 3 * 1048576 ? '#f39c12' : 'var(--primary)';
      if (compact) {
        return (
          <div style={{fontSize:'.75rem',color:'var(--text3)'}}>
            <div style={{background:'var(--bg2)',borderRadius:4,height:6,overflow:'hidden',marginBottom:2}}>
              <div style={{width:pct+'%',height:'100%',background:color,borderRadius:4,transition:'width .3s'}} />
            </div>
            {formatBytes(bytes)} / ~5 MB ({pct}%)
          </div>
        );
      }
      return (
        <div className="card" style={{padding:'12px 16px'}}>
          <div className="small" style={{fontWeight:600,marginBottom:6}}>Storage Used</div>
          <div style={{background:'var(--bg2)',borderRadius:6,height:10,overflow:'hidden',marginBottom:6}}>
            <div style={{width:pct+'%',height:'100%',background:color,borderRadius:6,transition:'width .3s'}} />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'.75rem',color:'var(--text3)'}}>
            <span>{formatBytes(bytes)}</span>
            <span>~5 MB limit</span>
          </div>
          {bytes > 4 * 1048576 && (
            <div className="warn-box" style={{marginTop:8,fontSize:'.8125rem'}}>
              {bytes > 4.5 * 1048576 ? 'Storage nearly full. Export data to free space.' : 'Storage getting full. Consider exporting your data.'}
            </div>
          )}
        </div>
      );
    }

    // ===== BATCH 5: DOCUMENT UPLOAD COMPONENT =====
    const DOC_TYPES = [
      { value: 'receipt', label: 'Receipt' },
      { value: 'irp5', label: 'IRP5 / IT3(a)' },
      { value: 'medical_cert', label: 'Medical certificate' },
      { value: 'section18a', label: 'Section 18A (donation)' },
      { value: 'logbook', label: 'Vehicle logbook' },
      { value: 'ra_cert', label: 'RA certificate' },
      { value: 'other', label: 'Other document' },
    ];

    function DocumentUpload({ state, dispatch, onComplete, defaultExpenseId, defaultType }) {
      const [fileData, setFileData] = useState(null);
      const [fileType, setFileType] = useState(null);
      const [fileName, setFileName] = useState('');
      const [docType, setDocType] = useState(defaultType || 'receipt');
      const [description, setDescription] = useState('');
      const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
      const [linkExpenseId, setLinkExpenseId] = useState(defaultExpenseId || '');
      const [saving, setSaving] = useState(false);
      const fileRef = useRef(null);
      const cameraRef = useRef(null);

      const handleFile = async (file) => {
        if (!file) return;
        setFileName(file.name);
        setFileType(file.type);
        const data = await compressImage(file);
        setFileData(data);
      };

      const handleSave = () => {
        if (!fileData) return;
        setSaving(true);
        const doc = {
          type: docType,
          description: description || fileName,
          date,
          taxYear: state.user.taxYear || '2025/26',
          linkedExpenseId: linkExpenseId || null,
          fileType,
          fileName,
          fileData,
          fileSize: new Blob([fileData]).size,
          created: new Date().toISOString()
        };
        // Generate doc ID before dispatch so we can link immediately (no race condition)
        const docId = 'doc-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
        doc.id = docId;
        dispatch({ type: 'ADD_DOCUMENT', payload: doc });
        // If linking to expense, dispatch link action immediately (no setTimeout needed)
        if (linkExpenseId) {
          dispatch({ type: 'LINK_DOCUMENT', expenseId: Number(linkExpenseId), docId: docId });
        }
        setSaving(false);
        if (onComplete) onComplete(doc);
      };

      const storageBytes = getStorageSize();
      const storageWarning = storageBytes > 4.5 * 1048576 ? 'red' : storageBytes > 4 * 1048576 ? 'amber' : storageBytes > 3 * 1048576 ? 'subtle' : null;

      // Unlinked work expenses (for linking dropdown)
      const recentExpenses = (state.expenses || []).slice(-30).reverse();

      if (!fileData) {
        return (
          <div>
            <input type="file" ref={fileRef} accept="image/*,application/pdf" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
            <input type="file" ref={cameraRef} accept="image/*" capture="environment" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {isMobile() && (
                <button className="btn btn-secondary" onClick={() => cameraRef.current.click()} style={{flex:1}}><Icon name="camera" size={16} /> Take Photo</button>
              )}
              <button className="btn btn-secondary" onClick={() => fileRef.current.click()} style={{flex:1}}><Icon name="upload" size={16} /> Upload File</button>
            </div>
            {storageWarning && (
              <div style={{marginTop:8}}><StorageGauge compact /></div>
            )}
          </div>
        );
      }

      return (
        <div>
          {/* Preview */}
          <div style={{marginBottom:12,borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',maxHeight:200,display:'flex',justifyContent:'center',background:'var(--bg2)'}}>
            {fileType && fileType.startsWith('image/') ? (
              <img src={fileData} alt="Preview" style={{maxHeight:200,maxWidth:'100%',objectFit:'contain'}} />
            ) : (
              <div style={{padding:'2rem',textAlign:'center'}}>
                <div><Icon name="file" size={32} style={{color:'var(--text3)'}} /></div>
                <div className="small">{fileName}</div>
              </div>
            )}
          </div>

          {/* Form fields */}
          <div className="field">
            <label className="label" htmlFor="f-doc-type">Document Type</label>
            <select id="f-doc-type" className="input" value={docType} onChange={e => setDocType(e.target.value)}>
              {DOC_TYPES.map(dt => <option key={dt.value} value={dt.value}>{dt.label}</option>)}
            </select>
          </div>
          <div className="field">
            <label className="label" htmlFor="f-doc-desc">Description</label>
            <input id="f-doc-desc" className="input" placeholder="e.g. Woolworths receipt March 2025" value={description} onChange={e => setDescription(e.target.value)} />
          </div>
          <div className="field">
            <label className="label" htmlFor="f-doc-date">Date</label>
            <input id="f-doc-date" className="input" type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          {!defaultExpenseId && (
            <div className="field">

              {saving ? 'Saving...' : <><Icon name="save" size={16} style={{marginRight:4}} /> Save Document</>}
            </button>

        </div>

    // ===== BATCH 5: DOCUMENTS SCREEN =====
    function DocumentsScreen({ state, dispatch, navigate }) {
      const [filterType, setFilterType] = useState('all');
      const [filterYear, setFilterYear] = useState('all');
      const [showUpload, setShowUpload] = useState(false);
      const [viewDoc, setViewDoc] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const documents = state.documents || [];

      // Get unique tax years from documents
      const taxYears = [...new Set(documents.map(d => d.taxYear))].sort().reverse();

      // Filter
      let filtered = documents;
      if (filterType !== 'all') filtered = filtered.filter(d => d.type === filterType);
      if (filterYear !== 'all') filtered = filtered.filter(d => d.taxYear === filterYear);
      filtered = [...filtered].reverse(); // newest first

      // Count by type
      const typeCounts = {};
      documents.forEach(d => { typeCounts[d.type] = (typeCounts[d.type] || 0) + 1; });

      const handleDelete = (docId) => {
        if (deleteConfirm === docId) {
          dispatch({ type: 'DELETE_DOCUMENT', payload: docId });
          setDeleteConfirm(null);
        } else {
          setDeleteConfirm(docId);
          setTimeout(() => setDeleteConfirm(c => c === docId ? null : c), 5000);
        }
      };

      const handleViewDoc = (doc) => {
        if (doc.fileType === 'application/pdf') {
          // Open PDF in new tab
          const byteString = atob(doc.fileData.split(',')[1]);
          const ab = new ArrayBuffer(byteString.length);
          const ia = new Uint8Array(ab);
          for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
          const blob = new Blob([ab], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          window.open(url, '_blank');
        } else {
          setViewDoc(doc);
        }
      };

      const getLinkedExpense = (doc) => {
        if (!doc.linkedExpenseId) return null;
        return (state.expenses || []).find(e => e.id === doc.linkedExpenseId || e.id === Number(doc.linkedExpenseId));
      };

      const typeLabel = (type) => {
        const found = DOC_TYPES.find(t => t.value === type);
        return found ? found.label : type;
      };

      return (
        <div className="screen">
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'1rem'}}>
            <BackButton onClick={() => navigate('settings')} />
            <h2 style={{margin:0}}><Icon name="folder" size={20} style={{marginRight:6}} /> Documents</h2>
            <span className="small" style={{marginLeft:'auto'}}>{documents.length} total</span>
          </div>

          {/* Type counts */}
          {documents.length > 0 && (
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
              {Object.entries(typeCounts).map(([type, count]) => (
                <span key={type} style={{fontSize:'.75rem',background:'var(--bg2)',padding:'2px 8px',borderRadius:12,color:'var(--text2)'}}>
                  {typeLabel(type).split(' ')[0]} {count}
                </span>
              ))}
            </div>
          )}

          {/* Add document */}
          {showUpload ? (
            <div className="card" style={{marginBottom:16,padding:16}}>
              <div className="small" style={{fontWeight:600,marginBottom:8}}>Add Document</div>
              <DocumentUpload state={state} dispatch={dispatch} onComplete={() => setShowUpload(false)} />
            </div>
          ) : (
            <button className="btn mb16" style={{background:'var(--primary)',color:'#fff',width:'100%'}} onClick={() => setShowUpload(true)}>+ Add Document</button>
          )}

          {/* Filters */}
          {documents.length > 0 && (
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              <select aria-label="Filter by document type" className="input" style={{flex:1,fontSize:'.8125rem'}} value={filterType} onChange={e => setFilterType(e.target.value)}>
                <option value="all">All types</option>
                {DOC_TYPES.map(dt => <option key={dt.value} value={dt.value}>{dt.label}</option>)}
              </select>
              {taxYears.length > 1 && (
                <select aria-label="Filter by tax year" className="input" style={{flex:1,fontSize:'.8125rem'}} value={filterYear} onChange={e => setFilterYear(e.target.value)}>
                  <option value="all">All years</option>
                  {taxYears.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
              )}
            </div>
          )}

          {/* Document grid */}
          {filtered.length === 0 ? (
            <div style={{textAlign:'center',padding:'3rem 1rem',color:'var(--text3)'}}>
              <div style={{marginBottom:8}}><Icon name="folder" size={40} style={{color:'var(--text3)',marginBottom:8}} /></div>
              <div>{documents.length === 0 ? 'No documents yet' : 'No documents match filters'}</div>
              <div className="small" style={{marginTop:4}}>Upload receipts, IRP5s, and certificates for your tax records.</div>
            </div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {filtered.map(doc => {
                const linked = getLinkedExpense(doc);
                return (
                  <div key={doc.id} className="card" style={{padding:0,overflow:'hidden',position:'relative'}}>
                    {/* Thumbnail / icon */}
                    <div onClick={() => handleViewDoc(doc)} style={{cursor:'pointer',height:110,background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                      {doc.fileType && doc.fileType.startsWith('image/') ? (
                        <img src={doc.fileData} alt={doc.description} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                      ) : (
                        <div style={{textAlign:'center'}}>
                          <div><Icon name="file" size={32} style={{color:'var(--text3)'}} /></div>
                          <div style={{fontSize:'.7rem',color:'var(--text3)'}}>PDF</div>
                        </div>
                      )}
                    </div>
                    {/* Info */}
                    <div style={{padding:'6px 8px'}}>
                      <div style={{fontSize:'.75rem',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.description || doc.fileName}</div>
                      <div style={{fontSize:'.6875rem',color:'var(--text3)'}}>{new Date(doc.date).toLocaleDateString('en-ZA')} · {typeLabel(doc.type).split(' ')[0]}</div>
                      {linked && <div style={{fontSize:'.625rem',color:'var(--primary)'}}><Icon name="link" size={10} /> {linked.description}</div>}
                      {/* Delete */}
                      <button onClick={() => handleDelete(doc.id)} style={{
                        fontSize:'.6875rem', border:'none', cursor:'pointer', marginTop:4, padding:'2px 8px', borderRadius:4, width:'100%',
                        background: deleteConfirm === doc.id ? 'var(--danger)' : 'var(--bg2)',
                        color: deleteConfirm === doc.id ? '#fff' : 'var(--text3)',
                        transition:'all .2s'
                      }}>
                        {deleteConfirm === doc.id ? 'Confirm Delete?' : <><Icon name="trash" size={14} style={{marginRight:4}} /> Delete</>}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Storage gauge */}
          <div style={{marginTop:20}}><StorageGauge /></div>

          {/* Full-size image viewer modal */}
          {viewDoc && (
            <div onClick={() => setViewDoc(null)} style={{
              position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,.9)',
              zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer'
            }}>
              <button onClick={() => setViewDoc(null)} style={{position:'absolute',top:16,right:16,background:'none',border:'none',color:'#fff',fontSize:'1.5rem',cursor:'pointer'}}>✕</button>
              <img src={viewDoc.fileData} alt={viewDoc.description} style={{maxWidth:'95%',maxHeight:'90vh',objectFit:'contain'}} />
            </div>
          )}
        </div>
      );
    }

    // ===== BATCH 5: IMPORT DATA SCREEN =====
    function ImportDataScreen({ state, dispatch, navigate }) {
      const [fileContent, setFileContent] = useState(null);
      const [error, setError] = useState(null);
      const [importing, setImporting] = useState(false);
      const fileRef = useRef(null);
      const [dragOver, setDragOver] = useState(false);

      const processFile = (file) => {
        setError(null);
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = JSON.parse(e.target.result);
            if (parsed.app !== 'Tax Tjommie') {
              setError('This file is not a Tax Tjommie backup.');
              return;
            }
            if (!parsed.data) {
              setError('This backup file contains no data.');
              return;
            }
            // Checksum verification
            const data = parsed.data;
            const expCount = (data.expenses || []).length;
            const docCount = (data.documents || []).length;
            const totalAmt = (data.expenses || []).reduce((s, ex) => s + (ex.amount || 0), 0);
            const calcChecksum = expCount + docCount + Math.round(totalAmt);
            if (parsed.checksum && Math.abs(parsed.checksum - calcChecksum) > 1) {
              parsed._checksumWarning = true;
            }
            setFileContent(parsed);
          } catch (err) {
            setError('Could not read this file. Make sure it\'s a valid JSON backup.');
          }
        };
        reader.readAsText(file);
      };

      const handleImport = () => {
        if (!fileContent || !fileContent.data) return;
        setImporting(true);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(fileContent.data));
          // Brief success message before reload to avoid jarring transition
          setTimeout(() => {
            window.location.hash = 'dashboard';
            window.location.reload();
          }, 600);
        } catch (err) {
          setError('Import failed: ' + err.message);
          setImporting(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files[0];
        if (file) processFile(file);
      };

      return (
        <div className="screen">
          <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'1.5rem'}}>
            <BackButton onClick={() => navigate('settings')} />
            <h2 style={{margin:0}}><Icon name="download" size={20} style={{marginRight:6}} /> Import Data</h2>
          </div>

          {!fileContent ? (
            <>
              <input type="file" ref={fileRef} accept=".json,application/json" style={{display:'none'}} onChange={e => e.target.files[0] && processFile(e.target.files[0])} />

              {/* Drop zone (desktop) / file picker */}
              <div
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
                onClick={() => fileRef.current.click()}
                style={{
                  border: '2px dashed ' + (dragOver ? 'var(--primary)' : 'var(--border)'),
                  borderRadius: 12, padding: '3rem 1.5rem', textAlign: 'center',
                  cursor: 'pointer', background: dragOver ? 'rgba(16,185,129,.05)' : 'var(--bg2)',
                  transition: 'all .2s', marginBottom: 16
                }}
              >
                <div style={{marginBottom:8}}><Icon name="folder" size={40} style={{color:'var(--text3)',marginBottom:8}} /></div>
                <div style={{fontWeight:600,marginBottom:4}}>Choose backup file</div>
                <div className="small" style={{color:'var(--text3)'}}>
                  {!isMobile() ? 'Drag & drop a .json file here, or click to browse' : 'Tap to select a .json file'}
                </div>
              </div>

              {error && <div className="warn-box" style={{marginTop:12}}><Icon name="warning" size={14} style={{marginRight:4}} /> {error}</div>}

              <div className="card" style={{marginTop:24,padding:16}}>
                <div style={{fontWeight:600,marginBottom:8}}>How to sync between devices</div>
                <div className="small" style={{color:'var(--text2)',lineHeight:1.6}}>
                  1. On your main device → tap <strong>Export Data</strong> in Settings<br/>
                  2. Send the file to your other device (email, WhatsApp, AirDrop)<br/>
                  3. On this device → tap <strong>Import Data</strong> and select the file<br/><br/>
                  <Icon name="lightbulb" size={14} style={{marginRight:2}} /> Always export from whichever device has the latest data.
                </div>
              </div>
            </>
          ) : (
            <>
              {/* Import preview */}
              <div className="card" style={{padding:16,marginBottom:16}}>
                <div style={{fontWeight:600,fontSize:'1.1rem',marginBottom:12}}>Import Preview</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.875rem'}}>
                  <div style={{color:'var(--text3)'}}>From:</div>
                  <div>{fileContent.exportDevice || 'Unknown'}</div>
                  <div style={{color:'var(--text3)'}}>Exported:</div>
                  <div>{fileContent.exportDate ? new Date(fileContent.exportDate).toLocaleDateString('en-ZA', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Unknown'}</div>
                  <div style={{color:'var(--text3)'}}>Profile:</div>
                  <div>{fileContent.data.user ? fileContent.data.user.name : 'Unknown'}</div>
                  <div style={{color:'var(--text3)'}}>Tax years:</div>
                  <div>{(fileContent.taxYears || []).join(', ') || 'None'}</div>
                  <div style={{color:'var(--text3)'}}>Expenses:</div>
                  <div>{fileContent.expenseCount || (fileContent.data.expenses || []).length}</div>
                  <div style={{color:'var(--text3)'}}>Documents:</div>
                  <div>{fileContent.documentCount || (fileContent.data.documents || []).length}</div>
                  <div style={{color:'var(--text3)'}}>Data size:</div>
                  <div>{fileContent.dataSize || 'Unknown'}</div>
                </div>

                {fileContent._checksumWarning && (
                  <div className="warn-box" style={{marginTop:12}}><Icon name="warning" size={14} style={{marginRight:4}} /> File checksum doesn't match. This file may have been modified. Import anyway at your own risk.</div>
                )}
              </div>

              <div className="warn-box" style={{marginBottom:16,background:'rgba(239,68,68,.08)',borderColor:'var(--danger)'}}>
                <strong><Icon name="warning" size={14} style={{marginRight:4}} /> This will REPLACE all data on this device.</strong><br/>
                <span className="small">Make sure you've exported from this device first if you have data here you want to keep.</span>
              </div>

              {error && <div className="warn-box" style={{marginBottom:12}}><Icon name="warning" size={14} style={{marginRight:4}} /> {error}</div>}

              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-secondary" style={{flex:1}} onClick={() => { setFileContent(null); setError(null); }}>Cancel</button>
                <button className="btn" style={{flex:1,background:'var(--primary)',color:'#fff'}} onClick={handleImport} disabled={importing}>
                  {importing ? 'Importing...' : <><Icon name="download" size={16} style={{marginRight:4}} /> Import &amp; Replace</>}
                </button>
              </div>
            </>
          )}
        </div>
      );
    }
