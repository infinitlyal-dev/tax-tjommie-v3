    /* ===== Screen 6 — Processing (v5: multi-file, deduplication, per-file progress) ===== */
    function ScreenProcessing({ setStep, uploadedTxns, setUploadedTxns, uploadMeta }) {
      const { state, showToast } = useData();
      const [stage, setStage] = useState('reading');
      const [count, setCount] = useState(0);
      const [total, setTotal] = useState(0);
      const [currentFile, setCurrentFile] = useState(null);
      const [tickerItems, setTickerItems] = useState([]);
      const [dedupMessage, setDedupMessage] = useState(null);
      const ranRef = useRef(false);

      useEffect(() => {
        if (ranRef.current) return;
        ranRef.current = true;
        const MIN_DURATION = 4000;
        const MAX_DURATION = 20000;
        const startTs = Date.now();
        const context = aiContextFrom(state);
        const skipAi = state.settings?.skipAiProcessing;

        async function run() {
          await new Promise(r => setTimeout(r, 500));
          setStage('sorting');

          let results = [];

          // Case A: skipped upload — use 150+ demo transactions
          if (!uploadedTxns.length) {
            const demo = buildDemoTransactions();
            setTotal(demo.length);
            // Animate the ticker with a chunk of demo rows
            for (let i = 0; i < demo.length; i += 3) {
              setCount(Math.min(demo.length, i + 3));
              const chunk = demo.slice(i, i + 3);
              setTickerItems(prev => [...prev.slice(-12), ...chunk.map(r => ({
                desc: r.description.slice(0, 30),
                cat: CATEGORIES[r.category]?.label || r.category,
              }))]);
              if (Date.now() - startTs > MAX_DURATION) break;
              await new Promise(r => setTimeout(r, 40));
            }
            results = demo;
          } else {
            // Case B: real upload(s). Split rows by _sourceFile, process each, then dedup.
            const deferredFiles = uploadedTxns.filter(r => r._deferred);
            const csvRows = uploadedTxns.filter(r => !r._deferred);

            // Tally total for progress bar — estimate ~50 txns per PDF/image
            setTotal(csvRows.length + deferredFiles.length * 50);

            // Process CSV rows in chunks
            if (csvRows.length) {
              const byFile = {};
              csvRows.forEach(r => { (byFile[r._sourceFile || 'Unknown'] ||= []).push(r); });
              for (const [fileName, rows] of Object.entries(byFile)) {
                setCurrentFile(fileName);
                const chunkSize = 50;
                for (let i = 0; i < rows.length; i += chunkSize) {
                  const chunk = rows.slice(i, i + chunkSize);
                  const cat = await categoriseBatch(chunk, { context, skipAi });
                  cat.forEach(r => { r._sourceFile = fileName; });
                  results = results.concat(cat);
                  setCount(results.length);
                  setTickerItems(prev => [...prev.slice(-12), ...cat.slice(-3).map(r => ({
                    desc: (r.description || '').slice(0, 30),
                    cat: CATEGORIES[r.category]?.label || r.category,
                  }))]);
                }
              }
            }

            // Process PDFs/images one at a time
            for (const def of deferredFiles) {
              setCurrentFile(def._sourceFile);
              try {
                if (skipAi) {
                  showToast('Skip AI is on — PDFs need AI. Try CSV export.', 'error');
                  continue;
                }
                const cat = await categoriseFile(def._file, { context });
                cat.forEach(r => { r._sourceFile = def._sourceFile; });
                results = results.concat(cat);
                setCount(results.length);
                setTickerItems(prev => [...prev.slice(-12), ...cat.slice(-3).map(r => ({
                  desc: (r.description || '').slice(0, 30),
                  cat: CATEGORIES[r.category]?.label || r.category,
                }))]);
              } catch (err) {
                console.error('PDF/image processing failed:', err);
                showToast(`Couldn't read ${def._sourceFile}: ${err.message}`, 'error');
              }
            }

            // DEDUPLICATION — within ±2 days, same amount, fuzzy description match
            const beforeDedup = results.length;
            results = dedupTransactions(results);
            const removed = beforeDedup - results.length;
            if (removed > 0) {
              setDedupMessage(`Matched ${removed} duplicate${removed === 1 ? '' : 's'} — won't count twice`);
            }
          }

          setStage('finding');
          // Hold the screen for at least MIN_DURATION so users see the work happening
          const elapsed = Date.now() - startTs;
          if (elapsed < MIN_DURATION) await new Promise(r => setTimeout(r, MIN_DURATION - elapsed));

          // Convert results to txn objects; transfers/ATMs are dropped here
          const txns = results.map(r => ({
            id: uid('txn'),
            accountId: 'acc_main',
            date: r.date || new Date().toISOString().slice(0, 10),
            description: r.description,
            amount: r.amount,
            category: r.category || 'uncategorised',
            source: 'ai',
            confidence: r.confidence ?? 0.9,
            needsReview: r.needsReview ?? (r.confidence != null && r.confidence < 0.7),
            userConfirmed: false,
            isDeductible: CATEGORIES[r.category]?.group === 'work',
            complianceNote: null,
            taxYear: taxYearForDate(r.date || new Date().toISOString().slice(0, 10)),
            receiptAttached: false,
            sourceFile: r._sourceFile || null,
            receiptId: null,
            subcategoryBreakdown: null,
            createdAt: new Date().toISOString(),
          })).filter(t => t.category !== 'ignore');

          setUploadedTxns(txns);
          setStep('review');
        }

        run().catch(err => {
          console.error(err);
          showToast('Something went sideways. Try again?', 'error');
          setStep('upload');
        });
      }, []);

      const stageCopy = {
        reading:  currentFile ? `Reading ${currentFile}…` : 'Reading your statements…',
        sorting:  currentFile ? `Sorting ${currentFile}…` : 'Sorting transactions…',
        finding:  'Finding your deductions…',
      };
      const fileCount = uploadMeta?.files?.length || 0;

      return (
        <div className="screen flex flex-col items-center justify-center" style={{minHeight: '100dvh'}}>
          <div className="tjommie tjommie-lg tjommie-pulse mb-8">TT</div>
          <h2 className="t-h1 text-center mb-3" style={{padding: '0 16px'}}>{stageCopy[stage]}</h2>
          <p className="t-body t-secondary text-center mb-1">
            {count} of {total} transactions categorised
            {fileCount > 1 && <span> across {fileCount} files</span>}
          </p>
          {dedupMessage && <p className="t-small t-teal mb-6">{dedupMessage}</p>}
          {!dedupMessage && <div className="mb-6" />}

          <div className="card w-full" style={{maxWidth: 360}}>
            <div className="ticker">
              <div className="ticker-inner">
                {[...tickerItems, ...tickerItems].map((t, i) => (
                  <div key={i} className="flex justify-between gap-3 py-2 t-small">
                    <span className="t-secondary" style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{t.desc}</span>
                    <span className="t-teal" style={{flexShrink: 0}}>→ {t.cat}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="progress-bar mt-8" style={{width: '80%', maxWidth: 300}}>
            <div className="progress-bar-fill" style={{width: `${Math.min(100, total ? (count/total)*100 : 0)}%`}}></div>
          </div>
        </div>
      );
    }

    /**
     * Detect and remove duplicate transactions across multiple files.
     * Rule: same amount (±R0.01), same fuzzy description, within ±2 days = duplicate.
     * Also drops transfer pairs — an outgoing "Transfer to CC" matching an incoming
     * credit card payment is marked ignore so budgets don't double-count.
     */
    function dedupTransactions(rows) {
      const out = [];
      const seen = new Set();
      for (const r of rows) {
        // Normalise description to the first 4 alphanumeric tokens
        const key = [
          r.date?.slice(0, 10) || '',
          Math.round(Math.abs(r.amount || 0) * 100),
          (r.description || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').split(/\s+/).filter(Boolean).slice(0, 4).join(' '),
        ].join('|');

        // Also check ±1 day neighbours for near-dupes
        let isDupe = false;
        if (seen.has(key)) isDupe = true;
        else {
          const d = new Date(r.date);
          for (const dayOffset of [-2, -1, 1, 2]) {
            const nd = new Date(d); nd.setDate(d.getDate() + dayOffset);
            const altKey = [nd.toISOString().slice(0, 10), Math.round(Math.abs(r.amount||0) * 100), key.split('|')[2]].join('|');
            if (seen.has(altKey)) { isDupe = true; break; }
          }
        }

        if (isDupe) continue;
        seen.add(key);
        out.push(r);
      }
      return out;
    }

    /* ===== Screen 7 — Review (HERO SCREEN, match 01-review-screen.png) =====
       v5 additions:
         - File tabs (All / Cheque / CC) to filter by source file
         - Dual hero stats: deductions + avg monthly spend (side-by-side on card)
    */
    function ScreenReview({ setStep, uploadedTxns, setUploadedTxns, uploadMeta }) {
      const { dispatch, showToast } = useData();
      const [editing, setEditing] = useState(null);
      const [activeFile, setActiveFile] = useState('all');

      // Gather the unique source files for tab filter
      const fileTabs = useMemo(() => {
        const files = new Map();
        files.set('all', { key: 'all', label: 'All', count: uploadedTxns.length });
        uploadedTxns.forEach(t => {
          if (!t.sourceFile) return;
          const short = shortenFileName(t.sourceFile);
          const existing = files.get(t.sourceFile) || { key: t.sourceFile, label: short, count: 0 };
          existing.count += 1;
          files.set(t.sourceFile, existing);
        });
        return Array.from(files.values());
      }, [uploadedTxns]);

      const filteredTxns = useMemo(() => {
        if (activeFile === 'all') return uploadedTxns;
        return uploadedTxns.filter(t => t.sourceFile === activeFile);
      }, [uploadedTxns, activeFile]);

      const stats = useMemo(() => {
        const totalCount = filteredTxns.length;
        const flagged = filteredTxns.filter(t => t.needsReview).length;
        const deductions = filteredTxns
          .filter(t => CATEGORIES[t.category]?.group === 'work')
          .reduce((sum, t) => sum + Math.abs(t.amount || 0), 0);
        const spend = filteredTxns
          .filter(t => t.amount < 0 && CATEGORIES[t.category]?.group !== 'system')
          .reduce((sum, t) => sum + Math.abs(t.amount || 0), 0);
        const minDate = filteredTxns.reduce((m, t) => !m || t.date < m ? t.date : m, null);
        const maxDate = filteredTxns.reduce((m, t) => !m || t.date > m ? t.date : m, null);
        const monthsSpan = (() => {
          if (!minDate || !maxDate) return 1;
          const ms = new Date(maxDate) - new Date(minDate);
          return Math.max(1, ms / (1000 * 60 * 60 * 24 * 30));
        })();
        const avgMonthly = spend / monthsSpan;
        return { totalCount, flagged, deductions, avgMonthly, minDate, maxDate };
      }, [filteredTxns]);

      const [showAll, setShowAll] = useState(false);

    /**
     * inferFromTransactions — the AI pre-fill engine (spec §4 Screen 8).
     *
     * Scans the transaction pool and returns what we can auto-fill for the deduction
     * prompts: phone bill, rent, electricity, fuel, internet, medical aid, RA, insurance.
     *
     * The returned shape is designed to drop straight into the deduction-setup inputs.
     */
    function inferFromTransactions(txns) {
      if (!txns || !txns.length) return {};
      const out = {};

      // Match merchants against a rule set — returns the monthly spend (if recurring).
      const rules = [
        { key: 'phoneBill',     rx: /vodacom|cell c|mtn\b|telkom mobile/i },
        { key: 'fibre',         rx: /mweb|afrihost|rain fibre|cool ideas|webafrica|home fibre/i },
        { key: 'rent',          rx: /rental|landlord|property24|body corporate levy/i, excludeRx: /car rental|hertz|avis/i },
        { key: 'electricity',   rx: /eskom|prepaid electric|municipal|city of cape town/i },
        { key: 'medical',       rx: /discovery health|momentum health|bonitas|medihelp|fedhealth/i },
        { key: 'retirement',    rx: /retirement annuity|\bra\b.*annuity|sanlam.*ra|old mutual.*ra|allan gray.*ra/i },
        { key: 'indemnity',     rx: /professional indemnity|indemnity insurance/i },
      ];

      for (const rule of rules) {
        const matching = txns.filter(t => rule.rx.test(t.description) && (!rule.excludeRx || !rule.excludeRx.test(t.description)));
        if (!matching.length) continue;
        // Group by month
        const byMonth = {};
        matching.forEach(t => {
          const m = (t.date || '').slice(0, 7);
          byMonth[m] = (byMonth[m] || 0) + Math.abs(t.amount || 0);
        });
        const monthKeys = Object.keys(byMonth);
        if (!monthKeys.length) continue;
        const avg = monthKeys.reduce((s, k) => s + byMonth[k], 0) / monthKeys.length;
        const sample = matching[0].description;
        out[rule.key] = { monthlyAmount: Math.round(avg), merchant: sample };
      }

      // Fuel is variable — use the total/months span
      const fuel = txns.filter(t => /fuel|petrol|diesel|engen|sasol|shell|bp\b|caltex/i.test(t.description));
      if (fuel.length) {
        const total = fuel.reduce((s, t) => s + Math.abs(t.amount || 0), 0);
        const months = new Set(fuel.map(t => (t.date || '').slice(0, 7))).size || 1;
        out.fuel = { monthlyAmount: Math.round(total / months), merchant: fuel[0].description };
      }

      // Equipment spend this period — surface as a prompt (not a pre-fill)
      const equipment = txns.filter(t => t.category === 'equipment' && Math.abs(t.amount || 0) > 500);
      if (equipment.length) {
        out.equipmentItems = equipment.slice(0, 3).map(t => ({ description: t.description, amount: Math.abs(t.amount) }));
      }

      return out;
    }

    /* ===== Screen 8 — Smart deduction prompts (v5: AI-inferred pre-fills) ===== */
    function ScreenDeductionPrompts({ setStep }) {
      const { state } = useData();
      const [index, setIndex] = useState(0);

      const txns = state.transactions;
      const inferred = useMemo(() => inferFromTransactions(txns), [txns]);
      const careerProfile = useMemo(() => matchCareerProfile(state.user.occupation), [state.user.occupation]);

      // Build the prompt queue from inferred data (only show prompts we have evidence for)
      const prompts = useMemo(() => {
        const list = [];

        if (inferred.rent || inferred.electricity || inferred.fibre) {
          const items = [];
          if (inferred.rent)        items.push(`rent about ${fmtZAR(inferred.rent.monthlyAmount)}/mo`);
          if (inferred.electricity) items.push(`electricity ${fmtZAR(inferred.electricity.monthlyAmount)}/mo`);
          if (inferred.fibre)       items.push(`fibre ${fmtZAR(inferred.fibre.monthlyAmount)}/mo`);
          list.push({
            key: 'homeOffice',
            title: 'I see you might work from home.',
            body: `Found ${items.join(', ')}. If part of your home is a dedicated workspace, you can deduct a percentage.`,
            setup: HomeOfficeQuickSetup,
            inferred,
          });
        }

        if (inferred.fuel) {
          list.push({
            key: 'travel',
            title: `I see about ${fmtZAR(inferred.fuel.monthlyAmount)}/month on fuel.`,
            body: 'Do you use your car for work? Even partly qualifies for a deduction if you keep a logbook.',
            setup: TravelQuickSetup,
            inferred,
          });
        }

        if (inferred.phoneBill) {
          list.push({
            key: 'phone',
            title: `I see a ${fmtZAR(inferred.phoneBill.monthlyAmount)}/month phone bill.`,
            body: `That's ${inferred.phoneBill.merchant}. Is this partly for work? I'll work out the deductible portion.`,
            setup: PhoneQuickSetup,
            inferred,
          });
        }

        if (inferred.retirement) {
          list.push({
            key: 'retirement',
            title: `I see an RA contribution — ${fmtZAR(inferred.retirement.monthlyAmount)}/month.`,
            body: 'Retirement annuity contributions are tax-deductible up to 27.5% of your income, capped at R350,000/year.',
            setup: RetirementQuickSetup,
            inferred,
          });
        }

        if (inferred.medical) {
          list.push({
            key: 'medical',
            title: `I see medical aid — ${inferred.medical.merchant.replace(/\s+debit.*$/i, '')}.`,
            body: 'Let me know your member details so I can work out your medical tax credits correctly.',
            setup: MedicalQuickSetup,
            inferred,
          });
        }

        if (inferred.indemnity) {
          list.push({
            key: 'indemnity',
            title: `I see a professional indemnity payment.`,
            body: `${fmtZAR(inferred.indemnity.monthlyAmount)}/month — if this is for your work, it's fully deductible.`,
            setup: ProfessionalQuickSetup,
            inferred,
          });
        }

        // Occupation-specific (spec §4 Screen 8): "For the photographer: Did you buy any camera equipment?"
        if (careerProfile && inferred.equipmentItems) {
          list.push({
            key: 'occupation_equipment',
            title: `Any ${careerProfile.name.toLowerCase()} equipment to claim?`,
            body: `I spotted ${inferred.equipmentItems.map(i => i.description).slice(0, 2).join(', ')}. Want to set up equipment depreciation?`,
            setup: EquipmentQuickSetup,
            inferred,
          });
        }

        return list;
      }, [inferred, careerProfile]);

      const current = prompts[index];
      const done = () => setStep('budget');

      if (!current) {
        return (
          <div className="screen">
            <div className="header">
              <button className="header-btn" onClick={() => setStep('review')} aria-label="Back"><Icon name="back" /></button>
              <div />
              <div />
            </div>
            <h1 className="t-display mb-3">Anything else?</h1>
            <p className="t-body t-secondary mb-6">You can set up more deductions later in Tax → Deductions. For now, let's build your budget.</p>
            <button className="btn btn-primary" onClick={done}>Continue</button>
          </div>
        );
      }

      const SetupComp = current.setup;

      return (
        <div className="screen">
          <div className="header">
            <button className="header-btn" onClick={() => index > 0 ? setIndex(index - 1) : setStep('review')} aria-label="Back"><Icon name="back" /></button>
            <div className="t-small t-muted">Step {index + 1} of {prompts.length}</div>
            <button className="header-btn" onClick={done} aria-label="Skip all"><Icon name="close" /></button>
          </div>

          <h1 className="t-display mb-3" style={{lineHeight: 1.25}}>{current.title}</h1>
          <p className="t-body t-secondary mb-6">{current.body}</p>

          <SetupComp
            inferred={current.inferred}
            onDone={() => { if (index + 1 < prompts.length) setIndex(index + 1); else done(); }}
            onSkip={() => { if (index + 1 < prompts.length) setIndex(index + 1); else done(); }}
          />
        </div>
      );
    }

    /* ===== Screen 7 — Budget confirm ===== */
    function ScreenBudgetConfirm({ setStep }) {
      const { state, dispatch } = useData();

      const derived = useMemo(() => {
        // Roll up monthly averages from transactions by category
        const byCat = {};
        const monthsSet = new Set();
        state.transactions.forEach(t => {
          if (!t.date || t.amount > 0) return;
          const mon = t.date.slice(0, 7);
          monthsSet.add(mon);
          const cat = t.category;
          if (CATEGORIES[cat]?.group !== 'personal') return;
          byCat[cat] = (byCat[cat] || 0) + Math.abs(t.amount);
        });
        const months = Math.max(1, monthsSet.size);
        const rows = Object.entries(byCat).map(([cat, total]) => ({
          cat,
          label: CATEGORIES[cat]?.label || cat,
          monthly: Math.round(total / months),
        })).sort((a, b) => b.monthly - a.monthly);
        return rows;
      }, [state.transactions]);

      const [overrides, setOverrides] = useState(() => Object.fromEntries(derived.map(r => [r.cat, r.monthly])));

      useEffect(() => { setOverrides(Object.fromEntries(derived.map(r => [r.cat, r.monthly]))); }, [derived]);

      const save = () => {
        const categories = {};
        Object.entries(overrides).forEach(([cat, amount]) => {
          categories[cat] = { monthlyBudget: amount, rollingAverage: derived.find(r => r.cat === cat)?.monthly || amount };
        });
        dispatch({ type: 'SET_BUDGET', payload: { categories, month: new Date().toISOString().slice(0,7) }});
        setStep('backpocket');
      };

      return (
        <div className="screen">
          <div className="header">
            <button className="header-btn" onClick={() => setStep('deductions')} aria-label="Back"><Icon name="back" /></button>
            <div />
            <div />
          </div>
          <h1 className="t-display mb-3">Your monthly budget</h1>
          <p className="t-body t-secondary mb-6">Based on what you actually spent. Adjust anything that looks off.</p>

          {derived.length === 0 ? (
            <p className="t-body t-muted">Not enough data yet — we'll build this as you log more transactions.</p>
          ) : (
            <div className="flex flex-col gap-3 mb-8">
              {derived.map(r => (
                <div className="card flex items-center justify-between" key={r.cat}>
                  <div>
                    <div className="t-body" style={{fontWeight: 500}}>{r.label}</div>
                    <div className="t-small t-muted">{fmtZAR(r.monthly)} actual average</div>
                  </div>
                  <div style={{width: 130}}>
                    <CurrencyInput
                      value={overrides[r.cat] ?? r.monthly}
                      onChange={v => setOverrides(o => ({ ...o, [r.cat]: v }))}
                    />
                  </div>
                </div>
              ))}
            </div>
          )}

          <div style={{position: 'sticky', bottom: 16}}>
            <button className="btn btn-primary" onClick={save}>Keep these as my budget</button>
          </div>
        </div>
      );
    }

    /* ===== Screen 8 — Backpocket suggestions ===== */
    function ScreenBackpocketSuggest({ setStep }) {
      const { state, dispatch } = useData();
      const estimate = useMemo(() => Tax.estimate(state), [state]);

      const monthlyTax = Math.max(0, Math.round(estimate.monthly));
      const monthlyTotal = useMemo(() => {
        return Object.values(state.budget.categories || {}).reduce((sum, c) => sum + (c.monthlyBudget || 0), 0);
      }, [state.budget]);

      const [provAdd, setProvAdd] = useState(true);
      const [provAmount, setProvAmount] = useState(monthlyTax * 3 || 20000);

      const [emergencyAdd, setEmergencyAdd] = useState(true);
      const [emergencyAmount, setEmergencyAmount] = useState(monthlyTotal * 3 || 30000);

      const finish = () => {
        const goals = [];
        if (provAdd && provAmount > 0) {
          const dates = getProvTaxDates(state.user.taxYear);
          goals.push({
            id: uid('bp'),
            label: 'Provisional tax set-aside',
            targetAmount: provAmount,
            currentAmount: 0,
            targetDate: dates[0].date,
            source: 'tax_suggestion',
            deposits: [],
          });

        if (emergencyAdd && emergencyAmount > 0) {

          goals.push({
            id: uid('bp'),
            label: 'Emergency fund',
            targetAmount: emergencyAmount,
            currentAmount: 0,
            targetDate: target.toISOString().slice(0, 10),
            source: 'tax_suggestion',
            deposits: [],
          });
        }
        goals.forEach(g => dispatch({ type: 'ADD_GOAL', payload: g }));
        dispatch({ type: 'PATCH_USER', payload: { onboardingComplete: true }});
        dispatch({ type: 'PATCH_SETTINGS', payload: { hasSeenOnboarding: true }});
      };

      return (
        <div className="screen">
          <div className="header">
            <button className="header-btn" onClick={() => setStep('budget')} aria-label="Back"><Icon name="back" /></button>
            <div />
            <div />
          </div>

    /** File/camera upload from the + menu. Camera mode routes to line-item OCR. */
    function FileAddSheet({ mode, onClose }) {
      const { state, dispatch, showToast } = useData();
      const inputRef = useRef(null);
      const [busy, setBusy] = useState(false);
      const [receiptData, setReceiptData] = useState(null);  // set after /api/extract-receipt
      const [receiptImage, setReceiptImage] = useState(null);

      useEffect(() => { inputRef.current?.click(); }, []);

      const handleFiles = async (files) => {
        if (!files?.length) { onClose(); return; }
        setBusy(true);
        const file = files[0];
        const context = aiContextFrom(state);
        const skipAi = state.settings?.skipAiProcessing;

        try {
          if (mode === 'camera') {
            // CAMERA / RECEIPT SCAN — route through /api/extract-receipt for line items
            if (skipAi) {
              showToast('Skip AI is on — receipt OCR needs AI. Add manually instead.', 'error');
              setBusy(false); onClose(); return;
            }
            const base64 = await fileToBase64(file);
            setReceiptImage({ base64, mimeType: file.type || 'image/jpeg' });
            const receipt = await extractReceipt(file, { context });
            if (receipt.error === 'unreadable') {
              showToast('Could not read that receipt. Try better lighting.', 'error');
              setBusy(false); onClose(); return;
            }
            setReceiptData(receipt);
            setBusy(false);
            // The ReceiptReviewSheet below renders instead of closing
            return;
          }

          // UPLOAD mode — multi-file or statement flow
          const fileList = Array.from(files);
          let results = [];
          for (const f of fileList) {
            if (/\.csv$/i.test(f.name)) {
              const rows = await parseCSV(f);
              const cat = await categoriseBatch(rows, { context, skipAi });
              cat.forEach(r => { r._sourceFile = f.name; });
              results = results.concat(cat);
            } else if (/\.(pdf|png|jpe?g|webp|heic)$/i.test(f.name)) {
              if (skipAi) {
                showToast('Skip AI is on — PDFs need AI. Use CSV export.', 'error');
                continue;
              }
              const cat = await categoriseFile(f, { context });
              cat.forEach(r => { r._sourceFile = f.name; });
              results = results.concat(cat);
            } else {
              showToast(`${f.name}: unsupported`, 'error');
            }
          }

          // Deduplicate against existing transactions (spec §5.5)
          results = dedupAgainstExisting(results, state.transactions);

          const txns = results.map(r => ({
            id: uid('txn'),
            accountId: 'acc_main',
            date: r.date || new Date().toISOString().slice(0, 10),
            description: r.description,
            amount: r.amount,
            category: r.category || 'uncategorised',
            source: 'ai',
            confidence: r.confidence ?? 0.9,
            needsReview: r.needsReview ?? false,
            userConfirmed: false,
            isDeductible: CATEGORIES[r.category]?.group === 'work',
            complianceNote: null,
            taxYear: taxYearForDate(r.date || new Date().toISOString().slice(0, 10)),
            receiptAttached: false,
            sourceFile: r._sourceFile || null,
            receiptId: null,
            subcategoryBreakdown: null,
            createdAt: new Date().toISOString(),
          })).filter(t => t.category !== 'ignore');
          dispatch({ type: 'ADD_TXNS', payload: txns });
          showToast(`Added ${plural(txns.length, 'transaction')}.`, 'success');
          setBusy(false);
          onClose();
        } catch (err) {
          console.error(err);
          showToast('Could not read file: ' + err.message, 'error');
          setBusy(false);
          onClose();
        }
      };

      // If we're showing the receipt review screen, don't render a dummy file input
      if (receiptData) {
        return <ReceiptReviewSheet receipt={receiptData} image={receiptImage} onClose={onClose} />;
      }

      return (
        <>
          <input
            ref={inputRef}
            type="file"
            className="sr-only"
            accept={mode === 'camera' ? 'image/*' : '.csv,.pdf,image/*'}
            capture={mode === 'camera' ? 'environment' : undefined}
            onChange={e => handleFiles(e.target.files)}
          />
          {busy && (
            <Sheet open={true} onClose={() => {}}>
              <div className="flex flex-col items-center gap-3 py-4">
                <div className="tjommie tjommie-pulse">TT</div>
                <p className="t-body t-secondary">{mode === 'camera' ? 'Reading your receipt…' : 'Processing file…'}</p>
              </div>
            </Sheet>
          )}
        </>
      );
    }

    /** Deduplicate newly-added rows against existing transactions (spec §5.5). */
    function dedupAgainstExisting(rows, existing) {
      if (!existing?.length) return rows;
      const existingKeys = new Set(existing.map(t => [
        (t.date || '').slice(0, 10),
        Math.round(Math.abs(t.amount || 0) * 100),
        (t.description || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').split(/\s+/).filter(Boolean).slice(0, 4).join(' '),
      ].join('|')));

      return rows.filter(r => {
        const key = [
          (r.date || '').slice(0, 10),
          Math.round(Math.abs(r.amount || 0) * 100),
          (r.description || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').split(/\s+/).filter(Boolean).slice(0, 4).join(' '),
        ].join('|');
        return !existingKeys.has(key);
      });
    }

    /* ===== Receipt review sheet — line-item OCR output (spec §5.3) =====
       Shows extracted merchant, total, line items grouped by sub-category.
       If the AI flagged it as client entertainment, prompts for who/why.
    */
    function ReceiptReviewSheet({ receipt, image, onClose }) {
      const { state, dispatch, showToast } = useData();
      const [isClientEnt, setIsClientEnt] = useState(receipt.isLikelyClientEntertainment || false);
      const [who, setWho] = useState('');
      const [purpose, setPurpose] = useState('');
      const [showItems, setShowItems] = useState(false);
      const [category, setCategory] = useState(isClientEnt ? 'client_entertainment' : (receipt.suggestedCategory || 'other_personal'));

      // Group line items by subCategory for the summary view
      const bySub = useMemo(() => {
        const out = {};
        for (const li of receipt.lineItems || []) {
          const k = li.subCategory || 'other';
          out[k] = (out[k] || 0) + Math.abs(li.amount || 0);
        }
        return out;
      }, [receipt]);

      const save = async () => {
        const txnId = uid('txn');
        const total = Math.abs(receipt.total || (receipt.lineItems || []).reduce((s, li) => s + Math.abs(li.amount || 0), 0));
        const compliance = isClientEnt && who && purpose
          ? `Compliance note saved: met with ${who} for ${purpose}.`
          : null;

        // Save image to IndexedDB
        let receiptId = null;
        if (image) {
          receiptId = await saveReceiptImage(txnId, image.base64, image.mimeType);
        }

        const txn = {
          id: txnId,
          accountId: 'acc_main',
          date: receipt.date || new Date().toISOString().slice(0, 10),
          description: receipt.merchant,
          amount: -total,
          category,
          source: 'receipt_scan',
          confidence: receipt.confidence ?? 0.9,
          needsReview: false,
          userConfirmed: true,

                      <div key={i} className="flex justify-between t-small">

                        <span className="t-tabular">{fmtZAR(li.amount)}</span>

            <div>

              <select className="input" value={category} onChange={e => setCategory(e.target.value)}>

            <button className="btn btn-primary" onClick={save}>Save receipt</button>

    function TaxCalculator() {
      const { state } = useData();
      const [income, setIncome] = useState((state.user.monthlyGross || 0) * 12);
      const [age, setAge] = useState(state.user.age || 35);
      const [deductions, setDeductions] = useState(() => Tax.estimate(state).totalDeductions);
      const [hasMedical, setHasMedical] = useState(state.taxProfile?.medical?.enabled || false);
      const [whatIf, setWhatIf] = useState(0);
      const year = state.user.taxYear || '2025/26';

      const taxable = Math.max(0, income - deductions);
      const gross = Tax.calc(taxable, year);
      const rebate = Tax.primaryRebate(year, age);
      const medCredit = hasMedical ? Tax.medCredit(state.taxProfile.medical?.members || 1, state.taxProfile.medical?.dependents || 0, year) : 0;
      const net = Math.max(0, gross - rebate - medCredit);
      const monthly = net / 12;
      const marginal = Tax.rate(taxable, year);
      const effective = income > 0 ? net / income : 0;

      // Build bracket-by-bracket steps
      const brackets = Tax.tables(year).brackets;
      const steps = [];
      let remaining = taxable;
      for (const b of brackets) {
        const amountInBracket = Math.min(remaining, b.upTo) - b.above;
        if (amountInBracket <= 0) break;
        const taxOnBracket = amountInBracket * b.rate;
        steps.push({
          range: b.upTo === Infinity ? `R${b.above.toLocaleString()}+` : `R${b.above.toLocaleString()} – R${b.upTo.toLocaleString()}`,
          rate: (b.rate * 100).toFixed(0) + '%',
          amountTaxed: amountInBracket,
          taxPaid: taxOnBracket,
        });
        if (taxable <= b.upTo) break;
      }

      const whatIfSaving = whatIf * marginal;

      return (
        <div>
          <div className="card mb-4 flex flex-col gap-4">
            <div>
              <label className="input-label">Annual gross income</label>
              <CurrencyInput value={income} onChange={setIncome} />
            </div>
            <div>
              <label className="input-label">Age</label>
              <input className="input" type="number" value={age} onChange={e => setAge(parseInt(e.target.value) || 0)} />
            </div>
            <div>
              <label className="input-label">Total annual deductions</label>
              <CurrencyInput value={deductions} onChange={setDeductions} />
            </div>
            <button className={`checkbox ${hasMedical ? 'checked' : ''}`} onClick={() => setHasMedical(x => !x)}>
              <div className="checkbox-box">{hasMedical && <Icon name="check" size={14} stroke={3} />}</div>
              <span className="t-body">Medical aid member</span>
            </button>
          </div>

          <div className="card mb-4">
            <div className="t-h2 mb-3">Step-by-step</div>
            <div className="flex justify-between py-2 t-small"><span className="t-secondary">Gross income</span><span className="t-tabular">{fmtZAR(income)}</span></div>
            <div className="flex justify-between py-2 t-small"><span className="t-secondary">Less: Deductions</span><span className="t-tabular">-{fmtZAR(deductions)}</span></div>
            <div className="flex justify-between py-2 t-small" style={{borderTop:'1px solid var(--border-faint)', borderBottom: '1px solid var(--border-faint)', fontWeight: 600}}>
              <span>Taxable income</span><span className="t-tabular">{fmtZAR(taxable)}</span>
            </div>
            {steps.map((s, i) => (
              <div key={i} className="flex justify-between py-2 t-small">
                <span className="t-secondary">{s.range} @ {s.rate}</span>
                <span className="t-tabular">{fmtZAR(s.taxPaid)}</span>
              </div>
            ))}
            <div className="flex justify-between py-2 t-small" style={{borderTop:'1px solid var(--border-faint)'}}>
              <span className="t-secondary">Tax before rebates</span><span className="t-tabular">{fmtZAR(gross)}</span>
            </div>
            <div className="flex justify-between py-2 t-small"><span className="t-secondary">Less: Primary rebate</span><span className="t-tabular">-{fmtZAR(rebate)}</span></div>
            {hasMedical && <div className="flex justify-between py-2 t-small"><span className="t-secondary">Less: Medical credit</span><span className="t-tabular">-{fmtZAR(medCredit)}</span></div>}
            <div className="flex justify-between items-end mt-4" style={{borderTop:'2px solid var(--teal)', paddingTop: 12}}>
              <span className="t-small t-secondary">Net tax payable</span>
              <span className="t-hero" style={{fontSize: 'var(--text-display)'}}>{fmtZAR(net)}</span>
            </div>
            <div className="t-small t-muted text-center mt-2">{fmtZAR(monthly)} per month</div>
          </div>

          <div className="grid grid-2 mb-4">
            <div className="card">
              <div className="t-small t-muted">Effective rate</div>
              <div className="t-h1 t-tabular">{(effective*100).toFixed(1)}%</div>
            </div>
            <div className="card">
              <div className="t-small t-muted">Marginal rate</div>
              <div className="t-h1 t-tabular">{(marginal*100).toFixed(0)}%</div>
            </div>
          </div>

          <div className="card mb-4" style={{background: 'var(--teal-dim)', borderColor: 'var(--border-teal)'}}>
            <div className="t-small t-teal mb-2" style={{fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase'}}>What-if</div>
            <label className="input-label">Extra deductions</label>
            <CurrencyInput value={whatIf} onChange={setWhatIf} />
            <p className="t-small mt-3" style={{lineHeight: 1.5}}>
              If you add <strong>{fmtZAR(whatIf)}</strong> more in deductions, you'd save <strong className="t-teal">{fmtZAR(whatIfSaving)}</strong> in tax (at your {(marginal*100).toFixed(0)}% marginal rate).
            </p>
          </div>
        </div>
      );
    }

    function TaxProvisional() {
      const { state, dispatch } = useData();
      const year = state.settings.activeTaxYear;
      const dates = getProvTaxDates(year);
      const paid = state.provTaxPaid[year] || {};
      const est = Tax.estimate(state);
      const half = Math.round(est.total / 2);

      const togglePaid = (key) => {
        dispatch({ type: 'SET_PROV_PAID', payload: { year, key, value: paid[key] ? 0 : half }});
      };

      return (
        <div>
          <p className="t-body t-secondary mb-5">As a freelancer earning more than R95,750/year, you are a provisional taxpayer. You must make two compulsory payments to SARS during the tax year.</p>

          <div className="card mb-4">
            <div className="t-h2 mb-3">Payment schedule</div>
            {dates.map((d, i) => {
              const key = i === 0 ? 'firstPayment' : i === 1 ? 'secondPayment' : 'voluntaryThirdPayment';
              const amount = d.optional ? 0 : half;
              const isPaid = (paid[key] || 0) > 0;
              const overdue = !isPaid && !d.optional && new Date(d.date) < new Date();
              return (
                <div key={i} className="flex items-center justify-between py-3" style={{borderTop: i ? '1px solid var(--border-faint)' : 'none'}}>

    /* ===== BUDGET TAB ===== */
    /* ===== BUDGET TAB (v5: sub-category drill-down + unusual-spending flag) ===== */
    function BudgetTab() {
      const { state } = useData();
      const [month] = useState(new Date().toISOString().slice(0, 7));
      const categories = state.budget?.categories || {};
      const entries = Object.entries(categories);

      const spentByCat = useMemo(() => {
        const m = {};
        state.transactions.filter(t => t.date?.startsWith(month) && t.amount < 0).forEach(t => {
          m[t.category] = (m[t.category] || 0) + Math.abs(t.amount);
        });
        return m;
      }, [state.transactions, month]);

      /** Aggregate receipt-derived sub-category breakdowns per parent category.
          e.g. groceries.meat = sum of all grocery receipts' meat sub-totals for this month. */
      const subcategoryByCat = useMemo(() => {
        const out = {};
        state.transactions
          .filter(t => t.date?.startsWith(month) && t.subcategoryBreakdown)
          .forEach(t => {
            const parent = t.category;
            out[parent] = out[parent] || {};
            for (const [sub, amt] of Object.entries(t.subcategoryBreakdown)) {
              out[parent][sub] = (out[parent][sub] || 0) + amt;
            }
          });
        return out;
      }, [state.transactions, month]);

      /** Last-month comparison — flags "unusual spending" when this month is >1.4x prior month */
      const spentLastMonth = useMemo(() => {
        const prev = new Date(month + '-01'); prev.setMonth(prev.getMonth() - 1);
        const prevKey = prev.toISOString().slice(0, 7);
        const m = {};
        state.transactions.filter(t => t.date?.startsWith(prevKey) && t.amount < 0).forEach(t => {
          m[t.category] = (m[t.category] || 0) + Math.abs(t.amount);
        });
        return m;
      }, [state.transactions, month]);

      const [expanded, setExpanded] = useState(null);

      return (
        <div className="screen has-nav">
          <div className="header">
            <div />
            <div className="t-h1">Budget</div>
            <div />
          </div>
          <p className="t-small t-muted mb-4">For {month}</p>

          {entries.length === 0 ? (
            <div className="card text-center" style={{padding: 48}}>
              <p className="t-body t-secondary">No budget yet — upload a statement to auto-build one.</p>
            </div>
          ) : (
            <div className="flex flex-col gap-3">
              {entries.map(([cat, cfg]) => {
                const spent = spentByCat[cat] || 0;
                const budget = cfg.monthlyBudget || 0;
                const pct = budget ? Math.min(1.2, spent/budget) : 0;
                const color = pct >= 1 ? 'red' : pct >= 0.8 ? 'amber' : 'teal';
                const label = CATEGORIES[cat]?.label || cat;
                const isOpen = expanded === cat;
                const txnsInCat = state.transactions.filter(t => t.category === cat && t.date?.startsWith(month));
                const lastMonthSpent = spentLastMonth[cat] || 0;
                const jumped = lastMonthSpent > 0 && spent > lastMonthSpent * 1.4;
                const subBreakdown = subcategoryByCat[cat];
                return (
                  <div className="card" key={cat}>
                    <div className="flex items-center justify-between mb-2" onClick={() => setExpanded(isOpen ? null : cat)} style={{cursor: 'pointer'}}>
                      <div style={{flex: 1, minWidth: 0}}>
                        <div className="flex items-center gap-2">
                          <div className="t-body" style={{fontWeight: 500}}>{label}</div>
                          {jumped && <span className="pill pill-amber" style={{padding: '2px 8px', fontSize: 10}}>Up {Math.round((spent/lastMonthSpent - 1) * 100)}%</span>}
                        </div>
                        <div className="t-small t-muted">{fmtZAR(spent)} / {fmtZAR(budget)}</div>
                      </div>
                      <Icon name={isOpen ? 'chevron_up' : 'chevron_down'} size={16} />
                    </div>
                    <div className="progress-bar">
                      <div className={`progress-bar-fill ${color}`} style={{width: `${Math.min(100, pct*100)}%`}}></div>
                    </div>
                    {isOpen && (
                      <div className="mt-3 flex flex-col gap-3">
                        {/* Sub-category drill-down from receipt line items */}
                        {subBreakdown && Object.keys(subBreakdown).length > 0 && (
                          <div>
                            <div className="t-micro mb-2">Inside {label.toLowerCase()}</div>
                            <div className="flex flex-col gap-1">
                              {Object.entries(subBreakdown).sort(([,a],[,b]) => b - a).map(([sub, amt]) => (
                                <div key={sub} className="flex justify-between t-small py-1">
                                  <span className="t-secondary" style={{textTransform: 'capitalize'}}>{sub.replace(/_/g, ' ')}</span>
                                  <span className="t-tabular">{fmtZAR(amt)}</span>
                                </div>
                              ))}
                            </div>
                            <div className="divider" style={{margin: '10px 0'}} />
                          </div>
                        )}
                        <div className="t-micro">TRANSACTIONS THIS MONTH</div>
                        {txnsInCat.length === 0 && <div className="t-small t-muted">No transactions.</div>}
                        {txnsInCat.map(t => (
                          <div className="flex justify-between t-small py-1" key={t.id}>
                            <span>{fmtDate(t.date)} · {t.description}</span>
                            <span className="t-tabular">{fmtZAR(Math.abs(t.amount))}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

              <div className="flex items-center justify-between">
                <div>
                  <div className="t-body" style={{fontWeight: 500}}>Privacy details</div>
                  <div className="t-small t-muted">What we send, what stays local</div>
                </div>
                <Icon name="chevron_right" size={16} />
              </div>
            </div>
          </button>

          <div className="card" style={{padding: 16, background: 'var(--teal-dim)', borderColor: 'var(--border-teal)'}}>
            <div className="t-small" style={{fontWeight: 600, marginBottom: 4}}>Proof we're not retaining</div>
            <div className="t-small t-secondary">Open DevTools → Network tab → upload a statement. Inspect the request to <code style={{fontSize: 11, background: 'var(--bg-app)', padding: '1px 4px', borderRadius: 3}}>/api/categorise</code>. You'll see only date, description, amount — no account numbers. Every AI call sends <code style={{fontSize: 11, background: 'var(--bg-app)', padding: '1px 4px', borderRadius: 3}}>x-anthropic-zero-retention: true</code>.</div>
          </div>
        </div>
      );
    }

    /* ===== Backup section — encrypted export/import + Google Drive placeholder ===== */
    function BackupSection() {
      const { state, dispatch, showToast } = useData();
      const [exportPass, setExportPass] = useState('');
      const [importPass, setImportPass] = useState('');
      const [pendingFile, setPendingFile] = useState(null);
      const [busy, setBusy] = useState(false);

      const exportEncrypted = async () => {
        if (exportPass.length < 8) { showToast('Passphrase must be at least 8 characters.', 'error'); return; }
        setBusy(true);
        try {
          const envelope = await encryptBackup(state, exportPass);
          const blob = new Blob([JSON.stringify(envelope, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `tax-tjommie-encrypted-${new Date().toISOString().slice(0,10)}.ttbackup`;
          a.click(); URL.revokeObjectURL(url);
          dispatch({ type: 'PATCH_SETTINGS', payload: { lastBackup: new Date().toISOString() }});
          showToast('Encrypted backup downloaded.', 'success');
          setExportPass('');
        } catch (e) { showToast('Backup failed: ' + e.message, 'error'); }
        setBusy(false);
      };

      const importEncrypted = async () => {
        if (!pendingFile || importPass.length < 8) return;
        setBusy(true);
        try {
          const text = await pendingFile.text();
          const envelope = JSON.parse(text);
          const restored = await decryptBackup(envelope, importPass);
          dispatch({ type: 'SET', payload: restored });
          dispatch({ type: 'PATCH_SETTINGS', payload: { lastImport: new Date().toISOString() }});
          showToast('Backup restored.', 'success');
          setImportPass(''); setPendingFile(null);
        } catch (e) {
          showToast(e.name === 'OperationError' ? 'Wrong passphrase.' : 'Restore failed.', 'error');
        }
        setBusy(false);
      };

      return (
        <div className="flex flex-col gap-4">
          {/* Google Drive placeholder — spec §5.2 scaffolded, not yet OAuth'd */}
          <div className="card">
            <div className="flex items-center justify-between">
              <div>
                <div className="t-body" style={{fontWeight: 500}}>Google Drive</div>
                <div className="t-small t-muted">Auto-sync encrypted backups</div>
              </div>
              <div className="pill" style={{fontSize: 11}}>Coming soon</div>
            </div>
          </div>
          <div className="card">
            <div className="flex items-center justify-between">
              <div>
                <div className="t-body" style={{fontWeight: 500}}>iCloud Drive</div>
                <div className="t-small t-muted">iOS only</div>
              </div>
              <div className="pill" style={{fontSize: 11}}>Coming soon</div>
            </div>
          </div>

          <div className="divider" />

          <div>
            <div className="t-h2 mb-2">Encrypted manual backup</div>
            <p className="t-small t-secondary mb-3">Download your data as an encrypted file. You'll need the same passphrase to restore it later. If you lose the passphrase, nobody can recover the data — not even us.</p>
            <label className="input-label">Passphrase (≥ 8 characters)</label>
            <input className="input mb-3" type="password" value={exportPass} onChange={e => setExportPass(e.target.value)} placeholder="A passphrase you'll remember" />
            <button className="btn btn-ghost" disabled={busy || exportPass.length < 8} onClick={exportEncrypted}>
              <Icon name="download" size={16} /> Download encrypted backup
            </button>
          </div>

          <div className="divider" />

          <div>
            <div className="t-h2 mb-2">Restore from backup</div>
            <p className="t-small t-secondary mb-3">Loads an encrypted .ttbackup file and decrypts it with your passphrase.</p>
            <label className="btn btn-ghost mb-3" style={{cursor: 'pointer'}}>
              <Icon name="upload" size={16} />
              {pendingFile ? pendingFile.name : 'Choose .ttbackup file'}
              <input type="file" accept=".ttbackup,.json" className="sr-only" onChange={e => setPendingFile(e.target.files?.[0])} />
            </label>
            {pendingFile && (
              <>
                <input className="input mb-3" type="password" value={importPass} onChange={e => setImportPass(e.target.value)} placeholder="Passphrase used to encrypt" />
                <button className="btn btn-primary" disabled={busy || importPass.length < 8} onClick={importEncrypted}>Restore backup</button>
              </>
            )}
          </div>
        </div>
      );
    }

    function SettingsSheet({ onClose }) {
      const { state, dispatch, showToast } = useData();
      const [section, setSection] = useState('menu');

      const storageSize = useMemo(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY) || '';
          return (new Blob([raw]).size / 1024).toFixed(1) + ' KB / ~5 MB limit';
        } catch { return 'unknown'; }
      }, [state]);

      const exportJson = () => {
        const dataStr = JSON.stringify(state, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `tax-tjommie-${new Date().toISOString().slice(0,10)}.json`;
        a.click(); URL.revokeObjectURL(url);
        dispatch({ type: 'PATCH_SETTINGS', payload: { lastExport: new Date().toISOString() }});
        showToast('Exported.', 'success');
      };

      const importJson = (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        const r = new FileReader();
        r.onload = () => {
          try {
            const parsed = JSON.parse(r.result);
            dispatch({ type: 'SET', payload: parsed });
            showToast('Imported.', 'success');
            dispatch({ type: 'PATCH_SETTINGS', payload: { lastImport: new Date().toISOString() }});
          } catch { showToast('Invalid JSON.', 'error'); }
        };
        r.readAsText(file);
      };

      const resetAll = () => {
        if (!confirm('Delete all data? This cannot be undone.')) return;
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      };

      const SectionLink = ({ to, label }) => (
        <button className="card txn-row" onClick={() => setSection(to)}>
          <div style={{gridColumn: '1 / -1'}}>
            <div className="flex items-center justify-between">
              <span>{label}</span><Icon name="chevron_right" size={16} />
            </div>
          </div>
        </button>
      );

      const menu = (
        <div className="flex flex-col gap-2">
          <SectionLink to="profile"  label="Profile" />
          <SectionLink to="accounts" label="Accounts" />
          <SectionLink to="privacy"  label="Privacy" />
          <SectionLink to="backup"   label="Cloud backup" />
          <SectionLink to="data"     label="Data & storage" />
          <SectionLink to="about"    label="About" />
        </div>
      );

      let content = null;
      if (section === 'menu') content = menu;
      else if (section === 'profile') {
        content = (
          <div className="flex flex-col gap-4">
            <div><label className="input-label">Name</label><input className="input" value={state.user.name} onChange={e => dispatch({ type: 'PATCH_USER', payload: { name: e.target.value }})} /></div>
            <div><label className="input-label">Email</label><input className="input" type="email" value={state.user.email || ''} onChange={e => dispatch({ type: 'PATCH_USER', payload: { email: e.target.value }})} /></div>
            <div><label className="input-label">Occupation</label><input className="input" value={state.user.occupation || ''} onChange={e => dispatch({ type: 'PATCH_USER', payload: { occupation: e.target.value }})} placeholder="e.g. Photographer" /></div>
            <div><label className="input-label">Monthly income (before tax)</label><CurrencyInput value={state.user.monthlyGross} onChange={v => dispatch({ type: 'PATCH_USER', payload: { monthlyGross: v }})} /></div>
            {state.user.userType === 'retired' && (
              <div><label className="input-label">Age <span className="t-muted">(affects rebates)</span></label>
                <input className="input" type="number" value={state.user.age || 65} onChange={e => dispatch({ type: 'PATCH_USER', payload: { age: parseInt(e.target.value) || 65 }})} />
              </div>
            )}
            <div><label className="input-label">Active tax year</label>
              <select className="input" value={state.user.taxYear} onChange={e => {
                dispatch({ type: 'PATCH_USER', payload: { taxYear: e.target.value }});
                dispatch({ type: 'PATCH_SETTINGS', payload: { activeTaxYear: e.target.value }});
              }}>
                <option value="2025/26">2025/26</option>
                <option value="2024/25">2024/25</option>
              </select>
            </div>
            <div><label className="input-label">User type <span className="t-muted">(reconfigures UI)</span></label>
              <select className="input" value={state.user.userType} onChange={e => dispatch({ type: 'PATCH_USER', payload: { userType: e.target.value }})}>
                {USER_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>
          </div>
        );
      } else if (section === 'privacy') {
        content = <PrivacySection onShowModal={() => setSection('privacy_modal')} />;
      } else if (section === 'privacy_modal') {
        content = <PrivacyModalBody onAccept={() => setSection('privacy')} />;
      } else if (section === 'backup') {
        content = <BackupSection />;
      } else if (section === 'accounts') {
        content = (
          <div className="flex flex-col gap-3">
            {state.accounts.map(a => (
              <div className="card" key={a.id}>
                <div className="t-body">{a.label}</div>
                <div className="t-small t-muted">{a.type} · {a.transactionCount || 0} transactions</div>
              </div>
            ))}
          </div>
        );
      } else if (section === 'data') {
        content = (
          <div className="flex flex-col gap-3">
            <div className="card">
              <div className="t-small t-muted">Storage used</div>
              <div className="t-body t-tabular">{storageSize}</div>
            </div>
            <button className="btn btn-ghost" onClick={exportJson}><Icon name="download" size={18}/> Export data (JSON)</button>
            <label className="btn btn-ghost" style={{cursor: 'pointer'}}>
              <Icon name="upload" size={18}/> Import data (JSON)
              <input type="file" accept=".json" className="sr-only" onChange={importJson}/>
            </label>
            <button className="btn btn-danger" onClick={resetAll}><Icon name="trash" size={18}/> Reset all data</button>
          </div>
        );
      } else if (section === 'about') {
        content = (
          <div className="flex flex-col gap-3">
            <div className="card">
              <div className="t-body">Tax Tjommie v{APP_VERSION}</div>
              <div className="t-small t-muted mt-2">For South African individuals, sole proprietors and small businesses. Built in partnership with The Tax Shop.</div>
            </div>
            <div className="card">
              <div className="t-small t-secondary">Your data is stored locally on this device. AI categorisation uses sanitised transactions only — no account numbers, no balances.</div>
            </div>
          </div>
        );
      }

      return (
        <Sheet open={true} onClose={onClose} title={section === 'menu' ? 'Settings' : ''}>
          {section !== 'menu' && (
            <button className="btn-link" onClick={() => setSection('menu')} style={{marginBottom: 16}}>
              <Icon name="back" size={16} /> Back
            </button>
          )}
          {content}
        </Sheet>
      );
    }

    /* ===========================================================
       MOUNT
       =========================================================== */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW register failed:', err));
      });
    }
  </script>
</body>
</html>
